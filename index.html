function getCfg(){try{const s=localStorage.getItem("piq2");return s?JSON.parse(s):null;}catch{return null;}}
function saveCfg(c){try{localStorage.setItem("piq2",JSON.stringify(c));}catch{}}
function clearCfg(){try{localStorage.removeItem("piq2");}catch{}}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function buildPrompt(manualData){
  if(!manualData) return `You are a sports betting analyst AI. Read this betting screenshot carefully.
Extract team names, sport, league, odds, available markets. Give detailed predictions.
Respond ONLY in valid JSON (no markdown, no backticks, no explanation):
{"teamA":"<n>","teamB":"<n>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<l>","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"],"detectedOdds":"<summary>"}`;
  return `You are a sports betting analyst AI.
Match: ${manualData.teamA} vs ${manualData.teamB}
Sport: ${manualData.sport}, League: ${manualData.league||"Unknown"}
Markets: ${manualData.markets.join(", ")}
Respond ONLY in valid JSON (no markdown, no backticks):
{"teamA":"${manualData.teamA}","teamB":"${manualData.teamB}","sport":"${manualData.sport}","league":"${manualData.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`;
}

function parseJSON(text){
  const clean = text.replace(/```json|```/g,"").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  if(start===-1||end===-1) throw new Error("JSON পাওয়া যায়নি");
  return JSON.parse(clean.slice(start,end+1));
}

async function callGroq(key,img,mime,manual){
  const prompt = buildPrompt(manual);
  // Groq doesn't support vision for free, use text-only
  const content = img
    ? `${prompt}\n\n[Note: Screenshot uploaded but vision not available in free tier. Please analyze based on common betting patterns for the sport detected.]`
    : prompt;
  const resp = await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,messages:[{role:"user",content}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Groq Error");
  return parseJSON(data.choices?.[0]?.message?.content||"");
}

async function callGemini(key,img,mime,manual){
  const prompt = buildPrompt(manual);
  const parts = img
    ? [{text:prompt},{inline_data:{mime_type:mime||"image/png",data:img}}]
    : [{text:prompt}];
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Gemini Error");
  return parseJSON(data.candidates?.[0]?.content?.parts?.[0]?.text||"");
}

async function callOpenAI(key,img,mime,manual){
  const prompt = buildPrompt(manual);
  const content = img
    ? [{type:"text",text:prompt},{type:"image_url",image_url:{url:`data:${mime||"image/png"};base64,${img}`}}]
    : prompt;
  const resp = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
    body:JSON.stringify({model:img?"gpt-4o":"gpt-4o-mini",max_tokens:1200,messages:[{role:"user",content}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"OpenAI Error");
  return parseJSON(data.choices?.[0]?.message?.content||"");
}

async function callAnthropic(key,img,mime,manual){
  const prompt = buildPrompt(manual);
  const messages = img
    ? [{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime||"image/png",data:img}},{type:"text",text:prompt}]}]
    : [{role:"user",content:prompt}];
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Anthropic Error");
  return parseJSON(data.content.map(b=>b.text||"").join(""));
}

async function callAI(pid,key,img,mime,manual){
  if(pid==="groq") return callGroq(key,img,mime,manual);
  if(pid==="gemini") return callGemini(key,img,mime,manual);
  if(pid==="openai") return callOpenAI(key,img,mime,manual);
  if(pid==="anthropic") return callAnthropic(key,img,mime,manual);
  throw new Error("Unknown provider");
}

function Ring({value,label,color}){
  const r=27,c=2*Math.PI*r,d=(value/100)*c;
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <svg width={68} height={68} style={{transform:"rotate(-90deg)"}}>

      <text x={34} y={34} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={13} fontWeight={800} style={{transform:"rotate(90deg)",transformOrigin:"34px 34px",fontFamily:"monospace"}}>{value}%</text>

    <span style={{color:"#667788",fontSize:10,fontWeight:700,letterSpacing:0.7}}>{label}</span>
  </div>;
}

function App(){
  const [cfg,setCfg]=useState(()=>getCfg());
  const [tab,setTab]=useState("upload");
  const [sport,setSport]=useState("football");
  const [teamA,setTeamA]=useState("");
  const [teamB,setTeamB]=useState("");
  const [league,setLeague]=useState("");
  const [sm,setSm]=useState([]);
  const [preview,setPreview]=useState(null);
  const [b64,setB64]=useState(null);
  const [mime,setMime]=useState("image/png");
  const [drag,setDrag]=useState(false);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [accum,setAccum]=useState([]);
  const [error,setError]=useState(null);
  const fileRef=useRef();

  if(!cfg) return <KeyScreen onSave={setCfg}/>;

  const prov=PROVIDERS.find(p=>p.id===cfg.pid)||PROVIDERS[0];

  const processFile=async(f)=>{
    if(!f||!f.type.startsWith("image/")){setError("JPG বা PNG ফাইল দিন।");return;}
    setMime(f.type);setPreview(URL.createObjectURL(f));setResult(null);setError(null);
    try{setB64(await fileToBase64(f));}catch{setError("ফাইল পড়া যায়নি।");}
  };

  const analyze=async(manual=false)=>{
    setLoading(true);setError(null);setResult(null);
    try{
      let res;
      if(manual){
        if(!teamA||!teamB){setError("দুটো টিমের নাম দিন।");setLoading(false);return;}
        res=await callAI(cfg.pid,cfg.key,null,null,{teamA,teamB,sport,league,markets:sm.length?sm:MARKETS[sport].slice(0,5)});
      } else {
        if(!b64){setError("আগে স্ক্রিনশট আপলোড করুন।");setLoading(false);return;}
        res=await callAI(cfg.pid,cfg.key,b64,mime,null);
      }
      setResult(res);
    }catch(e){
      const m=(e.message||"").toLowerCase();
      if(m.includes("credit")||m.includes("billing")||m.includes("quota")||m.includes("exceeded")||m.includes("limit")||m.includes("insufficient")){
        setError(`${prov.name} এর limit/credit শেষ। নিচে "Provider পরিবর্তন করুন" চাপুন।`);
      } else if(m.includes("401")||m.includes("403")||m.includes("invalid")||m.includes("auth")||m.includes("key")){
        setError("API Key ভুল। নতুন key দিন।");
      } else {
        setError("Error: "+e.message);
      }
    }
    setLoading(false);
  };

  const reset=()=>{clearCfg();setCfg(null);setResult(null);setError(null);};
  const toggleM=m=>setSm(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const addAccum=()=>{
    if(!result)return;
    const best=result.predictions?.find(p=>p.best)||result.predictions?.[0];
    if(!best)return;
    setAccum(a=>[...a,{match:`${result.teamA} vs ${result.teamB}`,market:`${best.market}: ${best.prediction}`,prob:best.prob,id:Date.now()}]);
  };
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 13px",color:"#e0e6f0",fontSize:14,outline:"none",width:"100%"};
  const BP=(d)=>({background:d?`${prov.color}15`:`linear-gradient(135deg,${prov.color},${prov.color}bb)`,border:"none",borderRadius:11,padding:"13px",cursor:d?"not-allowed":"pointer",color:d?"#445566":"#fff",fontWeight:900,fontSize:14,width:"100%",opacity:d?0.6:1,boxShadow:d?"none":`0 3px 20px ${prov.color}33`,transition:"all .2s"});

  return(
    <div style={{minHeight:"100vh",background:"#080c14",position:"relative"}}>
      <div style={GRID}/>
      <div style={{position:"relative",zIndex:1,maxWidth:840,margin:"0 auto",padding:"16px 13px 40px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:9,marginBottom:5}}>
            <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#00ff9d12,#00ff9d28)",border:"1px solid #00ff9d33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>⚡</div>
            <span style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#334455",fontSize:11,marginBottom:7}}>AI Sports Prediction · Screenshot Analysis · Multi-Bet</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:7,background:`${prov.color}0d`,border:`1px solid ${prov.color}2a`,borderRadius:20,padding:"4px 13px"}}>
            <span style={{fontSize:13}}>{prov.icon}</span>
            <span style={{color:prov.color,fontSize:11,fontWeight:700}}>{prov.name}</span>
            <span style={{background:`${prov.badgeColor}18`,color:prov.badgeColor,fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:20}}>{prov.badge}</span>
            <button onClick={reset} style={{background:"none",border:"none",color:"#334455",cursor:"pointer",fontSize:10,textDecoration:"underline",padding:0}}>পরিবর্তন</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:3,marginBottom:18}}>
          {[{id:"upload",label:"📸 Screenshot"},{id:"manual",label:"✏️ Manual"},{id:"accumulator",label:`🔗 Accum${accum.length?` (${accum.length})`:""}`},{id:"admin",label:"⚙️ Admin"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 3px",borderRadius:9,border:"none",cursor:"pointer",background:tab===t.id?`${prov.color}18`:"transparent",color:tab===t.id?prov.color:"#445566",fontWeight:tab===t.id?700:500,fontSize:11,borderBottom:tab===t.id?`2px solid ${prov.color}`:"2px solid transparent",transition:"all .15s"}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* SCREENSHOT */}
        {tab==="upload"&&(
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            <div
              onClick={()=>fileRef.current?.click()}
              onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              style={{border:`2px dashed ${drag?prov.color:preview?prov.color+"44":"rgba(255,255,255,0.08)"}`,borderRadius:15,padding:"36px 18px",textAlign:"center",cursor:"pointer",background:drag?`${prov.color}07`:preview?`${prov.color}03`:"rgba(255,255,255,0.01)",transition:"all .2s"}}
            >
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {preview
                ?<div>
                  <img src={preview} style={{maxHeight:200,maxWidth:"100%",borderRadius:9,marginBottom:10,border:`1px solid ${prov.color}2a`,objectFit:"contain"}}/>
                  <p style={{color:prov.color,fontSize:13,fontWeight:700}}>✓ Screenshot ready</p>
                  <p style={{color:"#2a3a44",fontSize:11,marginTop:3}}>অন্য ছবি দিতে ক্লিক করুন</p>
                </div>
                :<div>
                  <div style={{fontSize:46,marginBottom:10}}>📸</div>
                  <p style={{color:"#c8d8e8",fontWeight:700,fontSize:14,marginBottom:5}}>বেটিং অ্যাপের স্ক্রিনশট আপলোড করুন</p>
                  <p style={{color:"#334455",fontSize:12}}>ক্লিক করুন · বা drag করুন</p>
                  {cfg.pid==="groq"&&<p style={{color:"#2a4a3a",fontSize:11,marginTop:6}}>⚠️ Groq এ screenshot analysis নেই — Manual tab ব্যবহার করুন</p>}
                </div>
              }
            </div>
            {preview&&<button onClick={()=>analyze(false)} disabled={loading} style={BP(loading)}>{loading?`⏳ ${prov.name} বিশ্লেষণ করছে...`:`⚡ Screenshot বিশ্লেষণ করুন`}</button>}
            {error&&(
              <div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:10,padding:"12px 14px",color:"#ff7070",fontSize:13,lineHeight:1.6}}>
                ⚠️ {error}
                <button onClick={reset} style={{display:"block",marginTop:8,background:"rgba(255,77,77,0.1)",border:"1px solid rgba(255,77,77,0.25)",color:"#ff7070",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontSize:12,fontWeight:600}}>🔄 অন্য Provider দিন</button>
              </div>
            )}
            {result&&<ResultView r={result} onAdd={addAccum} pcolor={prov.color}/>}
          </div>
        )}

        {/* MANUAL */}
        {tab==="manual"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {cfg.pid==="groq"&&(
              <div style={{background:"rgba(0,255,157,0.04)",border:"1px solid rgba(0,255,157,0.15)",borderRadius:10,padding:"10px 13px"}}>
                <p style={{color:"#00ff9d",fontSize:12,fontWeight:700}}>✅ Groq Manual Mode — সম্পূর্ণ ফ্রি ও দ্রুত!</p>
              </div>
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {SPORTS.map(s=>(
                <button key={s.id} onClick={()=>{setSport(s.id);setSm([]);}} style={{padding:"7px 13px",borderRadius:30,border:`1px solid ${sport===s.id?prov.color:"rgba(255,255,255,0.08)"}`,background:sport===s.id?`${prov.color}15`:"rgba(255,255,255,0.02)",color:sport===s.id?prov.color:"#667788",cursor:"pointer",fontSize:12,fontWeight:600}}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <input placeholder="Team A" value={teamA} onChange={e=>setTeamA(e.target.value)} style={INP}/>
              <input placeholder="Team B" value={teamB} onChange={e=>setTeamB(e.target.value)} style={INP}/>
            </div>
            <input placeholder="League / Tournament (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
            <div>
              <p style={{color:"#334455",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:7}}>MARKETS সিলেক্ট করুন</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {MARKETS[sport].map(m=>(
                  <button key={m} onClick={()=>toggleM(m)} style={{padding:"5px 11px",borderRadius:20,border:`1px solid ${sm.includes(m)?prov.color:"rgba(255,255,255,0.07)"}`,background:sm.includes(m)?`${prov.color}12`:"rgba(255,255,255,0.015)",color:sm.includes(m)?prov.color:"#445566",cursor:"pointer",fontSize:11,fontWeight:600}}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={()=>analyze(true)} disabled={loading} style={BP(loading)}>
              {loading?`⏳ ${prov.name} prediction তৈরি করছে...`:"🎯 AI Prediction নিন"}
            </button>
            {error&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:10,padding:"12px 14px",color:"#ff7070",fontSize:13}}>⚠️ {error}</div>}
            {result&&<ResultView r={result} onAdd={addAccum} pcolor={prov.color}/>}
          </div>
        )}

        {/* ACCUMULATOR */}
        {tab==="accumulator"&&(
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:15,padding:18}}>
              <h3 style={{margin:"0 0 14px",fontWeight:800,fontSize:15,color:"#c8d8e8"}}>🔗 Multi-Bet Accumulator</h3>
              {accum.length===0
                ?<p style={{color:"#334455",textAlign:"center",padding:"28px 0",fontSize:13}}>কোনো bet নেই। ম্যাচ বিশ্লেষণ করে যোগ করুন।</p>
                :<div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {accum.map(a=>(
                    <div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"9px 12px",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{flex:1,minWidth:0,marginRight:10}}>
                        <div style={{color:"#c8d8e8",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div>
                        <div style={{color:"#445566",fontSize:11,marginTop:1}}>{a.market}</div>
                      </div>
                      <span style={{color:"#00ff9d",fontWeight:900,fontSize:15,fontFamily:"monospace",marginRight:8}}>{a.prob}%</span>
                      <button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.18)",color:"#ff6060",borderRadius:6,padding:"2px 9px",cursor:"pointer",fontSize:11}}>✕</button>
                    </div>
                  ))}
                </div>
              }
            </div>
            {accum.length>0&&(
              <div style={{background:ap<30?"rgba(255,77,77,0.04)":"rgba(0,255,157,0.03)",border:`1px solid ${ap<30?"rgba(255,77,77,0.15)":"rgba(0,255,157,0.12)"}`,borderRadius:15,padding:18}}>
                <p style={{color:"#445566",fontSize:10,fontWeight:700,margin:"0 0 4px",letterSpacing:1}}>COMBINED PROBABILITY</p>
                <div style={{fontSize:40,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:5}}>{ap}%</div>
                <p style={{color:"#445566",fontSize:11,marginBottom:12}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
                <ProbBar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"}/>
                {ap<30&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.15)",borderRadius:9,padding:"10px 13px",marginTop:12}}>
                  <p style={{color:"#ff5555",fontSize:12,fontWeight:700,marginBottom:3}}>⚠️ HIGH RISK</p>
                  <p style={{color:"rgba(255,85,85,0.65)",fontSize:11,lineHeight:1.5}}>Multi-bet এ risk অনেক বেড়ে যায়। সাবধানে সিদ্ধান্ত নিন।</p>
                </div>}
              </div>
            )}
          </div>
        )}

        {/* ADMIN */}
        {tab==="admin"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {l:"AI Provider",v:prov.name,i:prov.icon},
              {l:"Status",v:prov.badge,i:"✅"},
              {l:"Sports",v:"5 Types",i:"🏆"},
              {l:"Markets",v:"30+",i:"📊"},
              {l:"Screenshot",v:cfg.pid==="groq"?"Text Only":"Vision AI",i:"📸"},
              {l:"Multi-Bet",v:"Active",i:"🔗"},
            ].map(c=>(
              <div key={c.l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:13,padding:14}}>
                <div style={{fontSize:20,marginBottom:6}}>{c.i}</div>
                <p style={{color:"#334455",fontSize:10,fontWeight:700,margin:"0 0 2px",letterSpacing:0.7}}>{c.l.toUpperCase()}</p>
                <p style={{color:prov.color,fontSize:15,fontWeight:900,fontFamily:"monospace"}}>{c.v}</p>
              </div>
            ))}
            <div style={{gridColumn:"1/-1",background:`${prov.color}08`,border:`1px solid ${prov.color}18`,borderRadius:13,padding:16}}>
              <p style={{color:prov.color,fontWeight:700,fontSize:13,marginBottom:10}}>🔄 Provider পরিবর্তন করুন</p>
              <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
                {PROVIDERS.map(p=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:5,background:cfg.pid===p.id?`${p.color}18`:"rgba(255,255,255,0.025)",border:`1px solid ${cfg.pid===p.id?p.color+"44":"rgba(255,255,255,0.07)"}`,borderRadius:9,padding:"6px 11px"}}>
                    <span style={{fontSize:12}}>{p.icon}</span>
                    <span style={{color:cfg.pid===p.id?p.color:"#667788",fontSize:11,fontWeight:600}}>{p.name}</span>
                    {cfg.pid===p.id&&<span style={{color:p.color,fontSize:9,fontWeight:800}}>✓</span>}
                  </div>
                ))}
              </div>
              <button onClick={reset} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:"9px 16px",cursor:"pointer",color:"#c8d8e8",fontWeight:700,fontSize:12}}>
                🔄 অন্য Provider / Key দিন
              </button>
            </div>
            <div style={{gridColumn:"1/-1",background:"rgba(255,193,7,0.03)",border:"1px solid rgba(255,193,7,0.15)",borderRadius:13,padding:14}}>
              <p style={{color:"#ffc107",fontWeight:700,marginBottom:4,fontSize:13}}>⚠️ Responsible Gambling</p>
              <p style={{color:"rgba(255,193,7,0.5)",fontSize:12,lineHeight:1.6}}>এই সিস্টেম probability analysis দেয়। কোনো result guaranteed নয়। সাবধানে বাজি ধরুন।</p>
            </div>
          </div>
        )}

        <p style={{textAlign:"center",marginTop:32,color:"#1a2a34",fontSize:10}}>PredictIQ · AI Sports Analysis · শুধু বিনোদন ও গবেষণার জন্য</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
