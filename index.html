// Storage
function getCfg(){try{const s=localStorage.getItem("piq7");return s?JSON.parse(s):null;}catch{return null;}}
function saveCfg(c){try{localStorage.setItem("piq7",JSON.stringify(c));}catch{}}
function clearCfg(){try{localStorage.removeItem("piq7");}catch{}}

// ── History Storage ──
const HIST_KEY="piq_hist_v1";
function getHistory(){try{const s=localStorage.getItem(HIST_KEY);return s?JSON.parse(s):[];}catch{return[];}}
function saveHistory(h){try{localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,500)));}catch{}}
function addPrediction(r){
  const h=getHistory();
  const best=r.predictions?.find(p=>p.best)||r.predictions?.[0];
  if(!best)return;
  const entry={
    id:"p_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    match:`${r.teamA} vs ${r.teamB}`,
    teamA:r.teamA,teamB:r.teamB,
    league:r.league||"Unknown",
    sport:r.sport||"Football",
    market:best.market,
    prediction:best.prediction,
    prob:best.prob,
    confidence:r.confidence||70,
    riskLevel:r.riskLevel||"Medium",
    analysis:r.analysis||"",
    time:Date.now(),
    result:null,// null=pending, true=win, false=loss
  };
  h.unshift(entry);
  saveHistory(h);
  return entry;
}
function updateResult(id,won){
  const h=getHistory();
  const idx=h.findIndex(x=>x.id===id);
  if(idx>=0){h[idx].result=won;saveHistory(h);}
}
function calcStats(h){
  const settled=h.filter(x=>x.result!==null);
  const wins=settled.filter(x=>x.result===true).length;
  const total=h.length;
  const acc=settled.length?Math.round((wins/settled.length)*100):0;
  // by market
  const mStats={};
  settled.forEach(x=>{
    if(!mStats[x.market])mStats[x.market]={w:0,t:0};
    mStats[x.market].t++;
    if(x.result)mStats[x.market].w++;
  });
  // by confidence
  const cStats={High:{w:0,t:0},Medium:{w:0,t:0},Low:{w:0,t:0}};
  settled.forEach(x=>{
    const c=x.confidence>=80?"High":x.confidence>=60?"Medium":"Low";
    cStats[c].t++;
    if(x.result)cStats[c].w++;
  });
  // by time
  const now=Date.now();
  const day=settled.filter(x=>now-x.time<86400000);
  const week=settled.filter(x=>now-x.time<604800000);
  const month=settled.filter(x=>now-x.time<2592000000);
  return{total,settled:settled.length,wins,acc,mStats,cStats,
    daily:day.length?Math.round((day.filter(x=>x.result).length/day.length)*100):null,
    weekly:week.length?Math.round((week.filter(x=>x.result).length/week.length)*100):null,
    monthly:month.length?Math.round((month.filter(x=>x.result).length/month.length)*100):null,
  };
}


// Utils
function oddsToProb(o){const n=parseFloat(o);if(!n||n<=1)return 50;return Math.round((1/n)*1000)/10;}
function combinedProb(arr){if(!arr.length)return 0;return Math.round(arr.reduce((p,m)=>p*(m.prob/100),1)*10000)/100;}
function slipRisk(p){if(p>=55)return{level:"Low",color:"#00ff9d",icon:"🟢"};if(p>=30)return{level:"Medium",color:"#ffc107",icon:"🟡"};if(p>=15)return{level:"High",color:"#ff8800",icon:"🔴"};return{level:"Very High",color:"#ff4d4d",icon:"🚨"};}
async function f2b(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}
function pj(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("{"),e=c.lastIndexOf("}");if(s<0||e<0)throw new Error("JSON error");return JSON.parse(c.slice(s,e+1));}
function pa(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("["),e=c.lastIndexOf("]");if(s<0||e<0)throw new Error("Array error");return JSON.parse(c.slice(s,e+1));}
function fmtTime(d){return new Date(d).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});}
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function isToday(d){const t=new Date();return t.toDateString()===new Date(d).toDateString();}
function isTomorrow(d){const t=new Date();t.setDate(t.getDate()+1);return t.toDateString()===new Date(d).toDateString();}
function matchSt(m){const s=m.status;if(["FINISHED","FT","AET"].includes(s))return{label:"Finished",color:"#445566",live:false};if(["IN_PLAY","LIVE","HT","PAUSED"].includes(s))return{label:"🔴 Live",color:"#ff4d4d",live:true};return{label:"Upcoming",color:"#00ff9d",live:false};}

// AI API
async function ai(pid,key,prompt){
  const h={"Content-Type":"application/json","Authorization":"Bearer "+key};
  if(pid==="groq"){const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="deepseek"){const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"deepseek-chat",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="kimi"){const r=await fetch("https://api.moonshot.cn/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"moonshot-v1-8k",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"gpt-4o-mini",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates[0].content.parts[0].text;}
  if(pid==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.content[0].text;}
  throw new Error("Unknown provider");
}

    const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;
  }
  // Kimi (Moonshot) — vision support আছে
  if(pid==="kimi"){
    const r=await fetch("https://api.moonshot.cn/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"moonshot-v1-8k-vision-preview",max_tokens:1200,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}},{type:"text",text:prompt}]}]})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;
  }
  // DeepSeek — vision model
  if(pid==="deepseek"){
    const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"deepseek-chat",max_tokens:1200,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}},{type:"text",text:prompt}]}]})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;
  }
  throw new Error("এই provider দিয়ে screenshot analysis করা যাচ্ছে না।");

async function predMatch(pid,key,m){
  const txt=await ai(pid,key,`Sports betting analyst. Match: ${m.teamA||m.home} vs ${m.teamB||m.away}, Sport:${m.sport||"Football"}, League:${m.league||"Unknown"}. Respond ONLY valid JSON no markdown: {"teamA":"${m.teamA||m.home}","teamB":"${m.teamB||m.away}","sport":"${m.sport||"Football"}","league":"${m.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`);
  return pj(txt);
}

async function predSlip(pid,key,matches){
  const data=matches.map((m,i)=>`#${i+1}:${m.teamA} vs ${m.teamB}|${m.market}|Odds:${m.odds}|Prob:${m.prob}%`).join("\n");
  const cp=combinedProb(matches);
  const txt=await ai(pid,key,`Betting risk analyst. Slip:\n${data}\nCombined:${cp}% Matches:${matches.length}\nRespond ONLY valid JSON no markdown: {"verdict":"<Safe to Play|Risky but Possible|Very Risky - Reconsider>","confidenceScore":<0-100>,"riskLevel":"<Low|Medium|High|Very High>","summary":"<3 sentences>","weakestMatchIndex":<0-based>,"matchAnalysis":[{"idx":<i>,"flag":"<Safe|Moderate|Risky|Very Risky>","reason":"<1-2 sentences>","alternative":"<safer or empty>"}],"suggestions":["<s1>","<s2>","<s3>","<s4>"],"whatIf":[{"removeIdx":<i>,"benefit":"<improvement>","shouldRemove":<true|false>}],"stakeAdvice":"<advice>","profitVsRisk":"<assessment>"}`);
  return pj(txt);
}

// ── BD Timezone Helpers ──
function toBDDateStr(offsetDays=0){
  const d=new Date(Date.now()+(6*3600000)+(offsetDays*86400000));
  return d.toISOString().split("T")[0];
}
function fmtTimeBD(utcStr){
  const d=new Date(new Date(utcStr).getTime()+(6*3600000));
  const h=d.getUTCHours(),m=d.getUTCMinutes();
  return `${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`;
}
function fmtDateBD(utcStr){
  const d=new Date(new Date(utcStr).getTime()+(6*3600000));
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${days[d.getUTCDay()]}, ${months[d.getUTCMonth()]} ${d.getUTCDate()}`;
}
function isTodayBD(utcStr){return new Date(new Date(utcStr).getTime()+(6*3600000)).toISOString().split("T")[0]===toBDDateStr(0);}
function isTomorrowBD(utcStr){return new Date(new Date(utcStr).getTime()+(6*3600000)).toISOString().split("T")[0]===toBDDateStr(1);}

// ── Football Data Fetch (5 proxy fallback) ──
async function fetchFD(fdKey,league,from,to){
  const parse=(d)=>(d.matches||[]).map(m=>({id:m.id,home:m.homeTeam?.shortName||m.homeTeam?.name||"Home",away:m.awayTeam?.shortName||m.awayTeam?.name||"Away",league:m.competition?.name||league,date:m.utcDate,status:m.status,matchday:m.matchday,homeScore:m.score?.fullTime?.home,awayScore:m.score?.fullTime?.away}));
  const apiUrl=`https://api.football-data.org/v4/competitions/${league}/matches?dateFrom=${from}&dateTo=${to}`;
  const sig=()=>AbortSignal.timeout(10000);
  const proxies=[
    async()=>{const r=await fetch(`https://cors.eu.org/${apiUrl}`,{headers:{"X-Auth-Token":fdKey},signal:sig()});if(!r.ok)throw new Error(`cors.eu ${r.status}`);const d=await r.json();if(d.matches===undefined)throw new Error("no matches");return d;},
    async()=>{const urlK=apiUrl+"&apikey="+fdKey;const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlK)}`,{signal:sig()});if(!r.ok)throw new Error("allorigins");const w=await r.json();const d=JSON.parse(w.contents);if(d.matches===undefined)throw new Error("no matches");return d;},
    async()=>{const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(apiUrl)}`,{headers:{"X-Auth-Token":fdKey},signal:sig()});if(!r.ok)throw new Error(`corsproxy ${r.status}`);const d=await r.json();if(d.matches===undefined)throw new Error("no matches");return d;},
    async()=>{const r=await fetch(`https://thingproxy.freeboard.io/fetch/${apiUrl}`,{headers:{"X-Auth-Token":fdKey},signal:sig()});if(!r.ok)throw new Error("thingproxy");const d=await r.json();if(d.matches===undefined)throw new Error("no matches");return d;},
    async()=>{const r=await fetch(apiUrl,{headers:{"X-Auth-Token":fdKey},signal:sig()});if(!r.ok){const e=await r.json();throw new Error(e.message||`HTTP ${r.status}`);}return r.json();},
  ];
  let lastErr="unknown";
  for(const fn of proxies){try{const d=await fn();if(d.matches!==undefined)return parse(d);}catch(e){lastErr=e.message;}}
  throw new Error(`Fixtures লোড ব্যর্থ: ${lastErr}`);
}

              <div style={{display:"flex",gap:8}}>
                <button onClick={doClear} style={{flex:1,background:"rgba(255,77,77,0.15)",border:"1px solid rgba(255,77,77,0.3)",color:"#ff4d4d",borderRadius:9,padding:"9px 0",cursor:"pointer",fontWeight:800,fontSize:12,WebkitTapHighlightColor:"transparent"}}>হ্যাঁ, মুছুন</button>
                <button onClick={()=>setShowClear(false)} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#8899aa",borderRadius:9,padding:"9px 0",cursor:"pointer",fontWeight:700,fontSize:12,WebkitTapHighlightColor:"transparent"}}>বাতিল</button>
              </div>
            </div>
          )}

          {/* Empty */}
          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"44px 20px",background:"rgba(255,255,255,0.015)",borderRadius:16,border:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{fontSize:42,marginBottom:11}}>📭</div>
              <p style={{color:"#c8d8e8",fontWeight:700,fontSize:14,marginBottom:6}}>{hist.length===0?"কোনো Prediction নেই":"কোনো result পাওয়া যায়নি"}</p>
              <p style={{color:"#2a3a44",fontSize:11}}>{hist.length===0?"Screenshot বা Manual ট্যাবে prediction নিন":"অন্য filter বেছে নিন"}</p>
            </div>
          )}

          {/* Cards */}
          {filtered.map((h)=>{
            const conf=h.confidence>=80?"High":h.confidence>=60?"Medium":"Low";
            const confCol=conf==="High"?"#00ff9d":conf==="Medium"?"#ffc107":"#ff8800";
            const rCol=h.result===true?"#00ff9d":h.result===false?"#ff4d4d":"#ffc107";
            const rLabel=h.result===true?"✅ Win":h.result===false?"❌ Loss":"⏳ Pending";
            const isMarking=markingId===h.id;
            return(
              <div key={h.id} style={{background:h.result===true?"rgba(0,255,157,0.03)":h.result===false?"rgba(255,77,77,0.03)":"rgba(255,255,255,0.02)",border:`1px solid ${h.result===true?"rgba(0,255,157,0.12)":h.result===false?"rgba(255,77,77,0.12)":"rgba(255,255,255,0.06)"}`,borderRadius:14,padding:"13px 13px",position:"relative",overflow:"hidden"}}>
                {h.result===true&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#00ff9d55,transparent)"}}/>}
                {h.result===false&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#ff4d4d55,transparent)"}}/>}

                {/* Match + result badge */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:7}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:"#fff",fontWeight:800,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.match}</div>
                    <div style={{color:"#445566",fontSize:9,marginTop:2}}>{h.league} · {fmtTime(h.time)}</div>
                  </div>
                  <span style={{color:rCol,fontSize:10,fontWeight:800,background:`${rCol}12`,border:`1px solid ${rCol}28`,padding:"4px 9px",borderRadius:10,flexShrink:0}}>{rLabel}</span>
                </div>

                {/* Tags */}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:h.result===null?10:0}}>
                  <span style={{background:"rgba(139,92,246,0.12)",color:"#a78bfa",fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:9,border:"1px solid rgba(139,92,246,0.22)"}}>{h.market}</span>
                  <span style={{background:"rgba(255,255,255,0.05)",color:"#c8d8e8",fontSize:10,fontWeight:600,padding:"3px 9px",borderRadius:9}}>{h.prediction}</span>
                  <span style={{background:`${confCol}12`,color:confCol,fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:9,border:`1px solid ${confCol}28`}}>{conf} {h.prob}%</span>
                </div>

                {/* Mark result */}
                {h.result===null&&(
                  isMarking?(
                    <div style={{display:"flex",gap:7}}>
                      <button onTouchEnd={(e)=>{e.preventDefault();doMark(h.id,true);}} onClick={()=>doMark(h.id,true)}
                        style={{flex:1,background:"rgba(0,255,157,0.1)",border:"1px solid rgba(0,255,157,0.28)",color:"#00ff9d",borderRadius:10,padding:"10px 0",cursor:"pointer",fontSize:13,fontWeight:900,WebkitTapHighlightColor:"transparent"}}>
                        ✅ Win
                      </button>
                      <button onTouchEnd={(e)=>{e.preventDefault();doMark(h.id,false);}} onClick={()=>doMark(h.id,false)}
                        style={{flex:1,background:"rgba(255,77,77,0.1)",border:"1px solid rgba(255,77,77,0.28)",color:"#ff4d4d",borderRadius:10,padding:"10px 0",cursor:"pointer",fontSize:13,fontWeight:900,WebkitTapHighlightColor:"transparent"}}>
                        ❌ Loss
                      </button>
                      <button onTouchEnd={(e)=>{e.preventDefault();setMarkingId(null);}} onClick={()=>setMarkingId(null)}
                        style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",color:"#445566",borderRadius:10,padding:"10px 12px",cursor:"pointer",fontSize:12,WebkitTapHighlightColor:"transparent"}}>
                        ✕
                      </button>
                    </div>
                  ):(
                    <button onTouchEnd={(e)=>{e.preventDefault();setMarkingId(h.id);}} onClick={()=>setMarkingId(h.id)}
                      style={{width:"100%",background:"rgba(255,193,7,0.06)",border:"1px solid rgba(255,193,7,0.18)",color:"#ffc107",borderRadius:10,padding:"9px 0",cursor:"pointer",fontSize:11,fontWeight:700,WebkitTapHighlightColor:"transparent"}}>
                      ⚡ Result আপডেট করুন
                    </button>
                  )
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


function SlipTab({cfg}){

  const [msg,setMsg]=useState("");

  const cp=combinedProb(sms);const ri=slipRisk(cp);
  const tot=sms.reduce((p,m)=>p*parseFloat(m.odds||1),1);
  const ret=stake?Math.round(parseFloat(stake)*tot*100)/100:null;
  const addM=()=>{if(!form.teamA.trim()||!form.teamB.trim()||!form.odds)return;setSms(m=>[...m,{...form,prob:oddsToProb(form.odds),id:Date.now()}]);setForm(f=>({...f,teamA:"",teamB:"",odds:""}));setAn(null);setEr(null);};

  const wip=i=>combinedProb(sms.filter((_,j)=>j!==i));
  const vc=an?VC[an.verdict]||"#ffc107":"#ffc107";
  const fc={Safe:"#00ff9d",Moderate:"#ffc107",Risky:"#ff8800","Very Risky":"#ff4d4d"};
  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"9px 10px",color:"#e0e6f0",fontSize:12,outline:"none",width:"100%"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}><div style={{width:38,height:38,borderRadius:11,background:"rgba(255,193,7,0.12)",border:"1px solid rgba(255,193,7,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📊</div><div><h2 style={{color:"#fff",fontSize:15,fontWeight:900,margin:0}}>BetSlip <span style={{color:"#ffc107"}}>Analyzer</span></h2><p style={{color:"#334455",fontSize:10,margin:0}}>Risk Assessment · Weak Match · Smart Suggestions</p></div></div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{["⚠️ Risk","💡 Suggestions","🔮 What-If","💰 Stake Advice"].map(f=><span key={f} style={{background:"rgba(255,193,7,0.07)",border:"1px solid rgba(255,193,7,0.12)",borderRadius:20,padding:"2px 8px",fontSize:9,color:"#ffc107",fontWeight:600}}>{f}</span>)}</div>
      </div>
      {/* Add form */}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:13,padding:13}}>
        <p style={{color:"#ffc107",fontWeight:800,fontSize:12,margin:"0 0 10px"}}>➕ Match যোগ করুন</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}><input placeholder="Team A" value={form.teamA} onChange={e=>setForm(f=>({...f,teamA:e.target.value}))} style={INP}/><input placeholder="Team B" value={form.teamB} onChange={e=>setForm(f=>({...f,teamB:e.target.value}))} style={INP}/></div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:6,marginBottom:form.odds&&parseFloat(form.odds)>1?6:10}}>
          <div style={{position:"relative"}}><select value={form.market} onChange={e=>setForm(f=>({...f,market:e.target.value}))} style={{...INP,paddingRight:26,cursor:"pointer"}}>{SLIP_MARKETS.map(m=><option key={m} value={m} style={{background:"#0a0f1a"}}>{m}</option>)}</select><span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",color:"#2a3a44",pointerEvents:"none",fontSize:9}}>▼</span></div>
          <input placeholder="Odds 1.85" value={form.odds} onChange={e=>setForm(f=>({...f,odds:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addM()} type="number" step="0.01" min="1.01" style={INP}/>

        <button onClick={addM} disabled={!form.teamA.trim()||!form.teamB.trim()||!form.odds} style={{width:"100%",background:form.teamA&&form.teamB&&form.odds?"linear-gradient(135deg,#ffc107,#ff9800)":"rgba(255,193,7,0.06)",border:"none",borderRadius:8,padding:"10px",cursor:form.teamA&&form.teamB&&form.odds?"pointer":"not-allowed",color:form.teamA&&form.teamB&&form.odds?"#060a10":"#2a3a44",fontWeight:900,fontSize:12}}>➕ Slip এ যোগ করুন</button>

      {sms.length>0&&<div style={{background:`linear-gradient(135deg,${ri.color}04,transparent)`,border:`1.5px solid ${ri.color}20`,borderRadius:13,padding:13}}>

        <div style={{background:"rgba(255,77,77,0.02)",border:"1px solid rgba(255,77,77,0.06)",borderRadius:9,padding:"9px 11px"}}><p style={{color:"rgba(255,77,77,0.45)",fontSize:9,lineHeight:1.6}}>⚠️ <strong style={{color:"rgba(255,77,77,0.6)"}}>Responsible Gambling:</strong> এই বিশ্লেষণ decision-support। কোনো result guaranteed নয়।</p></div>

}

  const runManual=async()=>{if(!tA||!tB){setEr("Team name দিন।");return;}setLoad(true);setEr(null);setManR(null);try{setMsg(`🤖 ${tA} vs ${tB}...`);const res=await predMatch(cfg.pid,cfg.key,{teamA:tA,teamB:tB,sport,league,rawOdds:sm.join(",")});setManR(res);addPrediction(res);}catch(e){setEr(e.message);}setLoad(false);setMsg("");};

  const addAcc=(r)=>{const b=r.predictions?.find(p=>p.best)||r.predictions?.[0];if(!b)return;setAccum(a=>[...a,{match:`${r.teamA} vs ${r.teamB}`,market:`${b.market}: ${b.prediction}`,prob:b.prob,id:Date.now()}]);};
  const reset=()=>{clearCfg();setCfg(null);};
  const togM=m=>setSm(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"12px 13px",color:"#e0e6f0",fontSize:14,outline:"none",width:"100%"};

    {id:"accumulator",icon:"🔗",label:accum.length?`Accum(${accum.length})`:"Accum"},
    {id:"history",icon:"📈",label:"History",hc:"#a78bfa"},

        {tab==="accumulator"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:13,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}><p style={{color:"#c8d8e8",fontWeight:800,fontSize:12}}>🔗 Multi-Bet Accumulator</p>{accum.length>0&&<button onClick={()=>setAccum([])} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.11)",color:"#ff6060",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:9}}>🗑️</button>}</div>
            {accum.length===0?<p style={{color:"#0a1418",textAlign:"center",padding:"20px 0",fontSize:11}}>কোনো bet নেই।</p>:<div style={{display:"flex",flexDirection:"column",gap:5}}>{accum.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.012)",borderRadius:7,padding:"7px 10px",border:"1px solid rgba(255,255,255,0.03)"}}><div style={{flex:1,minWidth:0,marginRight:7}}><div style={{color:"#c8d8e8",fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div><div style={{color:"#1a2a34",fontSize:9,marginTop:1}}>{a.market}</div></div><span style={{color:"#00ff9d",fontWeight:900,fontSize:13,fontFamily:"monospace",marginRight:6}}>{a.prob}%</span><button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.1)",color:"#ff6060",borderRadius:4,padding:"1px 6px",cursor:"pointer",fontSize:9}}>✕</button></div>)}</div>}
          </div>
          {accum.length>0&&<div style={{background:ap<30?"rgba(255,77,77,0.03)":"rgba(0,255,157,0.02)",border:`1px solid ${ap<30?"rgba(255,77,77,0.1)":"rgba(0,255,157,0.08)"}`,borderRadius:13,padding:14}}>
            <p style={{color:"#0e1a20",fontSize:8,fontWeight:700,letterSpacing:1,margin:"0 0 3px"}}>COMBINED</p>
            <div style={{fontSize:36,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:3}}>{ap}%</div>
            <p style={{color:"#0e1a20",fontSize:9,marginBottom:9}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
            <Bar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"} h={6}/>
            {ap<30&&<div style={{background:"rgba(255,77,77,0.04)",border:"1px solid rgba(255,77,77,0.09)",borderRadius:7,padding:"7px 10px",marginTop:9}}><p style={{color:"#ff5555",fontSize:9,fontWeight:700}}>⚠️ Multi-bet এ risk অনেক বেড়ে যায়।</p></div>}
          </div>}
        </div>}

        {/* History */}
        {tab==="history"&&<HistoryTab pv={pv}/>}

        {/* Admin */}
        {tab==="admin"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{l:"AI",v:pv.name,i:pv.icon},{l:"Status",v:pv.badge==="FREE"?"Free":"Paid",i:"✅"},{l:"Sports",v:"5",i:"🏆"},{l:"Markets",v:"30+",i:"📊"},{l:"BetSlip",v:"Active",i:"📊"}].map(c=><div key={c.l} style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.03)",borderRadius:11,padding:12}}><div style={{fontSize:17,marginBottom:5}}>{c.i}</div><p style={{color:"#0a1418",fontSize:8,fontWeight:700,margin:"0 0 2px",letterSpacing:0.5}}>{c.l.toUpperCase()}</p><p style={{color:pv.color,fontSize:12,fontWeight:900,fontFamily:"monospace"}}>{c.v}</p></div>)}
          <div style={{gridColumn:"1/-1",background:`${pv.color}05`,border:`1px solid ${pv.color}11`,borderRadius:11,padding:12}}>
            <p style={{color:pv.color,fontWeight:700,fontSize:11,marginBottom:8}}>🔄 All Providers</p>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:9}}>{PROVIDERS.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:3,background:cfg.pid===p.id?`${p.color}13`:"rgba(255,255,255,0.018)",border:`1px solid ${cfg.pid===p.id?p.color+"30":"rgba(255,255,255,0.04)"}`,borderRadius:7,padding:"4px 8px"}}><span style={{fontSize:10}}>{p.icon}</span><span style={{color:cfg.pid===p.id?p.color:"#334455",fontSize:9,fontWeight:600}}>{p.name}</span>{cfg.pid===p.id&&<span style={{color:p.color,fontSize:7,fontWeight:900}}>✓</span>}</div>)}</div>
            <button onClick={reset} style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:7,padding:"6px 11px",cursor:"pointer",color:"#c8d8e8",fontWeight:700,fontSize:10}}>🔄 Provider পরিবর্তন</button>
          </div>
          <div style={{gridColumn:"1/-1",background:"rgba(255,77,77,0.02)",border:"1px solid rgba(255,77,77,0.06)",borderRadius:11,padding:11}}><p style={{color:"rgba(255,77,77,0.45)",fontSize:9,lineHeight:1.6}}>⚠️ <strong style={{color:"rgba(255,77,77,0.55)"}}>Responsible Gambling:</strong> শুধু probability analysis। কোনো result guaranteed নয়।</p></div>
        </div>}

        <p style={{textAlign:"center",marginTop:28,color:"#1a2a34",fontSize:10}}>PredictIQ · AI Sports Analysis · শুধু বিনোদন ও গবেষণার জন্য</p>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
