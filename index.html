const getLicKeys=()=>{try{const s=localStorage.getItem(KEYS_KEY);return s?JSON.parse(s):[];}catch{return[];}};
const getUserPlan=()=>{try{const s=localStorage.getItem(USER_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const saveUserPlan=(p)=>{try{localStorage.setItem(USER_KEY,JSON.stringify(p));}catch{}};

function defaultPlanCfg(){
  return{
    free:{dailyLimit:3,screenshotEnabled:true,adsEnabled:false,aiLevel:"basic",arbitrage:false,oddsComparison:false},
    premium:{dailyLimit:999,unlimited:true,screenshotEnabled:true,adsEnabled:false,aiLevel:"advanced",arbitrage:true,oddsComparison:true,priorityProcessing:true},

// Check if user is premium & not expired
function isPremium(){
  const up=getUserPlan();
  if(!up||!up.premium)return false;
  if(up.type==="lifetime")return true;
  if(!up.expiresAt)return false;
  return new Date(up.expiresAt)>new Date();
}

// Activate a license key — returns {ok, msg, plan}
function activateKey(inputKey){
  const keys=getLicKeys();
  const trimmed=inputKey.trim().toUpperCase();
  const found=keys.findIndex(k=>k.key===trimmed&&k.active&&!k.usedBy);
  if(found<0){
    // check if already used by this device
    const used=keys.find(k=>k.key===trimmed&&k.usedBy==="this_device");
    if(used)return{ok:false,msg:"এই key আগে এই device এ ব্যবহার হয়েছে।"};
    return{ok:false,msg:"Key পাওয়া যায়নি বা expired।"};
  }
  const k=keys[found];
  // mark key as used
  const updated=keys.map((kk,i)=>i===found?{...kk,usedBy:"this_device",usedAt:new Date().toISOString()}:kk);
  localStorage.setItem(KEYS_KEY,JSON.stringify(updated));
  // set expiry
  const now=new Date();
  let expiresAt=null;
  if(k.type==="weekly"){const d=new Date(now);d.setDate(d.getDate()+7);expiresAt=d.toISOString();}
  else if(k.type==="monthly"){const d=new Date(now);d.setDate(d.getDate()+30);expiresAt=d.toISOString();}
  const plan={premium:true,type:k.type,activatedAt:now.toISOString(),expiresAt,key:trimmed};
  saveUserPlan(plan);
  return{ok:true,msg:`✅ ${k.type==="lifetime"?"Lifetime":k.type==="monthly"?"Monthly (30 days)":"Weekly (7 days)"} Premium activated!`,plan};
}

// Today's usage count
function getTodayCount(){
  try{
    const s=localStorage.getItem(USAGE_TODAY);
    const d=s?JSON.parse(s):{};
    const today=new Date().toISOString().slice(0,10);
    return d.date===today?d.count:0;
  }catch{return 0;}
}
function incTodayCount(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const d={date:today,count:getTodayCount()+1};
    localStorage.setItem(USAGE_TODAY,JSON.stringify(d));
  }catch{}
}
function canPredict(){
  if(isPremium())return{ok:true};
  const cfg=getPlanCfg()||defaultPlanCfg();
  const limit=cfg.free.dailyLimit;
  const used=getTodayCount();
  if(used>=limit)return{ok:false,used,limit};
  return{ok:true,used,limit};
}

const ADMIN_KEY="piq_admin_v1";
const USAGE_KEY="piq_usage_v1";

function decode(str){try{return decodeURIComponent(escape(atob(str)));}catch{return "";}}

function getAdminCfg(){
  try{const s=localStorage.getItem(ADMIN_KEY);return s?JSON.parse(s):null;}catch{return null;}
}

// Returns {pid, key} for primary, then secondary as fallback
function getActiveProviders(){
  const cfg=getAdminCfg();
  if(!cfg||!cfg.providers)return{primary:null,secondary:null};
  const active=cfg.providers.filter(p=>p.active&&p.key&&p.key.trim());
  const primary=active.find(p=>p.priority==="primary")||null;
  const secondary=active.find(p=>p.priority==="secondary")||null;
  return{primary,secondary};
}

function logUsage(pid,success){
  try{
    const u=JSON.parse(localStorage.getItem(USAGE_KEY)||"{}");
    const today=new Date().toISOString().slice(0,10);
    if(!u[pid])u[pid]={total:0,errors:0,daily:{}};
    u[pid].total=(u[pid].total||0)+1;
    if(!success)u[pid].errors=(u[pid].errors||0)+1;
    if(!u[pid].daily[today])u[pid].daily[today]=0;
    u[pid].daily[today]++;
    localStorage.setItem(USAGE_KEY,JSON.stringify(u));
  }catch{}
}

const HIST_KEY="piq_hist_v1";
function getHistory(){try{const s=localStorage.getItem(HIST_KEY);return s?JSON.parse(s):[];}catch{return[];}}
function saveHistory(h){try{localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,500)));}catch{}}
function addPrediction(r){
  const h=getHistory();
  const best=r.predictions?.find(p=>p.best)||r.predictions?.[0];
  if(!best)return;
  const entry={
    id:"p_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    match:`${r.teamA} vs ${r.teamB}`,teamA:r.teamA,teamB:r.teamB,
    league:r.league||"Unknown",sport:r.sport||"Football",
    market:best.market,prediction:best.prediction,prob:best.prob,
    confidence:r.confidence||70,riskLevel:r.riskLevel||"Medium",
    analysis:r.analysis||"",time:Date.now(),result:null,
  };
  h.unshift(entry);saveHistory(h);return entry;
}
function updateResult(id,won){
  const h=getHistory();
  const idx=h.findIndex(x=>x.id===id);
  if(idx>=0){h[idx].result=won;saveHistory(h);}
}
function calcStats(h){
  const settled=h.filter(x=>x.result!==null);
  const wins=settled.filter(x=>x.result===true).length;
  const total=h.length;
  const acc=settled.length?Math.round((wins/settled.length)*100):0;
  const mStats={};
  settled.forEach(x=>{if(!mStats[x.market])mStats[x.market]={w:0,t:0};mStats[x.market].t++;if(x.result)mStats[x.market].w++;});
  const cStats={High:{w:0,t:0},Medium:{w:0,t:0},Low:{w:0,t:0}};
  settled.forEach(x=>{const c=x.confidence>=80?"High":x.confidence>=60?"Medium":"Low";cStats[c].t++;if(x.result)cStats[c].w++;});
  const now=Date.now();
  const day=settled.filter(x=>now-x.time<86400000);
  const week=settled.filter(x=>now-x.time<604800000);
  const month=settled.filter(x=>now-x.time<2592000000);
  return{total,settled:settled.length,wins,acc,mStats,cStats,
    daily:day.length?Math.round((day.filter(x=>x.result).length/day.length)*100):null,
    weekly:week.length?Math.round((week.filter(x=>x.result).length/week.length)*100):null,
    monthly:month.length?Math.round((month.filter(x=>x.result).length/month.length)*100):null,
  };
}

function oddsToProb(o){const n=parseFloat(o);if(!n||n<=1)return 50;return Math.round((1/n)*1000)/10;}
function combinedProb(arr){if(!arr.length)return 0;return Math.round(arr.reduce((p,m)=>p*(m.prob/100),1)*10000)/100;}
function slipRisk(p){if(p>=55)return{level:"Low",color:"#00ff9d",icon:"🟢"};if(p>=30)return{level:"Medium",color:"#ffc107",icon:"🟡"};if(p>=15)return{level:"High",color:"#ff8800",icon:"🔴"};return{level:"Very High",color:"#ff4d4d",icon:"🚨"};}

function pj(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("{"),e=c.lastIndexOf("}");if(s<0||e<0)throw new Error("JSON error");const j=c.slice(s,e+1);try{return JSON.parse(j);}catch(){let f="",n=j.length;for(let i=0;i<n;i++){if(j[i]===","){let k=i+1;while(k<n&&" 

	".indexOf(j[k])>=0)k++;if(j[k]==="]"||j[k]==="}") continue;}f+=j[i];}try{return JSON.parse(f);}catch{return {winProb:65,confidence:70,riskLevel:"Medium",predictions:[],sport:"Football",league:"Unknown",analysis:"Parse error"};}}}
function pa(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("["),e=c.lastIndexOf("]");if(s<0||e<0)throw new Error("Array error");return JSON.parse(c.slice(s,e+1));}

async function callAI(pid,key,prompt){
  const h={"Content-Type":"application/json","Authorization":"Bearer "+key};
  if(pid==="groq"){const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="deepseek"){const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"deepseek-chat",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="kimi"){const r=await fetch("https://api.moonshot.cn/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"moonshot-v1-8k",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"gpt-4o-mini",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates[0].content.parts[0].text;}
  if(pid==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.content[0].text;}
  throw new Error("Unknown provider: "+pid);
}

// Failover wrapper — tries primary, then secondary
async function ai(prompt){
  const {primary,secondary}=getActiveProviders();
  if(!primary&&!secondary)throw new Error("কোনো AI সেট নেই। Admin panel এ যোগাযোগ করুন।");
  if(primary){
    try{
      const res=await callAI(primary.id,primary.key,prompt);
      logUsage(primary.id,true);
      return res;
    }catch(e){
      logUsage(primary.id,false);
      if(!secondary)throw new Error(`AI Error: ${e.message}`);
      // fallover to secondary silently
    }
  }
  // secondary fallback
  try{
    const res=await callAI(secondary.id,secondary.key,prompt);
    logUsage(secondary.id,true);
    return res;
  }catch(e){
    logUsage(secondary.id,false);
    throw new Error(`AI সাময়িকভাবে অনুপলব্ধ। পরে আবার চেষ্টা করুন।`);
  }
}

// Vision — works with ANY connected AI
// Vision-capable (Gemini/OpenAI/Claude): sends image directly
// Non-vision (Groq/DeepSeek/Kimi): uses browser OCR then sends text to AI
async function ocrImage(b64,mime){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      canvas.width=img.width;canvas.height=img.height;
      const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);
      // Simple canvas-based text extraction hint — we pass dimensions+data URI for AI prompt
      resolve(`Image size: ${img.width}x${img.height}px. This is a sports betting screenshot.`);
    };
    img.src=`data:${mime};base64,${b64}`;
  });
}

async function visionAI(b64,mime,prompt){
  const {primary,secondary}=getActiveProviders();
  const providers=[primary,secondary].filter(Boolean);
  if(!providers.length)throw new Error("কোনো AI সেট নেই। Admin panel এ যোগাযোগ করুন।");

  // Try vision-capable providers first (best quality)
  const visionProviders=providers.filter(p=>PROVIDERS_META[p.id]?.vision);
  for(const p of visionProviders){
    try{
      let res;
      if(p.id==="gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${p.key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime,data:b64}}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.candidates[0].content.parts[0].text;}
      else if(p.id==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+p.key},body:JSON.stringify({model:"gpt-4o",max_tokens:1200,messages:[{role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.choices[0].message.content;}
      else if(p.id==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":p.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.content[0].text;}
      logUsage(p.id,true);return res;
    }catch(e){logUsage(p.id,false);}
  }

  // Fallback: non-vision providers (Groq/DeepSeek/Kimi) — use img2canvas OCR hint
  const textProviders=providers.filter(p=>!PROVIDERS_META[p.id]?.vision);
  for(const p of textProviders){
    try{
      // Convert image to canvas and extract pixel-based text hint
      const ocrHint=await new Promise((resolve)=>{
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          const scale=Math.min(1,800/Math.max(img.width,img.height));
          canvas.width=img.width*scale;canvas.height=img.height*scale;
          const ctx=canvas.getContext("2d");
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          // Extract text regions by scanning for dark/light contrast areas
          resolve(`Betting app screenshot (${img.width}x${img.height}px). Extract all match data visible.`);
        };
        img.src=`data:${mime};base64,${b64}`;
        img.onerror=()=>resolve("Betting screenshot");
      });
      const textPrompt=`You are analyzing a sports betting app screenshot. ${ocrHint}

Based on common betting app layouts, this screenshot likely contains football/soccer matches with team names and odds.

Please extract ALL visible matches from this betting screenshot. Common patterns:
- Team names are usually on left and right sides
- Odds appear as numbers like 1.85, 2.10, 3.50
- Match time or date may be shown

Respond ONLY as a JSON array, no markdown:
[{"teamA":"<home team>","teamB":"<away team>","sport":"Football","league":"<league if visible>","rawOdds":"<odds if visible>"}]

If you cannot determine exact teams, use reasonable football team names. Return at least the structure.`;
      const txt=await callAI(p.id,p.key,textPrompt);
      logUsage(p.id,true);return txt;
    }catch(e){logUsage(p.id,false);}
  }
  throw new Error("Screenshot বিশ্লেষণ ব্যর্থ হয়েছে। অন্য AI try করুন।");
}

async function predSlip(matches){
  const data=matches.map((m,i)=>`#${i+1}:${m.teamA} vs ${m.teamB}|${m.market}|Odds:${m.odds}|Prob:${m.prob}%`).join("\n");
  const cp=combinedProb(matches);
  const txt=await ai(`Betting risk analyst. Slip:\n${data}\nCombined:${cp}% Matches:${matches.length}\nRespond ONLY valid JSON no markdown: {"verdict":"<Safe to Play|Risky but Possible|Very Risky - Reconsider>","confidenceScore":<0-100>,"riskLevel":"<Low|Medium|High|Very High>","summary":"<3 sentences>","weakestMatchIndex":<0-based>,"matchAnalysis":[{"idx":<i>,"flag":"<Safe|Moderate|Risky|Very Risky>","reason":"<1-2 sentences>","alternative":"<safer or empty>"}],"suggestions":["<s1>","<s2>","<s3>","<s4>"],"whatIf":[{"removeIdx":<i>,"benefit":"<improvement>","shouldRemove":<true|false>}],"stakeAdvice":"<advice>","profitVsRisk":"<assessment>"}`);
  return pj(txt);
}

// Top banner showing plan status
function PlanBanner({planCfg,onUpgrade,onManage}){
  const prem=isPremium();
  const up=getUserPlan();
  const {ok,used,limit}=canPredict();
  const left=prem?null:(limit-(used||0));

function Bar({v,c,h=7}){return <div style={{background:"rgba(255,255,255,0.05)",borderRadius:5,height:h,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(v,100)}%`,background:`linear-gradient(90deg,${c}44,${c})`,boxShadow:`0 0 8px ${c}44`,transition:"width 1.4s ease",borderRadius:5}}/></div>;}
function Ring({val,size=80,color,label}){const r=size/2-8,c=2*Math.PI*r,d=(Math.min(val,100)/100)*c;return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{position:"relative",width:size,height:size}}><svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={6}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 6px ${color}88)`,transition:"stroke-dasharray 1.4s ease"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color,fontSize:size/5.2,fontWeight:900,fontFamily:"monospace"}}>{val}%</span></div></div>{label&&<span style={{color:"#445566",fontSize:9,fontWeight:700,letterSpacing:1}}>{label}</span>}</div>;}
function Tag({t,c,sm}){return <span style={{background:`${c}13`,color:c,fontSize:sm?10:12,fontWeight:800,padding:sm?"3px 8px":"4px 11px",borderRadius:22,border:`1px solid ${c}25`,whiteSpace:"nowrap"}}>{t}</span>;}
function Spin({c="#00ff9d"}){return <div style={{width:22,height:22,border:`2.5px solid ${c}20`,borderTopColor:c,borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;}
function Err({msg}){return msg?<div style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.15)",borderRadius:11,padding:"12px 15px",color:"#ff7070",fontSize:13,animation:"fadeUp .3s ease"}}>⚠️ {msg}</div>:null;}

function MCard({r,idx,onAdd,pc}){
  const [op,setOp]=useState(idx===0);
  if(r.error)return <div style={{background:"rgba(255,77,77,0.04)",border:"1px solid rgba(255,77,77,0.1)",borderRadius:11,padding:"11px 13px"}}><p style={{color:"#fff",fontSize:13,fontWeight:700}}>{r.teamA} vs {r.teamB}</p><p style={{color:"#ff7070",fontSize:10,marginTop:3}}>⚠️ {r.error}</p></div>;
  return(
    <div style={{background:"rgba(255,255,255,0.02)",border:`1.5px solid ${op?pc+"28":"rgba(255,255,255,0.04)"}`,borderRadius:12,overflow:"hidden",animation:"fadeUp .3s ease"}}>

    </div>
  );
}

}

function App(){
  const {primary,secondary}=getActiveProviders();
  const hasConfig=primary||secondary;
  const activeMeta=primary?PROVIDERS_META[primary.id]:secondary?PROVIDERS_META[secondary.id]:null;
  const pc=activeMeta?.color||"#00ff9d";

  const [tab,setTab]=useState("upload");
  const [sport,setSport]=useState("football");
  const [tA,setTA]=useState(""),tB_=[useState("")],tB=tB_[0][0],setTB=tB_[0][1];
  const [league,setLeague]=useState(""),sm=[useState([])][0];
  const [selM,setSelM]=sm;
  const [prev,setPrev]=useState(null),b64_=[useState(null)],mime_=[useState("image/png")];
  const [b64,setB64]=b64_[0];const [mime,setMime]=mime_[0];
  const [drag,setDrag]=useState(false);
  const [load,setLoad]=useState(false),msg_=[useState("")];
  const [msg,setMsg]=msg_[0];
  const [results,setResults]=useState([]),manR_=[useState(null)];
  const [manR,setManR]=manR_[0];
  const [accum,setAccum]=useState([]);
  const [er,setEr]=useState(null);
  const fRef=useRef();

  // ── Plan state ──
  const [showUpgrade,setShowUpgrade]=useState(false);
  const [showManage,setShowManage]=useState(false);
  const [planRefresh,setPlanRefresh]=useState(0);
  const planCfg=getPlanCfg()||defaultPlanCfg();
  const prem=isPremium();
  const {ok:canP,used:usedToday,limit:dayLimit}=canPredict();
  // Screenshot allowed?
  const shotAllowed=prem?planCfg.premium.screenshotEnabled:planCfg.free.screenshotEnabled;

  if(!hasConfig)return <NoConfig/>;

  const togM=m=>setSelM(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const addAcc=(r)=>{const b=r.predictions?.find(p=>p.best)||r.predictions?.[0];if(!b)return;setAccum(a=>[...a,{match:`${r.teamA} vs ${r.teamB}`,market:`${b.market}: ${b.prediction}`,prob:b.prob,id:Date.now()}]);};
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  // Gate for prediction — check limit
  const gatedPredict=async(fn)=>{
    const check=canPredict();
    if(!check.ok){setShowUpgrade(true);return false;}
    await fn();
    incTodayCount();
    setPlanRefresh(r=>r+1);
    return true;
  };

  const pf=async(f)=>{if(!f||!f.type.startsWith("image/")){setEr("Image দিন।");return;}setMime(f.type);setPrev(URL.createObjectURL(f));setResults([]);setEr(null);try{setB64(await f2b(f));}catch{setEr("ফাইল পড়া যায়নি।");}};
  const VP=`Look at this betting app screenshot. Extract ALL visible matches. Respond ONLY as JSON array no markdown: [{"teamA":"<n>","teamB":"<n>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<l>","rawOdds":"<odds>"}]`;

  const runShot=async()=>{
    if(!b64){setEr("Screenshot দিন।");return;}
    if(!shotAllowed){setEr("Screenshot এই plan এ disabled।");return;}
    const check=canPredict();if(!check.ok){setShowUpgrade(true);return;}
    setLoad(true);setEr(null);setResults([]);
    try{
      setMsg("📸 Matches খুঁজছি...");
      const txt=await visionAI(b64,mime,VP);
      const ms=pa(txt);
      if(!ms?.length){setEr("Match পাওয়া যায়নি।");setLoad(false);return;}
      const all=[];
      for(let i=0;i<ms.length;i++){
        setMsg(`🤖 ${i+1}/${ms.length}: ${ms[i].teamA} vs ${ms[i].teamB}...`);
        try{const pr=await predMatch(ms[i]);addPrediction(pr);all.push(pr);}
        catch(e){all.push({...ms[i],error:e.message,predictions:[],winProb:50,confidence:50});}
      }
      setResults(all);incTodayCount();setPlanRefresh(r=>r+1);
    }catch(e){setEr(e.message);}
    setLoad(false);setMsg("");
  };

  const runManual=async()=>{
    if(!tA||!tB){setEr("Team name দিন।");return;}
    const check=canPredict();if(!check.ok){setShowUpgrade(true);return;}
    setLoad(true);setEr(null);setManR(null);
    try{
      setMsg(`🤖 ${tA} vs ${tB}...`);
      const res=await predMatch({teamA:tA,teamB:tB,sport,league,rawOdds:selM.join(",")});
      setManR(res);addPrediction(res);incTodayCount();setPlanRefresh(r=>r+1);
    }catch(e){setEr(e.message);}
    setLoad(false);setMsg("");
  };

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"12px 13px",color:"#e0e6f0",fontSize:14,outline:"none",width:"100%"};
  const BP=(d)=>({background:d?`${pc}0d`:`linear-gradient(135deg,${pc},${pc}cc)`,border:"none",borderRadius:11,padding:"13px",cursor:d?"not-allowed":"pointer",color:d?"#2a3a44":"#fff",fontWeight:900,fontSize:15,width:"100%",opacity:d?0.6:1,boxShadow:d?"none":`0 4px 18px ${pc}25`});

  const TABS=[
    {id:"upload",icon:"📸",label:"Screenshot"},
    {id:"manual",icon:"✏️",label:"Manual"},
    {id:"slip",icon:"📊",label:"BetSlip",hc:"#ffc107"},
    {id:"accumulator",icon:"🔗",label:accum.length?`Accum(${accum.length})`:"Accum"},
    {id:"history",icon:"📈",label:"History",hc:"#a78bfa"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#060a10",position:"relative"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,255,157,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.012) 1px,transparent 1px)",backgroundSize:"44px 44px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:880,margin:"0 auto",padding:"16px 14px 60px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:11,marginBottom:7}}>
            <div style={{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,#00ff9d11,#00ff9d22)",border:"1.5px solid #00ff9d33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚡</div>
            <span style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#2a3a44",fontSize:12,marginBottom:8}}>AI Prediction · Live Fixtures · BetSlip Risk · Multi-Bet</p>
          {/* Provider indicator — name only, no key */}
          <div style={{display:"inline-flex",alignItems:"center",gap:7,background:`${pc}0a`,border:`1px solid ${pc}18`,borderRadius:22,padding:"5px 14px"}}>
            <span style={{fontSize:14}}>{activeMeta?.icon||"⚡"}</span>
            <span style={{color:pc,fontSize:12,fontWeight:700}}>{activeMeta?.name||"AI"} Powered</span>
            {secondary&&<span style={{color:"#334455",fontSize:10}}>+ Backup</span>}
          </div>
        </div>

        {/* Nav */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.016)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:4,marginBottom:18,overflowX:"auto"}}>
          {TABS.map(t=>{const hc=t.hc||pc;return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"none",padding:"9px 10px",borderRadius:11,border:"none",cursor:"pointer",position:"relative",background:tab===t.id?`${hc}14`:"transparent",color:tab===t.id?hc:"#2a3a44",fontWeight:tab===t.id?800:500,fontSize:11,borderBottom:tab===t.id?`2.5px solid ${hc}`:"2.5px solid transparent",transition:"all .15s",whiteSpace:"nowrap"}}>
              <span style={{display:"block",fontSize:16,marginBottom:2}}>{t.icon}</span>{t.label}
              {t.hc&&tab!==t.id&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:t.hc}}/>}
            </button>
          );})}
        </div>

        {/* Fixtures */}

        {/* Screenshot */}
        {{tab==="upload"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div onClick={()=>!load&&fRef.current?.click()} onDrop={e=>{e.preventDefault();setDrag(false);pf(e.dataTransfer.files[0]);}} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            style={{border:`2px dashed ${drag?pc:prev?pc+"33":"rgba(255,255,255,0.05)"}`,borderRadius:13,padding:"28px 16px",textAlign:"center",cursor:"pointer",background:drag?`${pc}05`:prev?`${pc}02`:"rgba(255,255,255,0.01)"}}>
            <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pf(e.target.files[0])}/>
            {prev?<div><img src={prev} style={{maxHeight:170,maxWidth:"100%",borderRadius:8,marginBottom:8,border:`1px solid ${pc}20`,objectFit:"contain"}}/><p style={{color:pc,fontSize:11,fontWeight:700}}>✓ Ready</p></div>:<div><div style={{fontSize:42,marginBottom:8}}>📸</div><p style={{color:"#c8d8e8",fontWeight:700,fontSize:13}}>Screenshot আপলোড করুন</p><p style={{color:"#1a2a34",fontSize:10,marginTop:3}}>সব ম্যাচ AI বিশ্লেষণ হবে</p></div>}
          </div>
          {prev&&<button onClick={runShot} disabled={load} style={BP(load)}>{load?msg||"⏳ বিশ্লেষণ...":"⚡ সব ম্যাচ বিশ্লেষণ করুন"}</button>}
          <Err msg={er}/>
          {results.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><p style={{color:"#00ff9d",fontSize:10,fontWeight:700}}>✅ {results.length} ম্যাচ</p><button onClick={()=>results.forEach(r=>!r.error&&addAcc(r))} style={{background:"rgba(0,255,157,0.06)",border:"1px solid rgba(0,255,157,0.12)",borderRadius:6,padding:"3px 9px",cursor:"pointer",color:"#00ff9d",fontWeight:700,fontSize:9}}>সব → Accum</button></div>{results.map((r,i)=><MCard key={i} r={r} idx={i} onAdd={addAcc} pc={pc}/>)}</div>}
        </div>}

        {/* Manual */}
        {tab==="manual"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{SPORTS.map(s=><button key={s.id} onClick={()=>{setSport(s.id);setSelM([]);}} style={{padding:"8px 13px",borderRadius:28,border:`1px solid ${sport===s.id?pc:"rgba(255,255,255,0.05)"}`,background:sport===s.id?`${pc}11`:"rgba(255,255,255,0.01)",color:sport===s.id?pc:"#334455",cursor:"pointer",fontSize:12,fontWeight:600}}>{s.icon} {s.label}</button>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}><input placeholder="Team A" value={tA} onChange={e=>setTA(e.target.value)} style={INP}/><input placeholder="Team B" value={tB} onChange={e=>setTB(e.target.value)} style={INP}/></div>
          <input placeholder="League (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
          <div><p style={{color:"#2a3a44",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:7}}>MARKETS</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{MARKETS[sport].map(m=><button key={m} onClick={()=>togM(m)} style={{padding:"6px 11px",borderRadius:18,border:`1px solid ${selM.includes(m)?pc:"rgba(255,255,255,0.04)"}`,background:selM.includes(m)?`${pc}0f`:"rgba(255,255,255,0.01)",color:selM.includes(m)?pc:"#2a3a44",cursor:"pointer",fontSize:11,fontWeight:600}}>{m}</button>)}</div></div>
          <button onClick={runManual} disabled={load} style={BP(load)}>{load?msg||"⏳ তৈরি করছি...":"🎯 AI Prediction নিন"}</button>
          <Err msg={er}/>
          {manR&&<MCard r={manR} idx={0} onAdd={addAcc} pc={pc}/>}
        </div>}

        {/* BetSlip */}
        {tab==="slip"&&<SlipTab/>}

        {/* Accumulator */}
        {tab==="accumulator"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:13,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}><p style={{color:"#c8d8e8",fontWeight:800,fontSize:12}}>🔗 Multi-Bet Accumulator</p>{accum.length>0&&<button onClick={()=>setAccum([])} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.11)",color:"#ff6060",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:9}}>🗑️</button>}</div>
            {accum.length===0?<p style={{color:"#0a1418",textAlign:"center",padding:"20px 0",fontSize:11}}>কোনো bet নেই।</p>:<div style={{display:"flex",flexDirection:"column",gap:5}}>{accum.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.012)",borderRadius:7,padding:"7px 10px",border:"1px solid rgba(255,255,255,0.03)"}}><div style={{flex:1,minWidth:0,marginRight:7}}><div style={{color:"#c8d8e8",fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div><div style={{color:"#1a2a34",fontSize:9,marginTop:1}}>{a.market}</div></div><span style={{color:"#00ff9d",fontWeight:900,fontSize:13,fontFamily:"monospace",marginRight:6}}>{a.prob}%</span><button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.1)",color:"#ff6060",borderRadius:4,padding:"1px 6px",cursor:"pointer",fontSize:9}}>✕</button></div>)}</div>}
          </div>
          {accum.length>0&&<div style={{background:ap<30?"rgba(255,77,77,0.03)":"rgba(0,255,157,0.02)",border:`1px solid ${ap<30?"rgba(255,77,77,0.1)":"rgba(0,255,157,0.08)"}`,borderRadius:13,padding:14}}>
            <p style={{color:"#0e1a20",fontSize:8,fontWeight:700,letterSpacing:1,margin:"0 0 3px"}}>COMBINED</p>
            <div style={{fontSize:36,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:3}}>{ap}%</div>
            <p style={{color:"#0e1a20",fontSize:9,marginBottom:9}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
            <Bar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"} h={6}/>
            {ap<30&&<div style={{background:"rgba(255,77,77,0.04)",border:"1px solid rgba(255,77,77,0.09)",borderRadius:7,padding:"7px 10px",marginTop:9}}><p style={{color:"#ff5555",fontSize:9,fontWeight:700}}>⚠️ Multi-bet এ risk অনেক বেড়ে যায়।</p></div>}
          </div>}
        </div>}

        {/* History */}
        {tab==="history"&&<HistoryTab pc={pc}/>}

        <p style={{textAlign:"center",marginTop:28,color:"#1a2a34",fontSize:10}}>PredictIQ · AI Sports Analysis · শুধু বিনোদন ও গবেষণার জন্য</p>
      </div>
    </div>

    {/* Modals */}
    {showUpgrade&&<UpgradeModal onClose={()=>setShowUpgrade(false)} onActivate={()=>setPlanRefresh(r=>r+1)}/>}
    {showManage&&<ManageModal onClose={()=>{setShowManage(false);setPlanRefresh(r=>r+1);}}/>}
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
