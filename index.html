// Storage helpers
function getConfig(){try{const s=localStorage.getItem("piq_cfg");return s?JSON.parse(s):{};}catch{return {};}}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("Read failed"));
    r.readAsDataURL(file);
  });
}

// Build prompt text
function buildPrompt(imageMode, manualData){
  if(imageMode){
    return `You are a sports betting analyst AI. Carefully read this betting app screenshot.
Extract all visible info: team names, sport, league, odds, markets. Then give predictions.
Respond ONLY in valid JSON (no markdown, no backticks):
{"teamA":"<name>","teamB":"<name>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<league>","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<market>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentence analysis>","keyFactors":["<f1>","<f2>","<f3>"],"detectedOdds":"<odds summary>"}`;
  }
  return `You are a sports betting analyst AI.
Match: ${manualData.teamA} vs ${manualData.teamB}
Sport: ${manualData.sport}, League: ${manualData.league||"Unknown"}
Markets: ${manualData.markets.join(", ")}
Respond ONLY in valid JSON (no markdown, no backticks):
{"teamA":"${manualData.teamA}","teamB":"${manualData.teamB}","sport":"${manualData.sport}","league":"${manualData.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<market>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentence analysis>","keyFactors":["<f1>","<f2>","<f3>"]}`;
}

// ── API CALLERS ──────────────────────────────────────────────────

async function callGemini(apiKey, imageBase64, mediaType, manualData){
  const prompt = buildPrompt(!!imageBase64, manualData);
  const parts = imageBase64
    ? [{text: prompt},{inline_data:{mime_type: mediaType||"image/png", data: imageBase64}}]
    : [{text: prompt}];

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
  const resp = await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Gemini API Error");
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function callOpenAI(apiKey, imageBase64, mediaType, manualData){
  const prompt = buildPrompt(!!imageBase64, manualData);
  let content;
  if(imageBase64){
    content=[
      {type:"text",text:prompt},
      {type:"image_url",image_url:{url:`data:${mediaType||"image/png"};base64,${imageBase64}`}}
    ];
  } else {
    content = prompt;
  }
  const resp = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({
      model: imageBase64 ? "gpt-4o" : "gpt-4o-mini",
      max_tokens:1200,
      messages:[{role:"user",content}]
    })
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"OpenAI API Error");
  const text = data.choices?.[0]?.message?.content||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function callAnthropic(apiKey, imageBase64, mediaType, manualData){
  const prompt = buildPrompt(!!imageBase64, manualData);
  let messages;
  if(imageBase64){
    messages=[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mediaType||"image/png",data:imageBase64}},
      {type:"text",text:prompt}
    ]}];
  } else {
    messages=[{role:"user",content:prompt}];
  }
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Anthropic API Error");
  const text = data.content.map(b=>b.text||"").join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function callAI(provider, apiKey, imageBase64, mediaType, manualData){
  if(provider==="gemini") return callGemini(apiKey, imageBase64, mediaType, manualData);
  if(provider==="openai") return callOpenAI(apiKey, imageBase64, mediaType, manualData);
  if(provider==="anthropic") return callAnthropic(apiKey, imageBase64, mediaType, manualData);
  throw new Error("Unknown provider");
}

function Ring({value,label,color}){
  const r=28,c=2*Math.PI*r,dash=(value/100)*c;
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
    <svg width={72} height={72} style={{transform:"rotate(-90deg)"}}>

        fontSize={14} fontWeight={800}

        {value}%

    </svg>
    <span style={{color:"#8899aa",fontSize:10,fontWeight:700,letterSpacing:0.8}}>{label}</span>
  </div>;
}

        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#00ff9d15,#00ff9d30)",border:"1px solid #00ff9d44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
            <span style={{fontSize:23,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#445566",fontSize:12,marginBottom:8}}>AI Sports Prediction · Screenshot Analysis · Multi-Bet Calculator</p>
          {/* Provider badge */}
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${prov.color}11`,border:`1px solid ${prov.color}33`,borderRadius:20,padding:"5px 14px"}}>
            <span style={{fontSize:14}}>{prov.icon}</span>
            <span style={{color:prov.color,fontSize:11,fontWeight:700}}>{prov.name} সংযুক্ত</span>
            <button onClick={changeProvider} style={{background:"none",border:"none",color:"#334455",cursor:"pointer",fontSize:10,textDecoration:"underline",padding:0}}>পরিবর্তন করুন</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,padding:4,marginBottom:20}}>
          {[
            {id:"upload",label:"📸 Screenshot"},
            {id:"manual",label:"✏️ Manual"},
            {id:"accumulator",label:`🔗 Accum${accum.length?` (${accum.length})`:""}`},
            {id:"admin",label:"⚙️ Admin"},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 3px",borderRadius:10,border:"none",cursor:"pointer",background:tab===t.id?`${prov.color}1a`:"transparent",color:tab===t.id?prov.color:"#556070",fontWeight:tab===t.id?700:500,fontSize:12,borderBottom:tab===t.id?`2px solid ${prov.color}`:"2px solid transparent",transition:"all .15s"}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── SCREENSHOT TAB ── */}
        {tab==="upload"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div
              onClick={()=>fileRef.current?.click()}
              onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              style={{border:`2px dashed ${drag?prov.color:preview?prov.color+"44":"rgba(255,255,255,0.09)"}`,borderRadius:16,padding:"38px 20px",textAlign:"center",cursor:"pointer",background:drag?`${prov.color}08`:preview?`${prov.color}04`:"rgba(255,255,255,0.015)",transition:"all .2s"}}
            >
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {preview
                ?<div>
                  <img src={preview} alt="preview" style={{maxHeight:210,maxWidth:"100%",borderRadius:10,marginBottom:12,border:`1px solid ${prov.color}33`,objectFit:"contain"}}/>
                  <p style={{color:prov.color,fontSize:13,fontWeight:700}}>✓ Screenshot ready</p>
                  <p style={{color:"#334455",fontSize:11,marginTop:4}}>অন্য ছবি দিতে আবার ক্লিক করুন</p>
                </div>
                :<div>
                  <div style={{fontSize:50,marginBottom:12}}>📸</div>
                  <p style={{color:"#d0dcea",fontWeight:700,fontSize:15,marginBottom:6}}>বেটিং অ্যাপের স্ক্রিনশট আপলোড করুন</p>
                  <p style={{color:"#445566",fontSize:13}}>ক্লিক করুন · অথবা ছবি drag করুন</p>
                  <p style={{color:"#2a3a4a",fontSize:11,marginTop:6}}>JPG · PNG · WEBP সাপোর্টেড</p>
                </div>
              }
            </div>

            {preview&&(
              <button onClick={()=>analyze(false)} disabled={loading} style={BTNP(loading)}>
                {loading?`⏳ ${prov.name} বিশ্লেষণ করছে...`:`⚡ Screenshot বিশ্লেষণ করুন (${prov.name})`}
              </button>
            )}

            {error&&(
              <div style={{background:"rgba(255,77,77,0.07)",border:"1px solid rgba(255,77,77,0.22)",borderRadius:11,padding:"13px 16px",color:"#ff7070",fontSize:13,lineHeight:1.6}}>
                ⚠️ {error}
                <button onClick={changeProvider} style={{display:"block",marginTop:9,background:"rgba(255,77,77,0.12)",border:"1px solid rgba(255,77,77,0.28)",color:"#ff7070",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:600}}>
                  🔄 অন্য Provider / Key দিন
                </button>
              </div>
            )}
            {result&&<ResultView r={result} onAdd={addAccum}/>}
          </div>
        )}

        {/* ── MANUAL TAB ── */}
        {tab==="manual"&&(
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {SPORTS.map(s=>(
                <button key={s.id} onClick={()=>{setSport(s.id);setSelMarkets([]);}} style={{padding:"8px 15px",borderRadius:30,border:`1px solid ${sport===s.id?prov.color:"rgba(255,255,255,0.09)"}`,background:sport===s.id?`${prov.color}18`:"rgba(255,255,255,0.02)",color:sport===s.id?prov.color:"#7a8f9a",cursor:"pointer",fontSize:13,fontWeight:600}}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <input placeholder="Team A" value={teamA} onChange={e=>setTeamA(e.target.value)} style={INP}/>
              <input placeholder="Team B" value={teamB} onChange={e=>setTeamB(e.target.value)} style={INP}/>
            </div>
            <input placeholder="League / Tournament (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
            <div>
              <p style={{color:"#445566",fontSize:11,fontWeight:700,letterSpacing:1.1,marginBottom:9}}>MARKETS সিলেক্ট করুন</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {MARKETS[sport].map(m=>(
                  <button key={m} onClick={()=>toggleM(m)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${selMarkets.includes(m)?prov.color:"rgba(255,255,255,0.08)"}`,background:selMarkets.includes(m)?`${prov.color}15`:"rgba(255,255,255,0.02)",color:selMarkets.includes(m)?prov.color:"#556070",cursor:"pointer",fontSize:12,fontWeight:600}}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={()=>analyze(true)} disabled={loading} style={BTNP(loading)}>
              {loading?`⏳ ${prov.name} prediction তৈরি করছে...`:"🎯 AI Prediction নিন"}
            </button>
            {error&&<div style={{background:"rgba(255,77,77,0.07)",border:"1px solid rgba(255,77,77,0.22)",borderRadius:11,padding:"13px 16px",color:"#ff7070",fontSize:13}}>⚠️ {error}</div>}
            {result&&<ResultView r={result} onAdd={addAccum}/>}
          </div>
        )}

        {/* ── ACCUMULATOR TAB ── */}
        {tab==="accumulator"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:20}}>
              <h3 style={{margin:"0 0 16px",fontWeight:800,fontSize:16,color:"#d0dcea"}}>🔗 Multi-Bet Accumulator</h3>
              {accum.length===0
                ?<p style={{color:"#445566",textAlign:"center",padding:"30px 0",fontSize:14}}>কোনো bet নেই। ম্যাচ বিশ্লেষণ করে এখানে যোগ করুন।</p>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {accum.map(a=>(
                    <div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.025)",borderRadius:9,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.06)"}}>
                      <div style={{flex:1,minWidth:0,marginRight:12}}>
                        <div style={{color:"#d0dcea",fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div>
                        <div style={{color:"#556070",fontSize:11,marginTop:2}}>{a.market}</div>
                      </div>
                      <div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
                        <span style={{color:"#00ff9d",fontWeight:900,fontSize:16,fontFamily:"monospace"}}>{a.prob}%</span>
                        <button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.09)",border:"1px solid rgba(255,77,77,0.2)",color:"#ff6060",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontSize:12}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>
            {accum.length>0&&(
              <div style={{background:accumProb<30?"rgba(255,77,77,0.05)":"rgba(0,255,157,0.04)",border:`1px solid ${accumProb<30?"rgba(255,77,77,0.18)":"rgba(0,255,157,0.14)"}`,borderRadius:16,padding:20}}>
                <p style={{color:"#556070",fontSize:11,fontWeight:700,margin:"0 0 5px",letterSpacing:1.1}}>COMBINED PROBABILITY</p>
                <div style={{fontSize:42,fontWeight:900,color:accumProb<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:6}}>{accumProb}%</div>
                <p style={{color:"#556070",fontSize:12,marginBottom:14}}>{accum.length} selections · Risk: <span style={{color:accumProb<30?"#ff5555":"#ffc107",fontWeight:700}}>{accumProb<25?"Very High":accumProb<50?"High":"Medium"}</span></p>
                <ProbBar value={accumProb} color={accumProb<30?"#ff4d4d":"#00ff9d"}/>
                {accumProb<30&&(
                  <div style={{background:"rgba(255,77,77,0.07)",border:"1px solid rgba(255,77,77,0.18)",borderRadius:10,padding:"11px 14px",marginTop:14}}>
                    <p style={{color:"#ff5555",fontSize:12,fontWeight:700,marginBottom:4}}>⚠️ HIGH RISK WARNING</p>
                    <p style={{color:"rgba(255,85,85,0.7)",fontSize:11,lineHeight:1.6}}>Multi-bet এ risk অনেক বেড়ে যায়। সাবধানে সিদ্ধান্ত নিন।</p>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── ADMIN TAB ── */}
        {tab==="admin"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
            {[
              {label:"AI Provider",value:prov.name,icon:prov.icon,desc:"Currently active"},
              {label:"Screenshot AI",value:"Vision API",icon:"📸",desc:"Auto detection"},
              {label:"Sports",value:"5 Types",icon:"🏆",desc:"Football to Hockey"},
              {label:"Markets",value:"30+ Types",icon:"📊",desc:"All betting options"},
              {label:"Multi-Bet",value:"Active",icon:"🔗",desc:"Accumulator calc"},
              {label:"Storage",value:"Browser",icon:"💾",desc:"Key saved locally"},
            ].map(c=>(
              <div key={c.label} style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:16}}>
                <div style={{fontSize:22,marginBottom:8}}>{c.icon}</div>
                <p style={{color:"#445566",fontSize:10,fontWeight:700,margin:"0 0 3px",letterSpacing:0.8}}>{c.label.toUpperCase()}</p>
                <p style={{color:prov.color,fontSize:16,fontWeight:900,margin:"0 0 3px",fontFamily:"monospace"}}>{c.value}</p>
                <p style={{color:"#334455",fontSize:11}}>{c.desc}</p>
              </div>
            ))}

            {/* Switch provider */}
            <div style={{gridColumn:"1/-1",background:`${prov.color}0d`,border:`1px solid ${prov.color}22`,borderRadius:14,padding:18}}>
              <p style={{color:prov.color,fontWeight:700,fontSize:14,marginBottom:10}}>🔄 AI Provider পরিবর্তন করুন</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {PROVIDERS.map(p=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:7,background:cfg.provider===p.id?`${p.color}22`:"rgba(255,255,255,0.03)",border:`1px solid ${cfg.provider===p.id?p.color+"55":"rgba(255,255,255,0.08)"}`,borderRadius:10,padding:"8px 12px"}}>
                    <span>{p.icon}</span>
                    <span style={{color:cfg.provider===p.id?p.color:"#7a8f9a",fontSize:12,fontWeight:600}}>{p.name}</span>
                    {cfg.provider===p.id&&<span style={{color:p.color,fontSize:10}}>✓ Active</span>}
                  </div>
                ))}
              </div>
              <button onClick={changeProvider} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 18px",cursor:"pointer",color:"#d0dcea",fontWeight:700,fontSize:13}}>
                🔄 অন্য Provider / Key দিন
              </button>
            </div>

            <div style={{gridColumn:"1/-1",background:"rgba(255,193,7,0.04)",border:"1px solid rgba(255,193,7,0.18)",borderRadius:14,padding:16}}>
              <p style={{color:"#ffc107",fontWeight:700,marginBottom:5}}>⚠️ Responsible Gambling</p>
              <p style={{color:"rgba(255,193,7,0.55)",fontSize:13,lineHeight:1.6}}>এই সিস্টেম শুধু probability analysis দেয়। কোনো result 100% নিশ্চিত নয়। সবসময় সাবধানে বাজি ধরুন।</p>
            </div>
          </div>
        )}

        <p style={{textAlign:"center",marginTop:36,color:"#1e2e3a",fontSize:11}}>
          PredictIQ · AI Sports Analysis · শুধু বিনোদন ও গবেষণার জন্য
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
