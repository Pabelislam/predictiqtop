// Storage
function getCfg(){try{const s=localStorage.getItem("piq4");return s?JSON.parse(s):null;}catch{return null;}}
function saveCfg(c){try{localStorage.setItem("piq4",JSON.stringify(c));}catch{}}
function clearCfg(){try{localStorage.removeItem("piq4");}catch{}}

function fileToBase64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(f);
  });
}

function parseJ(t){
  const c=t.replace(/```json|```/g,"").trim();
  const s=c.indexOf("{"), e=c.lastIndexOf("}");
  if(s<0||e<0) throw new Error("JSON পাওয়া যায়নি");
  return JSON.parse(c.slice(s,e+1));
}

function parseArr(t){
  const c=t.replace(/```json|```/g,"").trim();
  const s=c.indexOf("["), e=c.lastIndexOf("]");
  if(s<0||e<0) throw new Error("Array JSON পাওয়া যায়নি");
  return JSON.parse(c.slice(s,e+1));
}

// Vision prompt - extract all matches
const VISION_PROMPT = `Look at this betting app screenshot carefully. Extract ALL visible matches/games on screen.
Respond ONLY as JSON array, no markdown:
[{"teamA":"<name>","teamB":"<name>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<league>","rawOdds":"<all visible odds and markets as text>"}]
Include EVERY match. Do not skip any.`;

// Prediction prompt
function predPrompt(m){
  return `You are a sports betting analyst AI.
Match: ${m.teamA} vs ${m.teamB}
Sport: ${m.sport}, League: ${m.league||"Unknown"}
Visible odds/markets from screenshot: ${m.rawOdds||"Standard markets"}
Provide detailed predictions for all available betting markets.
Respond ONLY in valid JSON, no markdown:
{"teamA":"${m.teamA}","teamB":"${m.teamB}","sport":"${m.sport}","league":"${m.league||"Unknown"}","confidence":<65-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<market name>","prediction":"<specific pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentence match analysis>","keyFactors":["<factor1>","<factor2>","<factor3>"]}`;
}

function manualPrompt(d){
  return `You are a sports betting analyst AI.
Match: ${d.teamA} vs ${d.teamB}
Sport: ${d.sport}, League: ${d.league||"Unknown"}
Markets to analyze: ${d.markets.join(", ")}
Respond ONLY in valid JSON, no markdown:
{"teamA":"${d.teamA}","teamB":"${d.teamB}","sport":"${d.sport}","league":"${d.league||"Unknown"}","confidence":<65-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<market>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`;
}

// API callers
async function callOpenAICompat(url, key, model, messages){
  const resp = await fetch(url, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
    body:JSON.stringify({model, max_tokens:1200, messages})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"API Error");
  return data.choices?.[0]?.message?.content||"";
}

async function callGemini(key, parts){
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Gemini Error");
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function callAnthropic(key, messages){
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:1200, messages})
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message||"Anthropic Error");
  return data.content.map(b=>b.text||"").join("");
}

// Extract matches from screenshot using vision
async function extractMatches(pid, key, vKey, imgB64, mime){
  if(pid==="gemini"){
    const txt = await callGemini(key, [{text:VISION_PROMPT},{inline_data:{mime_type:mime,data:imgB64}}]);
    return parseArr(txt);
  }
  if(pid==="groq" && vKey){
    const txt = await callGemini(vKey, [{text:VISION_PROMPT},{inline_data:{mime_type:mime,data:imgB64}}]);
    return parseArr(txt);
  }
  if(pid==="deepseek" && vKey){
    const txt = await callGemini(vKey, [{text:VISION_PROMPT},{inline_data:{mime_type:mime,data:imgB64}}]);
    return parseArr(txt);
  }
  if(pid==="kimi" && vKey){
    const txt = await callGemini(vKey, [{text:VISION_PROMPT},{inline_data:{mime_type:mime,data:imgB64}}]);
    return parseArr(txt);
  }
  if(pid==="openai"){
    const txt = await callOpenAICompat("https://api.openai.com/v1/chat/completions", key, "gpt-4o",[
      {role:"user",content:[{type:"text",text:VISION_PROMPT},{type:"image_url",image_url:{url:`data:${mime};base64,${imgB64}`}}]}
    ]);
    return parseArr(txt);
  }
  if(pid==="anthropic"){
    const txt = await callAnthropic(key,[
      {role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:imgB64}},{type:"text",text:VISION_PROMPT}]}
    ]);
    return parseArr(txt);
  }
  throw new Error("এই provider এ screenshot vision নেই। Manual tab ব্যবহার করুন অথবা Gemini Vision Key যোগ করুন।");
}

// Get prediction for one match
async function getPrediction(pid, key, matchData){
  const p = predPrompt(matchData);
  if(pid==="groq") return parseJ(await callOpenAICompat("https://api.groq.com/openai/v1/chat/completions", key, "llama-3.3-70b-versatile", [{role:"user",content:p}]));
  if(pid==="gemini") return parseJ(await callGemini(key, [{text:p}]));
  if(pid==="deepseek") return parseJ(await callOpenAICompat("https://api.deepseek.com/chat/completions", key, "deepseek-chat", [{role:"user",content:p}]));
  if(pid==="kimi") return parseJ(await callOpenAICompat("https://api.moonshot.cn/v1/chat/completions", key, "moonshot-v1-8k", [{role:"user",content:p}]));
  if(pid==="openai") return parseJ(await callOpenAICompat("https://api.openai.com/v1/chat/completions", key, "gpt-4o-mini", [{role:"user",content:p}]));
  if(pid==="anthropic") return parseJ(await callAnthropic(key, [{role:"user",content:p}]));
}

// Get manual prediction

  if(pid==="gemini") return parseJ(await callGemini(key, [{text:p}]));
  if(pid==="deepseek") return parseJ(await callOpenAICompat("https://api.deepseek.com/chat/completions", key, "deepseek-chat", [{role:"user",content:p}]));
  if(pid==="kimi") return parseJ(await callOpenAICompat("https://api.moonshot.cn/v1/chat/completions", key, "moonshot-v1-8k", [{role:"user",content:p}]));
  if(pid==="openai") return parseJ(await callOpenAICompat("https://api.openai.com/v1/chat/completions", key, "gpt-4o-mini", [{role:"user",content:p}]));
  if(pid==="anthropic") return parseJ(await callAnthropic(key, [{role:"user",content:p}]));
}

// ── UI Components ────────────────────────────────────────────────
function Bar({v,c}){
  return <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:7,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${v}%`,background:`linear-gradient(90deg,${c}66,${c})`,boxShadow:`0 0 8px ${c}44`,transition:"width 1.2s ease",borderRadius:4}}/>
  </div>;
}

function Ring({value,label,color}){
  const r=27, c=2*Math.PI*r, d=(value/100)*c;
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <svg width={68} height={68} style={{transform:"rotate(-90deg)"}}>
      <circle cx={34} cy={34} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={5}/>
      <circle cx={34} cy={34} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
      <text x={34} y={34} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={13} fontWeight={800} style={{transform:"rotate(90deg)",transformOrigin:"34px 34px",fontFamily:"monospace"}}>{value}%</text>
    </svg>
    <span style={{color:"#667788",fontSize:10,fontWeight:700,letterSpacing:0.7}}>{label}</span>
  </div>;
}

function PCard({market,prob,risk,best}){
  return <div style={{background:best?"rgba(0,255,157,0.06)":"rgba(255,255,255,0.025)",border:`1px solid ${best?"#00ff9d33":"#ffffff0d"}`,borderRadius:10,padding:"11px 14px",position:"relative"}}>
    {best&&<span style={{position:"absolute",top:-9,right:11,background:"#00ff9d",color:"#040e08",fontSize:9,fontWeight:900,padding:"2px 8px",borderRadius:20}}>BEST PICK</span>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{color:"#c8d8e8",fontSize:13,fontWeight:500,flex:1,marginRight:10,lineHeight:1.4}}>{market}</span>
      <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
        <span style={{background:RB[risk],color:RC[risk],fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,border:`1px solid ${RC[risk]}22`}}>{risk}</span>
        <span style={{color:RC[risk],fontSize:18,fontWeight:900,fontFamily:"monospace"}}>{prob}%</span>
      </div>
    </div>
    <Bar v={prob} c={RC[risk]}/>
  </div>;
}

      <div onClick={()=>setOpen(o=>!o)} style={{padding:"13px 15px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

          <h3 style={{color:"#fff",fontSize:15,fontWeight:900,margin:0,wordBreak:"break-word"}}>{r.teamA} <span style={{color:"#253530"}}>vs</span> {r.teamB}</h3>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginLeft:10,flexShrink:0}}>
          <div style={{textAlign:"center"}}>
            <div style={{color:"#00ff9d",fontSize:17,fontWeight:900,fontFamily:"monospace"}}>{r.winProb}%</div>
            <div style={{color:"#3a5244",fontSize:9,fontWeight:700}}>WIN</div>
          </div>
          <span style={{color:"#445566",fontSize:16}}>{open?"▲":"▼"}</span>

      </div>
      {open&&(
        <div style={{padding:"0 15px 15px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>

          {needsVision&&(
            <div style={{background:"rgba(0,255,157,0.04)",border:"1px solid rgba(0,255,157,0.12)",borderRadius:9,padding:"10px 12px",marginBottom:10}}>
              <p style={{color:"#00ff9d",fontSize:11,fontWeight:700,margin:"0 0 4px"}}>📸 Screenshot এর জন্য Gemini Vision Key (optional):</p>
              <p style={{color:"#334455",fontSize:10,margin:"0 0 7px"}}>aistudio.google.com থেকে ফ্রি নিন</p>
              <input type="password" placeholder="AIzaSy... (optional)" value={vKey} onChange={e=>setVKey(e.target.value)}
                style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,255,157,0.18)",borderRadius:8,padding:"9px 12px",color:"#e0e6f0",fontSize:12,outline:"none"}}/>
            </div>
          )}

          {err&&<p style={{color:"#ff6b6b",fontSize:11,margin:"0 0 9px"}}>⚠️ {err}</p>}

          <button onClick={go} style={{width:"100%",background:`linear-gradient(135deg,${pv.color},${pv.color}bb)`,border:"none",borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontWeight:900,fontSize:14,boxShadow:`0 3px 18px ${pv.color}33`,marginBottom:14}}>
            ✅ শুরু করুন
          </button>

          <div style={{background:`${pv.color}0a`,border:`1px solid ${pv.color}18`,borderRadius:9,padding:"11px 13px"}}>
            <p style={{color:pv.color,fontSize:11,fontWeight:800,margin:"0 0 7px"}}>📋 KEY কিভাবে পাবেন:</p>
            {pv.steps.map((s,i)=>(
              <div key={i} style={{display:"flex",gap:7,marginBottom:i<pv.steps.length-1?4:0}}>
                <span style={{color:pv.color,fontSize:10,fontWeight:800,flexShrink:0}}>{i+1}.</span>
                <span style={{color:"#445566",fontSize:11,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <p style={{color:"#1a2a34",fontSize:10,textAlign:"center",marginTop:10}}>🔒 Key শুধু আপনার browser এ save হয়</p>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────
function App(){
  const [cfg,setCfg]=useState(()=>getCfg());
  const [tab,setTab]=useState("upload");
  const [sport,setSport]=useState("football");
  const [tA,setTA]=useState(""); const [tB,setTB]=useState("");
  const [league,setLeague]=useState(""); const [sm,setSm]=useState([]);
  const [preview,setPreview]=useState(null);
  const [b64,setB64]=useState(null); const [mime,setMime]=useState("image/png");
  const [drag,setDrag]=useState(false);
  const [loading,setLoading]=useState(false); const [msg,setMsg]=useState("");
  const [results,setResults]=useState([]);
  const [manRes,setManRes]=useState(null);
  const [accum,setAccum]=useState([]);
  const [error,setError]=useState(null);
  const fRef=useRef();

  if(!cfg) return <KeyScreen onSave={setCfg}/>;
  const pv=PROVIDERS.find(p=>p.id===cfg.pid)||PROVIDERS[0];

  const processFile=async(f)=>{
    if(!f||!f.type.startsWith("image/")){setError("JPG বা PNG ফাইল দিন।");return;}
    setMime(f.type);setPreview(URL.createObjectURL(f));setResults([]);setError(null);
    try{setB64(await fileToBase64(f));}catch{setError("ফাইল পড়া যায়নি।");}
  };

  const analyzeShot=async()=>{
    if(!b64){setError("আগে screenshot আপলোড করুন।");return;}
    setLoading(true);setError(null);setResults([]);
    try{
      setMsg("📸 Screenshot থেকে সব ম্যাচ খুঁজছি...");
      const matches = await extractMatches(cfg.pid, cfg.key, cfg.vKey, b64, mime);
      if(!matches||!matches.length){setError("কোনো ম্যাচ পাওয়া যায়নি।");setLoading(false);return;}
      const all=[];
      for(let i=0;i<matches.length;i++){
        setMsg(`🤖 ${i+1}/${matches.length}: ${matches[i].teamA} vs ${matches[i].teamB} বিশ্লেষণ করছি...`);
        try{all.push(await getPrediction(cfg.pid,cfg.key,matches[i]));}
        catch(e){all.push({...matches[i],error:e.message,predictions:[],winProb:50,confidence:50});}
      }
      setResults(all);
    }catch(e){
      const m=(e.message||"").toLowerCase();
      if(m.includes("credit")||m.includes("limit")||m.includes("quota")||m.includes("exceeded")){
        setError(`${pv.name} এর limit শেষ। অন্য provider ব্যবহার করুন।`);
      } else if(m.includes("401")||m.includes("403")||m.includes("invalid")){
        setError("API Key ভুল। নতুন key দিন।");
      } else {setError("Error: "+e.message);}
    }
    setLoading(false);setMsg("");
  };

  const analyzeManual=async()=>{
    if(!tA||!tB){setError("দুটো টিমের নাম দিন।");return;}
    setLoading(true);setError(null);setManRes(null);
    try{
      setMsg(`🤖 ${tA} vs ${tB} বিশ্লেষণ করছি...`);
      const r=await getManualPred(cfg.pid,cfg.key,{teamA:tA,teamB:tB,sport,league,markets:sm.length?sm:MARKETS[sport].slice(0,5)});
      setManRes(r);
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);setMsg("");
  };

  const addAccum=(r)=>{
    const best=r.predictions?.find(p=>p.best)||r.predictions?.[0];
    if(!best)return;
    setAccum(a=>[...a,{match:`${r.teamA} vs ${r.teamB}`,market:`${best.market}: ${best.prediction}`,prob:best.prob,id:Date.now()}]);
  };
  const reset=()=>{clearCfg();setCfg(null);setResults([]);setError(null);setManRes(null);};
  const toggleM=m=>setSm(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"11px 12px",color:"#e0e6f0",fontSize:13,outline:"none",width:"100%"};
  const BP=(d)=>({background:d?`${pv.color}15`:`linear-gradient(135deg,${pv.color},${pv.color}bb)`,border:"none",borderRadius:10,padding:"13px",cursor:d?"not-allowed":"pointer",color:d?"#445566":"#fff",fontWeight:900,fontSize:13,width:"100%",opacity:d?0.6:1,boxShadow:d?"none":`0 3px 18px ${pv.color}33`});

  return(
    <div style={{minHeight:"100vh",background:"#080c14",position:"relative"}}>
      <div style={BG}/>
      <div style={{position:"relative",zIndex:1,maxWidth:840,margin:"0 auto",padding:"14px 12px 40px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:5}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#00ff9d12,#00ff9d28)",border:"1px solid #00ff9d33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <span style={{fontSize:21,fontWeight:900,color:"#fff"}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#2a3a44",fontSize:11,marginBottom:7}}>AI Sports Prediction · All Matches · Multi-Bet</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:`${pv.color}0d`,border:`1px solid ${pv.color}2a`,borderRadius:20,padding:"4px 12px"}}>
            <span style={{fontSize:13}}>{pv.icon}</span>
            <span style={{color:pv.color,fontSize:11,fontWeight:700}}>{pv.name}</span>
            <span style={{background:`${pv.badgeColor}18`,color:pv.badgeColor,fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:20}}>{pv.badge}</span>
            <button onClick={reset} style={{background:"none",border:"none",color:"#2a3a44",cursor:"pointer",fontSize:10,textDecoration:"underline",padding:0}}>পরিবর্তন</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11,padding:3,marginBottom:16}}>
          {[{id:"upload",label:"📸 Screenshot"},{id:"manual",label:"✏️ Manual"},{id:"accumulator",label:`🔗 Accum${accum.length?` (${accum.length})`:""}`},{id:"admin",label:"⚙️ Admin"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 3px",borderRadius:9,border:"none",cursor:"pointer",background:tab===t.id?`${pv.color}18`:"transparent",color:tab===t.id?pv.color:"#445566",fontWeight:tab===t.id?700:500,fontSize:11,borderBottom:tab===t.id?`2px solid ${pv.color}`:"2px solid transparent"}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── SCREENSHOT TAB ── */}
        {tab==="upload"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div onClick={()=>!loading&&fRef.current?.click()}
              onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
              onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
              style={{border:`2px dashed ${drag?pv.color:preview?pv.color+"44":"rgba(255,255,255,0.08)"}`,borderRadius:14,padding:"30px 18px",textAlign:"center",cursor:"pointer",background:drag?`${pv.color}07`:preview?`${pv.color}03`:"rgba(255,255,255,0.01)"}}>
              <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {preview
                ?<div>
                  <img src={preview} style={{maxHeight:180,maxWidth:"100%",borderRadius:8,marginBottom:9,border:`1px solid ${pv.color}2a`,objectFit:"contain"}}/>
                  <p style={{color:pv.color,fontSize:13,fontWeight:700}}>✓ Screenshot ready</p>
                  <p style={{color:"#2a3a44",fontSize:11,marginTop:3}}>অন্য ছবি দিতে ক্লিক করুন</p>
                </div>
                :<div>
                  <div style={{fontSize:44,marginBottom:9}}>📸</div>
                  <p style={{color:"#c8d8e8",fontWeight:700,fontSize:14,marginBottom:4}}>বেটিং অ্যাপের স্ক্রিনশট আপলোড করুন</p>
                  <p style={{color:"#334455",fontSize:12}}>সব ম্যাচ একসাথে বিশ্লেষণ হবে</p>
                </div>
              }
            </div>

            {preview&&<button onClick={analyzeShot} disabled={loading} style={BP(loading)}>{loading?msg||"⏳ বিশ্লেষণ করছি...":"⚡ সব ম্যাচ বিশ্লেষণ করুন"}</button>}

            {error&&(
              <div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:9,padding:"11px 13px",color:"#ff7070",fontSize:12,lineHeight:1.6}}>
                ⚠️ {error}
                <button onClick={reset} style={{display:"block",marginTop:7,background:"rgba(255,77,77,0.1)",border:"1px solid rgba(255,77,77,0.22)",color:"#ff7070",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>🔄 অন্য Provider দিন</button>
              </div>
            )}

            {results.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 2px"}}>
                  <p style={{color:"#00ff9d",fontSize:12,fontWeight:700}}>✅ {results.length}টি ম্যাচ পাওয়া গেছে</p>
                  <button onClick={()=>results.forEach(r=>!r.error&&addAccum(r))} style={{background:"rgba(0,255,157,0.08)",border:"1px solid rgba(0,255,157,0.2)",borderRadius:8,padding:"5px 12px",cursor:"pointer",color:"#00ff9d",fontWeight:700,fontSize:11}}>সব → Accum</button>
                </div>
                {results.map((r,i)=><MatchCard key={i} r={r} idx={i} onAdd={addAccum} pc={pv.color}/>)}
              </div>
            )}
          </div>
        )}

        {/* ── MANUAL TAB ── */}
        {tab==="manual"&&(
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {SPORTS.map(s=>(
                <button key={s.id} onClick={()=>{setSport(s.id);setSm([]);}} style={{padding:"7px 12px",borderRadius:30,border:`1px solid ${sport===s.id?pv.color:"rgba(255,255,255,0.08)"}`,background:sport===s.id?`${pv.color}15`:"rgba(255,255,255,0.02)",color:sport===s.id?pv.color:"#667788",cursor:"pointer",fontSize:12,fontWeight:600}}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <input placeholder="Team A" value={tA} onChange={e=>setTA(e.target.value)} style={INP}/>
              <input placeholder="Team B" value={tB} onChange={e=>setTB(e.target.value)} style={INP}/>
            </div>
            <input placeholder="League / Tournament (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
            <div>
              <p style={{color:"#2a3a44",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>MARKETS সিলেক্ট করুন</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {MARKETS[sport].map(m=>(
                  <button key={m} onClick={()=>toggleM(m)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${sm.includes(m)?pv.color:"rgba(255,255,255,0.07)"}`,background:sm.includes(m)?`${pv.color}12`:"rgba(255,255,255,0.015)",color:sm.includes(m)?pv.color:"#445566",cursor:"pointer",fontSize:11,fontWeight:600}}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={analyzeManual} disabled={loading} style={BP(loading)}>{loading?msg||"⏳ Prediction তৈরি করছি...":"🎯 AI Prediction নিন"}</button>
            {error&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:9,padding:"11px 13px",color:"#ff7070",fontSize:12}}>⚠️ {error}</div>}
            {manRes&&<MatchCard r={manRes} idx={0} onAdd={addAccum} pc={pv.color}/>}
          </div>
        )}

        {/* ── ACCUMULATOR TAB ── */}
        {tab==="accumulator"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontWeight:800,fontSize:14,color:"#c8d8e8"}}>🔗 Multi-Bet Accumulator</h3>
                {accum.length>0&&<button onClick={()=>setAccum([])} style={{background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.18)",color:"#ff6060",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11}}>সব মুছুন</button>}
              </div>
              {accum.length===0
                ?<p style={{color:"#2a3a44",textAlign:"center",padding:"24px 0",fontSize:12}}>কোনো bet নেই।</p>
                :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {accum.map(a=>(
                    <div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 11px",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{flex:1,minWidth:0,marginRight:9}}>
                        <div style={{color:"#c8d8e8",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div>
                        <div style={{color:"#334455",fontSize:10,marginTop:1}}>{a.market}</div>
                      </div>
                      <span style={{color:"#00ff9d",fontWeight:900,fontSize:14,fontFamily:"monospace",marginRight:7}}>{a.prob}%</span>
                      <button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.18)",color:"#ff6060",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:10}}>✕</button>
                    </div>
                  ))}
                </div>
              }
            </div>
            {accum.length>0&&(
              <div style={{background:ap<30?"rgba(255,77,77,0.04)":"rgba(0,255,157,0.03)",border:`1px solid ${ap<30?"rgba(255,77,77,0.15)":"rgba(0,255,157,0.12)"}`,borderRadius:14,padding:16}}>
                <p style={{color:"#334455",fontSize:10,fontWeight:700,margin:"0 0 4px",letterSpacing:1}}>COMBINED PROBABILITY</p>
                <div style={{fontSize:38,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:4}}>{ap}%</div>
                <p style={{color:"#334455",fontSize:11,marginBottom:10}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
                <Bar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"}/>
                {ap<30&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.15)",borderRadius:8,padding:"9px 12px",marginTop:10}}>
                  <p style={{color:"#ff5555",fontSize:11,fontWeight:700}}>⚠️ Multi-bet এ risk অনেক বেড়ে যায়। সাবধানে সিদ্ধান্ত নিন।</p>
                </div>}
              </div>
            )}
          </div>
        )}

        {/* ── ADMIN TAB ── */}
        {tab==="admin"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[
              {l:"AI Provider",v:pv.name,i:pv.icon},
              {l:"Status",v:pv.badge,i:"✅"},
              {l:"Screenshot",v:cfg.pid==="groq"?(cfg.vKey?"Gemini+Groq":"Text Only"):cfg.pid==="deepseek"?(cfg.vKey?"Gemini+DeepSeek":"Text Only"):cfg.pid==="kimi"?(cfg.vKey?"Gemini+Kimi":"Text Only"):"Vision AI",i:"📸"},
              {l:"Sports",v:"5 Types",i:"🏆"},
              {l:"Markets",v:"30+",i:"📊"},
              {l:"Multi-Bet",v:"Active",i:"🔗"},
            ].map(c=>(
              <div key={c.l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:12,padding:13}}>
                <div style={{fontSize:19,marginBottom:5}}>{c.i}</div>
                <p style={{color:"#2a3a44",fontSize:9,fontWeight:700,margin:"0 0 2px",letterSpacing:0.7}}>{c.l.toUpperCase()}</p>
                <p style={{color:pv.color,fontSize:14,fontWeight:900,fontFamily:"monospace"}}>{c.v}</p>
              </div>
            ))}
            <div style={{gridColumn:"1/-1",background:`${pv.color}08`,border:`1px solid ${pv.color}18`,borderRadius:12,padding:14}}>
              <p style={{color:pv.color,fontWeight:700,fontSize:12,marginBottom:9}}>🔄 সব Providers</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {PROVIDERS.map(p=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:5,background:cfg.pid===p.id?`${p.color}18`:"rgba(255,255,255,0.025)",border:`1px solid ${cfg.pid===p.id?p.color+"44":"rgba(255,255,255,0.07)"}`,borderRadius:9,padding:"6px 10px"}}>
                    <span style={{fontSize:12}}>{p.icon}</span>
                    <span style={{color:cfg.pid===p.id?p.color:"#667788",fontSize:11,fontWeight:600}}>{p.name}</span>
                    {cfg.pid===p.id&&<span style={{color:p.color,fontSize:9,fontWeight:800}}>✓</span>}
                  </div>
                ))}
              </div>
              <button onClick={reset} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"8px 14px",cursor:"pointer",color:"#c8d8e8",fontWeight:700,fontSize:11}}>
                🔄 অন্য Provider / Key দিন
              </button>
            </div>
            <div style={{gridColumn:"1/-1",background:"rgba(255,193,7,0.03)",border:"1px solid rgba(255,193,7,0.13)",borderRadius:12,padding:13}}>
              <p style={{color:"#ffc107",fontWeight:700,marginBottom:3,fontSize:12}}>⚠️ Responsible Gambling</p>
              <p style={{color:"rgba(255,193,7,0.45)",fontSize:11,lineHeight:1.5}}>এই সিস্টেম probability analysis দেয়। কোনো result guaranteed নয়।</p>
            </div>
          </div>
        )}

        <p style={{textAlign:"center",marginTop:28,color:"#1a2a34",fontSize:10}}>PredictIQ · AI Sports Analysis · শুধু বিনোদন ও গবেষণার জন্য</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
