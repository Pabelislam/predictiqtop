// Storage
function getCfg(){try{const s=localStorage.getItem("piq7");return s?JSON.parse(s):null;}catch{return null;}}
function saveCfg(c){try{localStorage.setItem("piq7",JSON.stringify(c));}catch{}}
function clearCfg(){try{localStorage.removeItem("piq7");}catch{}}

// ── History Storage ──
const HIST_KEY="piq_hist_v1";
function getHistory(){try{const s=localStorage.getItem(HIST_KEY);return s?JSON.parse(s):[];}catch{return[];}}
function saveHistory(h){try{localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,500)));}catch{}}
function addPrediction(r){
  const h=getHistory();
  const best=r.predictions?.find(p=>p.best)||r.predictions?.[0];
  if(!best)return;
  const entry={
    id:"p_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    match:`${r.teamA} vs ${r.teamB}`,
    teamA:r.teamA,teamB:r.teamB,
    league:r.league||"Unknown",
    sport:r.sport||"Football",
    market:best.market,
    prediction:best.prediction,
    prob:best.prob,
    confidence:r.confidence||70,
    riskLevel:r.riskLevel||"Medium",
    analysis:r.analysis||"",
    time:Date.now(),
    result:null,// null=pending, true=win, false=loss
  };
  h.unshift(entry);
  saveHistory(h);
  return entry;
}
function updateResult(id,won){
  const h=getHistory();
  const idx=h.findIndex(x=>x.id===id);
  if(idx>=0){h[idx].result=won;saveHistory(h);}
}
function calcStats(h){
  const settled=h.filter(x=>x.result!==null);
  const wins=settled.filter(x=>x.result===true).length;
  const total=h.length;
  const acc=settled.length?Math.round((wins/settled.length)*100):0;
  // by market
  const mStats={};
  settled.forEach(x=>{
    if(!mStats[x.market])mStats[x.market]={w:0,t:0};
    mStats[x.market].t++;
    if(x.result)mStats[x.market].w++;
  });
  // by confidence
  const cStats={High:{w:0,t:0},Medium:{w:0,t:0},Low:{w:0,t:0}};
  settled.forEach(x=>{
    const c=x.confidence>=80?"High":x.confidence>=60?"Medium":"Low";
    cStats[c].t++;
    if(x.result)cStats[c].w++;
  });
  // by time
  const now=Date.now();
  const day=settled.filter(x=>now-x.time<86400000);
  const week=settled.filter(x=>now-x.time<604800000);
  const month=settled.filter(x=>now-x.time<2592000000);
  return{total,settled:settled.length,wins,acc,mStats,cStats,
    daily:day.length?Math.round((day.filter(x=>x.result).length/day.length)*100):null,
    weekly:week.length?Math.round((week.filter(x=>x.result).length/week.length)*100):null,
    monthly:month.length?Math.round((month.filter(x=>x.result).length/month.length)*100):null,
  };
}


// Utils
function oddsToProb(o){const n=parseFloat(o);if(!n||n<=1)return 50;return Math.round((1/n)*1000)/10;}
function combinedProb(arr){if(!arr.length)return 0;return Math.round(arr.reduce((p,m)=>p*(m.prob/100),1)*10000)/100;}
function slipRisk(p){if(p>=55)return{level:"Low",color:"#00ff9d",icon:"🟢"};if(p>=30)return{level:"Medium",color:"#ffc107",icon:"🟡"};if(p>=15)return{level:"High",color:"#ff8800",icon:"🔴"};return{level:"Very High",color:"#ff4d4d",icon:"🚨"};}
async function f2b(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}
function pj(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("{"),e=c.lastIndexOf("}");if(s<0||e<0)throw new Error("JSON error");return JSON.parse(c.slice(s,e+1));}
function pa(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("["),e=c.lastIndexOf("]");if(s<0||e<0)throw new Error("Array error");return JSON.parse(c.slice(s,e+1));}
function fmtTime(d){return new Date(d).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});}

// AI API
async function ai(pid,key,prompt){
  const h={"Content-Type":"application/json","Authorization":"Bearer "+key};
  if(pid==="groq"){const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="deepseek"){const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"deepseek-chat",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="kimi"){const r=await fetch("https://api.moonshot.cn/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"moonshot-v1-8k",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"gpt-4o-mini",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates[0].content.parts[0].text;}
  if(pid==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.content[0].text;}
  throw new Error("Unknown provider");
}

async function vision(pid,key,vk,b64,mime,prompt){
  const gk=pid==="gemini"?key:vk;
  if(gk){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${gk}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime,data:b64}}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates[0].content.parts[0].text;}
  if(pid==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"gpt-4o",max_tokens:1200,messages:[{role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.choices[0].message.content;}
  if(pid==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.content[0].text;}
  throw new Error("Vision এর জন্য Gemini/OpenAI/Claude key লাগবে।");
}

async function predMatch(pid,key,m){
  const txt=await ai(pid,key,`Sports betting analyst. Match: ${m.teamA||m.home} vs ${m.teamB||m.away}, Sport:${m.sport||"Football"}, League:${m.league||"Unknown"}. Respond ONLY valid JSON no markdown: {"teamA":"${m.teamA||m.home}","teamB":"${m.teamB||m.away}","sport":"${m.sport||"Football"}","league":"${m.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`);
  return pj(txt);
}

async function predSlip(pid,key,matches){
  const data=matches.map((m,i)=>`#${i+1}:${m.teamA} vs ${m.teamB}|${m.market}|Odds:${m.odds}|Prob:${m.prob}%`).join("\n");
  const cp=combinedProb(matches);
  const txt=await ai(pid,key,`Betting risk analyst. Slip:\n${data}\nCombined:${cp}% Matches:${matches.length}\nRespond ONLY valid JSON no markdown: {"verdict":"<Safe to Play|Risky but Possible|Very Risky - Reconsider>","confidenceScore":<0-100>,"riskLevel":"<Low|Medium|High|Very High>","summary":"<3 sentences>","weakestMatchIndex":<0-based>,"matchAnalysis":[{"idx":<i>,"flag":"<Safe|Moderate|Risky|Very Risky>","reason":"<1-2 sentences>","alternative":"<safer or empty>"}],"suggestions":["<s1>","<s2>","<s3>","<s4>"],"whatIf":[{"removeIdx":<i>,"benefit":"<improvement>","shouldRemove":<true|false>}],"stakeAdvice":"<advice>","profitVsRisk":"<assessment>"}`);
  return pj(txt);
}

  const [op,setOp]=useState(idx===0);
  if(r.error)return <div style={{background:"rgba(255,77,77,0.04)",border:"1px solid rgba(255,77,77,0.1)",borderRadius:11,padding:"11px 13px"}}><p style={{color:"#fff",fontSize:13,fontWeight:700}}>{r.teamA} vs {r.teamB}</p><p style={{color:"#ff7070",fontSize:10,marginTop:3}}>⚠️ {r.error}</p></div>;
  return(

// ── ADMIN PLAN SYSTEM ──
// ══════════════════════════════════════════════
const ADMIN_KEY  = "piq_admin_v1";
const PLAN_KEY   = "piq_plan_cfg_v1";
const KEYS_KEY   = "piq_license_keys_v1";
const USER_KEY   = "piq_user_plan_v1";
const TODAY_KEY  = "piq_today_v1";

const getAdminCfg  = ()=>{try{const s=localStorage.getItem(ADMIN_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const getPlanCfg   = ()=>{try{const s=localStorage.getItem(PLAN_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const getLicKeys   = ()=>{try{const s=localStorage.getItem(KEYS_KEY);return s?JSON.parse(s):[];}catch{return[];}};
const saveLicKeys  = (k)=>{try{localStorage.setItem(KEYS_KEY,JSON.stringify(k));}catch{}};
const getUserPlan  = ()=>{try{const s=localStorage.getItem(USER_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const saveUserPlan = (p)=>{try{p?localStorage.setItem(USER_KEY,JSON.stringify(p)):localStorage.removeItem(USER_KEY);}catch{}};

function defaultPlanCfg(){
  return{
    free:{dailyLimit:3,screenshotEnabled:true,adsEnabled:false,aiLevel:"basic",arbitrage:false,oddsComparison:false},
    premium:{dailyLimit:999,unlimited:true,screenshotEnabled:true,adsEnabled:false,aiLevel:"advanced",arbitrage:true,oddsComparison:true,priorityProcessing:true},
    pricing:{currency:"BDT",weekly:99,monthly:299,lifetime:999,weeklyUSD:1,monthlyUSD:3,lifetimeUSD:10},
    payment:{bkash:"",nagad:"",rocket:"",stripeLink:"",paypalLink:"",instructions:""},
  };
}

// Get active AI providers from admin config
function getAdminProviders(){
  const cfg=getAdminCfg();
  if(!cfg||!cfg.providers)return{primary:null,secondary:null};
  const active=cfg.providers.filter(p=>p.active&&p.key&&p.key.trim());
  return{
    primary:active.find(p=>p.priority==="primary")||null,
    secondary:active.find(p=>p.priority==="secondary")||null,
  };
}

// AI with admin key + failover
async function _aiAdmin(prompt){
  const {primary,secondary}=getAdminProviders();
  if(!primary&&!secondary)throw new Error("Admin panel এ AI provider সেট নেই।");
  if(primary){try{const r=await ai(primary.id,primary.key,prompt);return r;}catch(e){if(!secondary)throw e;}}
  return await ai(secondary.id,secondary.key,prompt);
}

// Vision with admin key + failover
async function _visionAdmin(b64,mime,prompt){
  const {primary,secondary}=getAdminProviders();
  const all=[primary,secondary].filter(Boolean);
  const vIds=["gemini","openai","anthropic"];
  for(const p of all.filter(p=>vIds.includes(p.id))){
    try{return await vision(p.id,p.key,"",b64,mime,prompt);}catch(e){}
  }
  for(const p of all.filter(p=>!vIds.includes(p.id))){
    try{return await ai(p.id,p.key,`I have a betting app screenshot but cannot send the image directly. If you cannot see the image, respond with exactly: [] (empty array). Do NOT invent any matches. Only return matches if you can actually see them. Format: [{"teamA":"","teamB":"","sport":"Football","league":"","rawOdds":""}]`);}catch(e){}
  }
  throw new Error("Screenshot বিশ্লেষণ ব্যর্থ।");
}

async function _predMatchAI(m){
  const txt=await _aiAdmin(`Sports betting analyst. Match: ${m.teamA||m.home} vs ${m.teamB||m.away}, Sport:${m.sport||"Football"}, League:${m.league||"Unknown"}. Respond ONLY valid JSON no markdown: {"teamA":"${m.teamA||m.home}","teamB":"${m.teamB||m.away}","sport":"${m.sport||"Football"}","league":"${m.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`);
  return pj(txt);
}
async function _predSlipAI(matches){
  const data=matches.map((m,i)=>`#${i+1}:${m.teamA} vs ${m.teamB}|${m.market}|Odds:${m.odds}|Prob:${m.prob}%`).join("\n");
  const cp=combinedProb(matches);
  const txt=await _aiAdmin(`Betting risk analyst. Slip:\n${data}\nCombined:${cp}% Matches:${matches.length}\nRespond ONLY valid JSON no markdown: {"verdict":"<Safe to Play|Risky but Possible|Very Risky - Reconsider>","confidenceScore":<0-100>,"riskLevel":"<Low|Medium|High|Very High>","summary":"<3 sentences>","weakestMatchIndex":<0-based>,"matchAnalysis":[{"idx":<i>,"flag":"<Safe|Moderate|Risky|Very Risky>","reason":"<1-2 sentences>","alternative":"<safer or empty>"}],"suggestions":["<s1>","<s2>","<s3>","<s4>"],"whatIf":[{"removeIdx":<i>,"benefit":"<improvement>","shouldRemove":<true|false>}],"stakeAdvice":"<advice>","profitVsRisk":"<assessment>"}`);
  return pj(txt);
}

// ── Plan helpers ──
function isPremium(){
  const up=getUserPlan();
  if(!up||!up.premium)return false;
  if(up.type==="lifetime")return true;
  return up.expiresAt&&new Date(up.expiresAt)>new Date();
}
function getTodayCount(){
  try{const s=localStorage.getItem(TODAY_KEY);const d=s?JSON.parse(s):{};const t=new Date().toISOString().slice(0,10);return d.date===t?d.count:0;}catch{return 0;}
}
function incTodayCount(){
  try{const t=new Date().toISOString().slice(0,10);localStorage.setItem(TODAY_KEY,JSON.stringify({date:t,count:getTodayCount()+1}));}catch{}
}
function canPredict(){
  if(isPremium())return{ok:true};
  const cfg=getPlanCfg()||defaultPlanCfg();
  const limit=cfg.free.dailyLimit;const used=getTodayCount();
  if(used>=limit)return{ok:false,used,limit};
  return{ok:true,used,limit};
}
function activateKey(input){
  const keys=getLicKeys();const k=input.trim().toUpperCase();
  const idx=keys.findIndex(kk=>kk.key===k&&kk.active&&!kk.usedBy);
  if(idx<0){
    if(keys.find(kk=>kk.key===k&&kk.usedBy==="this_device"))return{ok:false,msg:"এই key আগে ব্যবহার হয়েছে।"};
    return{ok:false,msg:"Key পাওয়া যায়নি বা invalid।"};
  }
  const found=keys[idx];
  saveLicKeys(keys.map((kk,i)=>i===idx?{...kk,usedBy:"this_device",usedAt:new Date().toISOString()}:kk));
  const now=new Date();let exp=null;
  if(found.type==="weekly"){const d=new Date(now);d.setDate(d.getDate()+7);exp=d.toISOString();}
  else if(found.type==="monthly"){const d=new Date(now);d.setDate(d.getDate()+30);exp=d.toISOString();}
  saveUserPlan({premium:true,type:found.type,activatedAt:now.toISOString(),expiresAt:exp,key:k});
  return{ok:true,msg:`✅ ${found.type==="lifetime"?"Lifetime ♾️":found.type==="monthly"?"Monthly 📆 (30 দিন)":"Weekly 📅 (7 দিন)"} Premium activated!`};
}

  const up=getUserPlan();
  const [conf,setConf]=useState(false);
  const revoke=()=>{saveUserPlan(null);onRefresh&&onRefresh();onClose();window.location.reload();};
  const expiresIn=up?.expiresAt?Math.ceil((new Date(up.expiresAt)-new Date())/86400000):null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:340,background:"#0c1118",borderRadius:22,border:"1px solid rgba(255,193,7,0.2)",padding:"26px 22px",animation:"fadeUp .3s ease"}}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:48,marginBottom:10}}>⭐</div>
          <h2 style={{color:"#ffc107",fontSize:19,fontWeight:900,margin:"0 0 5px"}}>Premium Active</h2>
          <p style={{color:"#334455",fontSize:12}}>{up?.type==="lifetime"?"Lifetime ♾️":up?.type==="monthly"?"Monthly 📆":"Weekly 📅"}</p>
          {expiresIn!==null&&<p style={{color:"#00ff9d",fontSize:14,fontWeight:700,marginTop:6}}>{expiresIn} দিন বাকি</p>}
          {up?.activatedAt&&<p style={{color:"#1a2a34",fontSize:10,marginTop:4}}>Activated: {up.activatedAt.slice(0,10)}</p>}
        </div>
        <button onClick={onClose} style={{width:"100%",marginBottom:9,background:"linear-gradient(135deg,#ffc107,#ff9800)",border:"none",borderRadius:11,padding:"13px",cursor:"pointer",color:"#060a10",fontWeight:900,fontSize:14}}>✅ Close</button>
        {!conf
          ?<button onClick={()=>setConf(true)} style={{width:"100%",background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.16)",color:"#ff6060",borderRadius:11,padding:"11px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️ Plan Remove করুন</button>
          :<div style={{display:"flex",gap:8}}><button onClick={revoke} style={{flex:1,background:"rgba(255,77,77,0.12)",border:"1px solid rgba(255,77,77,0.28)",color:"#ff4d4d",borderRadius:10,padding:"11px",cursor:"pointer",fontWeight:800,fontSize:13}}>হ্যাঁ, Remove</button><button onClick={()=>setConf(false)} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#667788",borderRadius:10,padding:"11px",cursor:"pointer",fontSize:13}}>বাতিল</button></div>
        }
      </div>
    </div>
  );
}

function HistoryTab({pv}){

  const [filter,setFilter]=useState("all");

  const [markingId,setMarkingId]=useState(null);
  const [showClear,setShowClear]=useState(false);

  const refresh=()=>setHist([...getHistory()]);

  const doMark=(id,won)=>{
    updateResult(id,won);
    setMarkingId(null);
    refresh();
  };

  const doClear=()=>{
    localStorage.removeItem(HIST_KEY);
    setShowClear(false);
    refresh();
  };

  const filtered=hist.filter(h=>{
    if(filter==="pending"&&h.result!==null)return false;

    if(filter==="loss"&&h.result!==false)return false;
    return true;
  });

    const diff=Date.now()-ts;
    if(diff<3600000)return Math.round(diff/60000)+"m আগে";
    if(diff<86400000)return Math.round(diff/3600000)+"h আগে";
    return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
  };

  const AC=stats.acc;
  const acColor=AC>=70?"#00ff9d":AC>=50?"#ffc107":"#ff4d4d";

        <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:13}}>
          <div style={{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,rgba(139,92,246,0.35),rgba(59,130,246,0.2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21}}>📈</div>
          <div style={{flex:1}}>
            <div style={{color:"#fff",fontSize:16,fontWeight:900}}>Prediction <span style={{color:"#a78bfa"}}>History</span></div>

            {l:"Loss",v:stats.settled-stats.wins,c:"#ff4d4d",icon:"❌"},

                </div>
                <div style={{flex:1}}>
                  <div style={{color:"#c8d8e8",fontWeight:800,fontSize:13,marginBottom:3}}>Overall Accuracy</div>
                  <div style={{color:"#445566",fontSize:11,marginBottom:9}}>{stats.wins} correct / {stats.settled} settled</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {stats.daily!==null&&<span style={{background:"rgba(0,255,157,0.08)",border:"1px solid rgba(0,255,157,0.2)",color:"#00ff9d",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:12}}>Today: {stats.daily}%</span>}
                    {stats.weekly!==null&&<span style={{background:"rgba(255,193,7,0.08)",border:"1px solid rgba(255,193,7,0.2)",color:"#ffc107",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:12}}>Week: {stats.weekly}%</span>}

              {/* Market breakdown */}
              {Object.keys(stats.mStats).length>0&&(

                  <p style={{color:"#c8d8e8",fontWeight:800,fontSize:12,marginBottom:11}}>📊 Market Accuracy</p>

                          <div style={{height:"100%",width:`${a}%`,background:`linear-gradient(90deg,${col}55,${col})`,borderRadius:4}}/>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>

          {/* Filter buttons */}

              {k:"all",l:"🔘 All",c:"#a78bfa"},
              {k:"pending",l:"⏳ Pending",c:"#ffc107"},
              {k:"win",l:"✅ Win",c:"#00ff9d"},
              {k:"loss",l:"❌ Loss",c:"#ff4d4d"},
            ].map(f=>(
              <button key={f.k} onClick={()=>setFilter(f.k)}
                style={{padding:"7px 13px",borderRadius:20,border:`1px solid ${filter===f.k?f.c+"55":"rgba(255,255,255,0.06)"}`,background:filter===f.k?`${f.c}12`:"rgba(255,255,255,0.02)",color:filter===f.k?f.c:"#445566",cursor:"pointer",fontSize:11,fontWeight:700,WebkitTapHighlightColor:"transparent"}}>
                {f.l}
              </button>
            ))}
            {hist.length>0&&(
              <button onClick={()=>setShowClear(true)}
                style={{marginLeft:"auto",padding:"7px 11px",borderRadius:20,border:"1px solid rgba(255,77,77,0.15)",background:"rgba(255,77,77,0.05)",color:"#ff6060",cursor:"pointer",fontSize:11,fontWeight:700,WebkitTapHighlightColor:"transparent"}}>
                🗑️
              </button>
            )}
          </div>

          {/* Clear confirm */}
          {showClear&&(
            <div style={{background:"rgba(255,77,77,0.07)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:12,padding:"13px 14px"}}>
              <p style={{color:"#ff7070",fontWeight:700,fontSize:12,marginBottom:10}}>⚠️ সব history মুছে ফেলবেন?</p>

              </div>
            </div>
          )}

          {/* Empty */}
          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"44px 20px",background:"rgba(255,255,255,0.015)",borderRadius:16,border:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{fontSize:42,marginBottom:11}}>📭</div>
              <p style={{color:"#c8d8e8",fontWeight:700,fontSize:14,marginBottom:6}}>{hist.length===0?"কোনো Prediction নেই":"কোনো result পাওয়া যায়নি"}</p>
              <p style={{color:"#2a3a44",fontSize:11}}>{hist.length===0?"Screenshot বা Manual ট্যাবে prediction নিন":"অন্য filter বেছে নিন"}</p>
            </div>
          )}

          {/* Cards */}
          {filtered.map((h)=>{
            const conf=h.confidence>=80?"High":h.confidence>=60?"Medium":"Low";
            const confCol=conf==="High"?"#00ff9d":conf==="Medium"?"#ffc107":"#ff8800";
            const rCol=h.result===true?"#00ff9d":h.result===false?"#ff4d4d":"#ffc107";
            const rLabel=h.result===true?"✅ Win":h.result===false?"❌ Loss":"⏳ Pending";
            const isMarking=markingId===h.id;
            return(
              <div key={h.id} style={{background:h.result===true?"rgba(0,255,157,0.03)":h.result===false?"rgba(255,77,77,0.03)":"rgba(255,255,255,0.02)",border:`1px solid ${h.result===true?"rgba(0,255,157,0.12)":h.result===false?"rgba(255,77,77,0.12)":"rgba(255,255,255,0.06)"}`,borderRadius:14,padding:"13px 13px",position:"relative",overflow:"hidden"}}>
                {h.result===true&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#00ff9d55,transparent)"}}/>}
                {h.result===false&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#ff4d4d55,transparent)"}}/>}

                {/* Match + result badge */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:7}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:"#fff",fontWeight:800,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.match}</div>
                    <div style={{color:"#445566",fontSize:9,marginTop:2}}>{h.league} · {fmtTime(h.time)}</div>
                  </div>
                  <span style={{color:rCol,fontSize:10,fontWeight:800,background:`${rCol}12`,border:`1px solid ${rCol}28`,padding:"4px 9px",borderRadius:10,flexShrink:0}}>{rLabel}</span>
                </div>

                {/* Tags */}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:h.result===null?10:0}}>
                  <span style={{background:"rgba(139,92,246,0.12)",color:"#a78bfa",fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:9,border:"1px solid rgba(139,92,246,0.22)"}}>{h.market}</span>
                  <span style={{background:"rgba(255,255,255,0.05)",color:"#c8d8e8",fontSize:10,fontWeight:600,padding:"3px 9px",borderRadius:9}}>{h.prediction}</span>
                  <span style={{background:`${confCol}12`,color:confCol,fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:9,border:`1px solid ${confCol}28`}}>{conf} {h.prob}%</span>
                </div>

                {/* Mark result */}
                {h.result===null&&(
                  isMarking?(
                    <div style={{display:"flex",gap:7}}>
                      <button onTouchEnd={(e)=>{e.preventDefault();doMark(h.id,true);}} onClick={()=>doMark(h.id,true)}
                        style={{flex:1,background:"rgba(0,255,157,0.1)",border:"1px solid rgba(0,255,157,0.28)",color:"#00ff9d",borderRadius:10,padding:"10px 0",cursor:"pointer",fontSize:13,fontWeight:900,WebkitTapHighlightColor:"transparent"}}>
                        ✅ Win
                      </button>
                      <button onTouchEnd={(e)=>{e.preventDefault();doMark(h.id,false);}} onClick={()=>doMark(h.id,false)}
                        style={{flex:1,background:"rgba(255,77,77,0.1)",border:"1px solid rgba(255,77,77,0.28)",color:"#ff4d4d",borderRadius:10,padding:"10px 0",cursor:"pointer",fontSize:13,fontWeight:900,WebkitTapHighlightColor:"transparent"}}>
                        ❌ Loss
                      </button>
                      <button onTouchEnd={(e)=>{e.preventDefault();setMarkingId(null);}} onClick={()=>setMarkingId(null)}
                        style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",color:"#445566",borderRadius:10,padding:"10px 12px",cursor:"pointer",fontSize:12,WebkitTapHighlightColor:"transparent"}}>
                        ✕
                      </button>
                    </div>
                  ):(
                    <button onTouchEnd={(e)=>{e.preventDefault();setMarkingId(h.id);}} onClick={()=>setMarkingId(h.id)}
                      style={{width:"100%",background:"rgba(255,193,7,0.06)",border:"1px solid rgba(255,193,7,0.18)",color:"#ffc107",borderRadius:10,padding:"9px 0",cursor:"pointer",fontSize:11,fontWeight:700,WebkitTapHighlightColor:"transparent"}}>
                      ⚡ Result আপডেট করুন
                    </button>
                  )
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


function SlipTab({cfg}){
  const [sms,setSms]=useState([]);
  const [form,setForm]=useState({teamA:"",teamB:"",market:"1X2 Home Win",odds:""});
  const [stake,setStake]=useState("");
  const [an,setAn]=useState(null);
  const [load,setLoad]=useState(false);
  const [msg,setMsg]=useState("");
  const [er,setEr]=useState(null);
  const cp=combinedProb(sms);const ri=slipRisk(cp);
  const tot=sms.reduce((p,m)=>p*parseFloat(m.odds||1),1);
  const ret=stake?Math.round(parseFloat(stake)*tot*100)/100:null;
  const addM=()=>{if(!form.teamA.trim()||!form.teamB.trim()||!form.odds)return;setSms(m=>[...m,{...form,prob:oddsToProb(form.odds),id:Date.now()}]);setForm(f=>({...f,teamA:"",teamB:"",odds:""}));setAn(null);setEr(null);};
  const rmM=i=>{setSms(m=>m.filter((_,j)=>j!==i));setAn(null);};
  const run=async()=>{if(!sms.length){setEr("Match যোগ করুন।");return;}setLoad(true);setEr(null);setAn(null);try{setMsg("🤖 AI বিশ্লেষণ করছে...");setAn(await _predSlipAI(sms));}catch(e){setEr(e.message);}setLoad(false);setMsg("");};
  const wip=i=>combinedProb(sms.filter((_,j)=>j!==i));

function BottomNav({tab,setTab,pv,accumLen}){

  const navItems=[
    {id:"home",  icon:"🏠", label:"Home"},

  return(

  );

  const {primary,secondary}=getAdminProviders();
  const hasAI=!!(primary||secondary);
  if(!hasAI)return <NoConfig/>;

  const activeMeta=primary?PROVIDERS.find(p=>p.id===primary.id):secondary?PROVIDERS.find(p=>p.id===secondary.id):PROVIDERS[0];
  const pv=activeMeta||PROVIDERS[0];

  // Plan
  const [planR,setPlanR]=useState(0);
  const [showUpgrade,setShowUpgrade]=useState(false);
  const [showManage,setShowManage]=useState(false);
  const planCfg=getPlanCfg()||defaultPlanCfg();

  // App state
  const [tab,setTab]=useState(()=>sessionStorage.getItem("piq_tab")||"upload");
  const switchTab=(t)=>{sessionStorage.setItem("piq_tab",t);setTab(t);};
  const [sport,setSport]=useState("football");
  const [tA,setTA]=useState("");const [tB,setTB]=useState("");
  const [league,setLeague]=useState("");const [sm,setSm]=useState([]);
  const [prev,setPrev]=useState(null);const [b64,setB64]=useState(null);const [mime,setMime]=useState("image/png");
  const [drag,setDrag]=useState(false);
  const [load,setLoad]=useState(false);const [msg,setMsg]=useState("");
  const [results,setResults]=useState([]);const [manR,setManR]=useState(null);
  const [accum,setAccum]=useState([]);const [er,setEr]=useState(null);
  const fRef=useRef();

  const checkLimit=()=>{const r=canPredict();if(!r.ok){setShowUpgrade(true);return false;}return true;};
  const addAcc=(r)=>{const b=r.predictions?.find(p=>p.best)||r.predictions?.[0];if(!b)return;setAccum(a=>[...a,{match:`${r.teamA} vs ${r.teamB}`,market:`${b.market}: ${b.prediction}`,prob:b.prob,id:Date.now()}]);};
  const togM=m=>setSm(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  const pf=async(f)=>{if(!f||!f.type.startsWith("image/")){setEr("Image দিন।");return;}setMime(f.type);setPrev(URL.createObjectURL(f));setResults([]);setEr(null);try{setB64(await f2b(f));}catch{setEr("ফাইল পড়া যায়নি।");}};
  const VP=`Analyze this betting app screenshot carefully. Extract ONLY the matches that are ACTUALLY VISIBLE in the image. Do NOT invent, guess, or add any matches that are not clearly shown. If you see only 1 match, return only 1. If none visible, return empty array []. Respond ONLY as JSON array no markdown: [{"teamA":"<exact team name from image>","teamB":"<exact team name from image>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<league if visible>","rawOdds":"<odds if visible>"}]`;

  const runShot=async()=>{
    if(!b64){setEr("Screenshot দিন।");return;}
    if(!checkLimit())return;
    setLoad(true);setEr(null);setResults([]);
    try{
      setMsg("📸 Matches খুঁজছি...");
      const txt=await _visionAdmin(b64,mime,VP);
      let ms=pa(txt);
      // Filter out placeholder/fake entries
      ms=ms.filter(m=>{
        const a=(m.teamA||"").trim();const b=(m.teamB||"").trim();
        if(!a||!b)return false;
        if(a==="<n>"||b==="<n>"||a==="<home>"||b==="<away>")return false;
        if(a.length<2||b.length<2)return false;
        return true;
      });
      if(!ms?.length){setEr("Screenshot এ কোনো ম্যাচ পাওয়া যায়নি। একটি বেটিং অ্যাপের স্ক্রিনশট দিন যেখানে ম্যাচ দৃশ্যমান।");setLoad(false);return;}
      const all=[];
      for(let i=0;i<ms.length;i++){
        setMsg(`🤖 ${i+1}/${ms.length}: ${ms[i].teamA} vs ${ms[i].teamB}...`);
        try{const pr=await _predMatchAI(ms[i]);addPrediction(pr);all.push(pr);}
        catch(e){all.push({...ms[i],error:e.message,predictions:[],winProb:50,confidence:50});}
      }
      setResults(all);incTodayCount();setPlanR(r=>r+1);
    }catch(e){setEr(e.message);}
    setLoad(false);setMsg("");
  };

  const runManual=async()=>{
    if(!tA||!tB){setEr("Team name দিন।");return;}
    if(!checkLimit())return;
    setLoad(true);setEr(null);setManR(null);
    try{
      setMsg(`🤖 ${tA} vs ${tB}...`);
      const res=await _predMatchAI({teamA:tA,teamB:tB,sport,league,rawOdds:sm.join(",")});
      setManR(res);addPrediction(res);incTodayCount();setPlanR(r=>r+1);
    }catch(e){setEr(e.message);}
    setLoad(false);setMsg("");
  };

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"12px 13px",color:"#e0e6f0",fontSize:14,outline:"none",width:"100%"};
  const BP=(d)=>({background:d?`${pv.color}0d`:`linear-gradient(135deg,${pv.color},${pv.color}cc)`,border:"none",borderRadius:11,padding:"13px",cursor:d?"not-allowed":"pointer",color:d?"#2a3a44":"#fff",fontWeight:900,fontSize:15,width:"100%",opacity:d?0.6:1,boxShadow:d?"none":`0 4px 18px ${pv.color}25`});

  const TABS=[
    {id:"upload",icon:"📸",label:"Screenshot"},
    {id:"manual",icon:"✏️",label:"Manual"},
    {id:"slip",icon:"📊",label:"BetSlip",hc:"#ffc107"},
    {id:"accumulator",icon:"🔗",label:accum.length?`Accum(${accum.length})`:"Accum"},
    {id:"history",icon:"📈",label:"History",hc:"#a78bfa"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#060a10",position:"relative"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,255,157,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.012) 1px,transparent 1px)",backgroundSize:"44px 44px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:880,margin:"0 auto",padding:"16px 14px 90px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:11,marginBottom:7}}>
            <div style={{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,#00ff9d11,#00ff9d22)",border:"1.5px solid #00ff9d33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚡</div>
            <span style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#2a3a44",fontSize:12,marginBottom:8}}>AI Prediction · BetSlip Risk · Multi-Bet</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${pv.color}0a`,border:`1px solid ${pv.color}20`,borderRadius:22,padding:"5px 14px"}}>
            <span style={{fontSize:15}}>{pv.icon}</span>
            <span style={{color:pv.color,fontSize:13,fontWeight:700}}>{pv.name} Powered</span>
            {secondary&&<span style={{color:"#334455",fontSize:10}}>+ Backup</span>}
          </div>
        </div>

        {/* Plan Banner */}
        <PlanBanner refresh={planR} onUpgrade={()=>setShowUpgrade(true)} onManage={()=>setShowManage(true)}/>

        {/* Sub Nav — shown only for BetSlip/History tabs */}
        {(tab==="slip"||tab==="history"||tab==="accumulator")&&<div style={{display:"flex",gap:5,marginBottom:16,overflowX:"auto"}}>
          {[{id:"slip",l:"📊 BetSlip",hc:"#ffc107"},{id:"accumulator",l:`🔗 Accum${accum.length?` (${accum.length})`:""}`,hc:"#00ff9d"},{id:"history",l:"📈 History",hc:"#a78bfa"}].map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{flexShrink:0,padding:"8px 14px",borderRadius:22,border:`1px solid ${tab===t.id?t.hc+"44":"rgba(255,255,255,0.06)"}`,background:tab===t.id?`${t.hc}12`:"rgba(255,255,255,0.02)",color:tab===t.id?t.hc:"#334455",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?800:500}}>{t.l}</button>
          ))}
        </div>}

        {/* Screenshot */}
        {tab==="upload"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div onClick={()=>!load&&fRef.current?.click()} onDrop={e=>{e.preventDefault();setDrag(false);pf(e.dataTransfer.files[0]);}} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            style={{border:`2px dashed ${drag?pv.color:prev?pv.color+"33":"rgba(255,255,255,0.05)"}`,borderRadius:13,padding:"28px 16px",textAlign:"center",cursor:"pointer",background:drag?`${pv.color}05`:prev?`${pv.color}02`:"rgba(255,255,255,0.01)"}}>
            <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pf(e.target.files[0])}/>
            {prev?<div><img src={prev} style={{maxHeight:170,maxWidth:"100%",borderRadius:8,marginBottom:8,border:`1px solid ${pv.color}20`,objectFit:"contain"}}/><p style={{color:pv.color,fontSize:11,fontWeight:700}}>✓ Ready</p></div>
            :<div><div style={{fontSize:42,marginBottom:8}}>📸</div><p style={{color:"#c8d8e8",fontWeight:700,fontSize:13}}>Screenshot আপলোড করুন</p><p style={{color:"#1a2a34",fontSize:10,marginTop:3}}>সব ম্যাচ AI বিশ্লেষণ হবে</p></div>}
          </div>
          {prev&&<button onClick={runShot} disabled={load} style={BP(load)}>{load?msg||"⏳ বিশ্লেষণ...":"⚡ সব ম্যাচ বিশ্লেষণ করুন"}</button>}
          <Err msg={er}/>
          {results.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{color:"#00ff9d",fontSize:10,fontWeight:700}}>✅ {results.length} ম্যাচ</p>
              <button onClick={()=>results.forEach(r=>!r.error&&addAcc(r))} style={{background:"rgba(0,255,157,0.06)",border:"1px solid rgba(0,255,157,0.12)",borderRadius:6,padding:"3px 9px",cursor:"pointer",color:"#00ff9d",fontWeight:700,fontSize:9}}>সব → Accum</button>
            </div>
            {results.map((r,i)=><MCard key={i} r={r} idx={i} onAdd={addAcc} pc={pv.color}/>)}
          </div>}
        </div>}

        {/* Manual */}
        {tab==="manual"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{SPORTS.map(s=><button key={s.id} onClick={()=>{setSport(s.id);setSm([]);}} style={{padding:"8px 13px",borderRadius:28,border:`1px solid ${sport===s.id?pv.color:"rgba(255,255,255,0.05)"}`,background:sport===s.id?`${pv.color}11`:"rgba(255,255,255,0.01)",color:sport===s.id?pv.color:"#334455",cursor:"pointer",fontSize:12,fontWeight:600}}>{s.icon} {s.label}</button>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}><input placeholder="Team A" value={tA} onChange={e=>setTA(e.target.value)} style={INP}/><input placeholder="Team B" value={tB} onChange={e=>setTB(e.target.value)} style={INP}/></div>
          <input placeholder="League (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
          <div><p style={{color:"#2a3a44",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:7}}>MARKETS</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{MARKETS[sport].map(m=><button key={m} onClick={()=>togM(m)} style={{padding:"6px 11px",borderRadius:18,border:`1px solid ${sm.includes(m)?pv.color:"rgba(255,255,255,0.04)"}`,background:sm.includes(m)?`${pv.color}0f`:"rgba(255,255,255,0.01)",color:sm.includes(m)?pv.color:"#2a3a44",cursor:"pointer",fontSize:11,fontWeight:600}}>{m}</button>)}</div></div>
          <button onClick={runManual} disabled={load} style={BP(load)}>{load?msg||"⏳ তৈরি করছি...":"🎯 AI Prediction নিন"}</button>
          <Err msg={er}/>
          {manR&&<MCard r={manR} idx={0} onAdd={addAcc} pc={pv.color}/>}
        </div>}

        {/* BetSlip */}
        {tab==="slip"&&<SlipTab/>}

        {/* Accumulator */}
        {tab==="accumulator"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:13,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
              <p style={{color:"#c8d8e8",fontWeight:800,fontSize:12}}>🔗 Multi-Bet Accumulator</p>
              {accum.length>0&&<button onClick={()=>setAccum([])} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.11)",color:"#ff6060",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:9}}>🗑️</button>}
            </div>
            {accum.length===0?<p style={{color:"#0a1418",textAlign:"center",padding:"20px 0",fontSize:11}}>কোনো bet নেই।</p>
            :<div style={{display:"flex",flexDirection:"column",gap:5}}>{accum.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.012)",borderRadius:7,padding:"7px 10px",border:"1px solid rgba(255,255,255,0.03)"}}><div style={{flex:1,minWidth:0,marginRight:7}}><div style={{color:"#c8d8e8",fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div><div style={{color:"#1a2a34",fontSize:9,marginTop:1}}>{a.market}</div></div><span style={{color:"#00ff9d",fontWeight:900,fontSize:13,fontFamily:"monospace",marginRight:6}}>{a.prob}%</span><button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.1)",color:"#ff6060",borderRadius:4,padding:"1px 6px",cursor:"pointer",fontSize:9}}>✕</button></div>)}</div>}
          </div>
          {accum.length>0&&<div style={{background:ap<30?"rgba(255,77,77,0.03)":"rgba(0,255,157,0.02)",border:`1px solid ${ap<30?"rgba(255,77,77,0.1)":"rgba(0,255,157,0.08)"}`,borderRadius:13,padding:14}}>
            <p style={{color:"#0e1a20",fontSize:8,fontWeight:700,letterSpacing:1,margin:"0 0 3px"}}>COMBINED</p>
            <div style={{fontSize:36,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:3}}>{ap}%</div>
            <p style={{color:"#0e1a20",fontSize:9,marginBottom:9}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
            <Bar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"} h={6}/>
            {ap<30&&<div style={{background:"rgba(255,77,77,0.04)",border:"1px solid rgba(255,77,77,0.09)",borderRadius:7,padding:"7px 10px",marginTop:9}}><p style={{color:"#ff5555",fontSize:9,fontWeight:700}}>⚠️ Multi-bet এ risk অনেক বেড়ে যায়।</p></div>}
          </div>}
        </div>}

        {/* History */}
        {tab==="history"&&<HistoryTab pv={pv}/>}

        {/* Profile */}
        {tab==="profile"&&<ProfileTab pv={pv} onUpgrade={()=>setShowUpgrade(true)} onManage={()=>setShowManage(true)}/>}

      </div>

      {/* Bottom Nav */}
      <BottomNav tab={tab} setTab={switchTab} pv={pv} accumLen={accum.length}/>

      {/* Modals */}
      {showUpgrade&&<UpgradeModal onClose={()=>setShowUpgrade(false)} onSuccess={()=>{setPlanR(r=>r+1);}}/>}
      {showManage&&<ManageModal onClose={()=>setShowManage(false)} onRefresh={()=>setPlanR(r=>r+1)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
