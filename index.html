/* ── STORAGE ────────────────────────────────────────────────────── */
function getCfg(){try{const s=localStorage.getItem("piq3");return s?JSON.parse(s):null;}catch{return null;}}
function saveCfg(c){try{localStorage.setItem("piq3",JSON.stringify(c));}catch{}}
function clearCfg(){try{localStorage.removeItem("piq3");}catch{}}
function fileToBase64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}
function pj(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("{"),e=c.lastIndexOf("}");if(s<0||e<0)throw new Error("JSON পাওয়া যায়নি");return JSON.parse(c.slice(s,e+1));}
function pja(t){const c=t.replace(/```json|```/g,"").trim();const s=c.indexOf("["),e=c.lastIndexOf("]");if(s<0||e<0)throw new Error("Array JSON পাওয়া যায়নি");return JSON.parse(c.slice(s,e+1));}

/* ── STEP 1: Extract ALL matches from screenshot using Gemini Vision ── */
async function extractMatchesFromImage(geminiKey, imgB64, mime){
  const prompt = `You are a sports betting data extractor. Look at this betting app screenshot carefully.
Extract ALL matches/games visible on screen. For each match extract: teams, sport, league, and all visible odds/markets.

Respond ONLY in valid JSON array (no markdown, no backticks):
[
  {
    "teamA": "<team name>",
    "teamB": "<team name>", 
    "sport": "<Football|Cricket|Basketball|Tennis|Hockey>",
    "league": "<league name or Unknown>",
    "markets": ["<market1: odds>", "<market2: odds>"],
    "rawOdds": "<all visible odds as text>"
  }
]
Include EVERY match visible. Do not skip any.`;

  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime||"image/png",data:imgB64}}]}]})
  });
  const data = await resp.json();
  if(data.error) throw new Error("Gemini Vision: "+data.error.message);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text||"";
  return pja(text);
}

/* ── STEP 2: Get AI predictions for each match ── */
async function getPredictionsForMatch(pid, key, matchData){
  const prompt = `You are a sports betting analyst AI.
Match: ${matchData.teamA} vs ${matchData.teamB}
Sport: ${matchData.sport}, League: ${matchData.league}
Visible odds/markets: ${matchData.rawOdds||matchData.markets?.join(", ")||"Standard markets"}

Based on this data, provide detailed predictions for all available markets.
Respond ONLY in valid JSON (no markdown):
{
  "teamA":"${matchData.teamA}",
  "teamB":"${matchData.teamB}",
  "sport":"${matchData.sport}",
  "league":"${matchData.league}",
  "confidence":<60-92>,
  "winProb":<55-88>,
  "riskLevel":"<Low|Medium|High>",
  "predictions":[
    {"market":"<market>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}
  ],
  "analysis":"<2 sentence match analysis>",
  "keyFactors":["<f1>","<f2>","<f3>"]
}`;

  if(pid==="groq"){
    const resp = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    return pj(data.choices?.[0]?.message?.content||"");
  }
  if(pid==="gemini"){
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    return pj(data.candidates?.[0]?.content?.parts?.[0]?.text||"");
  }
  if(pid==="openai"){
    const resp = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"gpt-4o-mini",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    return pj(data.choices?.[0]?.message?.content||"");
  }
  if(pid==="anthropic"){
    const resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    return pj(data.content.map(b=>b.text||"").join(""));
  }
}

/* ── MANUAL prediction ── */
async function getManualPrediction(pid, key, manualData){

{"teamA":"${manualData.teamA}","teamB":"${manualData.teamB}","sport":"${manualData.sport}","league":"${manualData.league||"Unknown"}","confidence":<60-92>,"winProb":<55-88>,"riskLevel":"<Low|Medium|High>","predictions":[{"market":"<m>","prediction":"<pick>","prob":<50-90>,"risk":"<Low|Medium|High>","best":<true|false>}],"analysis":"<2 sentences>","keyFactors":["<f1>","<f2>","<f3>"]}`;

  if(pid==="groq"){
    const resp = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    return pj(data.choices?.[0]?.message?.content||"");
  }
  return getPredictionsForMatch(pid,key,{...manualData,rawOdds:manualData.markets.join(", ")});
}

/* ── UI Components ──────────────────────────────────────────────── */
function ProbBar({v,c}){
  return <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:7,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${v}%`,background:`linear-gradient(90deg,${c}77,${c})`,boxShadow:`0 0 8px ${c}44`,transition:"width 1.2s ease",borderRadius:4}}/>
  </div>;
}
function Ring({value,label,color}){
  const r=27,c=2*Math.PI*r,d=(value/100)*c;
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <svg width={68} height={68} style={{transform:"rotate(-90deg)"}}>
      <circle cx={34} cy={34} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={5}/>
      <circle cx={34} cy={34} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
      <text x={34} y={34} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={13} fontWeight={800} style={{transform:"rotate(90deg)",transformOrigin:"34px 34px",fontFamily:"monospace"}}>{value}%</text>
    </svg>
    <span style={{color:"#667788",fontSize:10,fontWeight:700,letterSpacing:0.7}}>{label}</span>
  </div>;
}
function PCard({market,prob,risk,best}){
  return <div style={{background:best?"rgba(0,255,157,0.06)":"rgba(255,255,255,0.025)",border:`1px solid ${best?"#00ff9d33":"#ffffff0d"}`,borderRadius:10,padding:"11px 14px",position:"relative"}}>

      </div>
    </div>
    <ProbBar v={prob} c={RC[risk]}/>
  </div>;
}

                <span style={{color:"#445566",fontSize:11,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <p style={{color:"#1a2a34",fontSize:10,textAlign:"center",marginTop:10}}>🔒 Key শুধু browser এ save হয়</p>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ────────────────────────────────────────────────────── */
function App(){
  const [cfg,setCfg]=useState(()=>getCfg());
  const [tab,setTab]=useState("upload");
  const [sport,setSport]=useState("football");
  const [teamA,setTeamA]=useState("");
  const [teamB,setTeamB]=useState("");
  const [league,setLeague]=useState("");
  const [sm,setSm]=useState([]);
  const [preview,setPreview]=useState(null);
  const [b64,setB64]=useState(null);
  const [mime,setMime]=useState("image/png");
  const [drag,setDrag]=useState(false);
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState("");
  const [results,setResults]=useState([]); // array of match results
  const [manualResult,setManualResult]=useState(null);
  const [accum,setAccum]=useState([]);
  const [selected,setSelected]=useState([]);
  const [error,setError]=useState(null);
  const fileRef=useRef();

  if(!cfg) return <KeyScreen onSave={setCfg}/>;
  const prov=PROVIDERS.find(p=>p.id===cfg.pid)||PROVIDERS[0];

  const processFile=async(f)=>{
    if(!f||!f.type.startsWith("image/")){setError("JPG বা PNG ফাইল দিন।");return;}
    setMime(f.type);setPreview(URL.createObjectURL(f));setResults([]);setError(null);
    try{setB64(await fileToBase64(f));}catch{setError("ফাইল পড়া যায়নি।");}
  };

  const analyzeScreenshot=async()=>{
    if(!b64){setError("আগে স্ক্রিনশট আপলোড করুন।");return;}

    // Decide which key to use for vision
    const visionKey = cfg.pid==="groq"
      ? (cfg.visionKey||null)
      : cfg.pid==="gemini"?cfg.key:null;

    if(cfg.pid==="groq"&&!cfg.visionKey){
      setError("Groq এ screenshot দেখার ক্ষমতা নেই। Gemini Vision Key যোগ করুন অথবা Manual tab ব্যবহার করুন।");
      return;
    }
    if(!visionKey&&cfg.pid!=="openai"&&cfg.pid!=="anthropic"){
      setError("Screenshot বিশ্লেষণের জন্য Gemini বা OpenAI key লাগবে।");
      return;
    }

    setLoading(true);setError(null);setResults([]);

    try{
      // Step 1: Extract all matches from screenshot
      setLoadMsg("📸 Screenshot থেকে সব ম্যাচ খুঁজে বের করছি...");
      let matches;
      if(cfg.pid==="openai"){
        // OpenAI can do vision directly
        const prompt = `Look at this betting app screenshot. Extract ALL visible matches/games.
Respond ONLY as JSON array (no markdown):
[{"teamA":"<n>","teamB":"<n>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<l>","markets":["<m1>"],"rawOdds":"<all odds text>"}]`;
        const resp = await fetch("https://api.openai.com/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`},
          body:JSON.stringify({model:"gpt-4o",max_tokens:1500,messages:[{role:"user",content:[{type:"text",text:prompt},{type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}}]}]})
        });
        const data=await resp.json();
        if(data.error)throw new Error(data.error.message);
        matches=pja(data.choices?.[0]?.message?.content||"");
      } else if(cfg.pid==="anthropic"){
        const prompt = `Look at this betting app screenshot. Extract ALL visible matches/games.
Respond ONLY as JSON array (no markdown):
[{"teamA":"<n>","teamB":"<n>","sport":"<Football|Cricket|Basketball|Tennis|Hockey>","league":"<l>","markets":["<m1>"],"rawOdds":"<all odds text>"}]`;
        const resp = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}]}]})
        });
        const data=await resp.json();
        if(data.error)throw new Error(data.error.message);
        matches=pja(data.content.map(b=>b.text||"").join(""));
      } else {
        // Gemini vision (for gemini provider or groq+gemini vision key)
        const gKey = cfg.pid==="gemini"?cfg.key:cfg.visionKey;
        matches = await extractMatchesFromImage(gKey, b64, mime);
      }

      if(!matches||matches.length===0){
        setError("স্ক্রিনশটে কোনো ম্যাচ খুঁজে পাওয়া যায়নি।");
        setLoading(false);return;
      }

      // Step 2: Get predictions for each match
      const allResults=[];
      for(let i=0;i<matches.length;i++){
        setLoadMsg(`🤖 ${i+1}/${matches.length}: ${matches[i].teamA} vs ${matches[i].teamB} বিশ্লেষণ করছি...`);
        try{
          const pred = await getPredictionsForMatch(cfg.pid,cfg.key,matches[i]);
          allResults.push(pred);
        }catch(e){
          allResults.push({...matches[i],error:e.message,predictions:[],winProb:50,confidence:50,analysis:"বিশ্লেষণ ব্যর্থ হয়েছে।"});
        }
      }
      setResults(allResults);
    }catch(e){
      const m=(e.message||"").toLowerCase();
      if(m.includes("credit")||m.includes("billing")||m.includes("quota")||m.includes("exceeded")||m.includes("limit")){
        setError(`${prov.name} এর limit শেষ। "পরিবর্তন" চাপুন।`);
      } else if(m.includes("401")||m.includes("403")||m.includes("invalid")||m.includes("auth")){
        setError("API Key ভুল।");
      } else {setError("Error: "+e.message);}
    }
    setLoading(false);setLoadMsg("");
  };

  const analyzeManual=async()=>{
    if(!teamA||!teamB){setError("দুটো টিমের নাম দিন।");return;}
    setLoading(true);setError(null);setManualResult(null);
    try{
      const res=await getManualPrediction(cfg.pid,cfg.key,{teamA,teamB,sport,league,markets:sm.length?sm:MARKETS[sport].slice(0,5)});
      setManualResult(res);
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  };

  const addToAccum=(r)=>{
    const best=r.predictions?.find(p=>p.best)||r.predictions?.[0];
    if(!best)return;
    setAccum(a=>[...a,{match:`${r.teamA} vs ${r.teamB}`,market:`${best.market}: ${best.prediction}`,prob:best.prob,id:Date.now()}]);
  };
  const toggleSelect=(r)=>{
    const key=`${r.teamA}-${r.teamB}`;
    setSelected(s=>s.includes(key)?s.filter(x=>x!==key):[...s,key]);
  };
  const isSelected=(r)=>selected.includes(`${r.teamA}-${r.teamB}`);
  const reset=()=>{clearCfg();setCfg(null);setResults([]);setError(null);};
  const toggleM=m=>setSm(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  const ap=accum.length?Math.round(accum.reduce((p,c)=>p*(c.prob/100),1)*100):0;

  const INP={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"11px 12px",color:"#e0e6f0",fontSize:13,outline:"none",width:"100%"};
  const BP=(d)=>({background:d?`${prov.color}15`:`linear-gradient(135deg,${prov.color},${prov.color}bb)`,border:"none",borderRadius:10,padding:"13px",cursor:d?"not-allowed":"pointer",color:d?"#445566":"#fff",fontWeight:900,fontSize:13,width:"100%",opacity:d?0.6:1,boxShadow:d?"none":`0 3px 18px ${prov.color}33`});

  return(
    <div style={{minHeight:"100vh",background:"#080c14",position:"relative"}}>
      <div style={GRID}/>
      <div style={{position:"relative",zIndex:1,maxWidth:840,margin:"0 auto",padding:"14px 12px 40px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:5}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#00ff9d12,#00ff9d28)",border:"1px solid #00ff9d33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <span style={{fontSize:21,fontWeight:900,color:"#fff"}}>Predict<span style={{color:"#00ff9d"}}>IQ</span></span>
          </div>
          <p style={{color:"#2a3a44",fontSize:11,marginBottom:6}}>AI Sports Prediction · All Matches · Multi-Bet</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:`${prov.color}0d`,border:`1px solid ${prov.color}2a`,borderRadius:20,padding:"4px 12px"}}>
            <span>{prov.icon}</span>
            <span style={{color:prov.color,fontSize:11,fontWeight:700}}>{prov.name}</span>
            <span style={{background:`${prov.badgeColor}18`,color:prov.badgeColor,fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:20}}>{prov.badge}</span>
            <button onClick={reset} style={{background:"none",border:"none",color:"#2a3a44",cursor:"pointer",fontSize:10,textDecoration:"underline",padding:0}}>পরিবর্তন</button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11,padding:3,marginBottom:16}}>
          {[{id:"upload",label:"📸 Screenshot"},{id:"manual",label:"✏️ Manual"},{id:"accumulator",label:`🔗 Accum${accum.length?` (${accum.length})`:""}`},{id:"admin",label:"⚙️ Admin"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 3px",borderRadius:9,border:"none",cursor:"pointer",background:tab===t.id?`${prov.color}18`:"transparent",color:tab===t.id?prov.color:"#445566",fontWeight:tab===t.id?700:500,fontSize:11,borderBottom:tab===t.id?`2px solid ${prov.color}`:"2px solid transparent"}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── SCREENSHOT TAB ── */}
        {tab==="upload"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div
              onClick={()=>!loading&&fileRef.current?.click()}
              onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              style={{border:`2px dashed ${drag?prov.color:preview?prov.color+"44":"rgba(255,255,255,0.08)"}`,borderRadius:14,padding:"30px 18px",textAlign:"center",cursor:"pointer",background:drag?`${prov.color}07`:preview?`${prov.color}03`:"rgba(255,255,255,0.01)"}}>
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
              {preview
                ?<div>
                  <img src={preview} style={{maxHeight:180,maxWidth:"100%",borderRadius:8,marginBottom:9,border:`1px solid ${prov.color}2a`,objectFit:"contain"}}/>
                  <p style={{color:prov.color,fontSize:13,fontWeight:700}}>✓ Screenshot ready</p>
                  <p style={{color:"#2a3a44",fontSize:11,marginTop:3}}>অন্য ছবি দিতে ক্লিক করুন</p>
                </div>
                :<div>
                  <div style={{fontSize:44,marginBottom:9}}>📸</div>
                  <p style={{color:"#c8d8e8",fontWeight:700,fontSize:14,marginBottom:4}}>বেটিং অ্যাপের স্ক্রিনশট আপলোড করুন</p>
                  <p style={{color:"#334455",fontSize:12}}>সব ম্যাচ স্বয়ংক্রিয়ভাবে বিশ্লেষণ হবে</p>
                </div>
              }
            </div>

            {preview&&(
              <button onClick={analyzeScreenshot} disabled={loading} style={BP(loading)}>
                {loading?loadMsg||"⏳ বিশ্লেষণ করছি...":`⚡ সব ম্যাচ বিশ্লেষণ করুন`}
              </button>
            )}

            {error&&(
              <div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:9,padding:"11px 13px",color:"#ff7070",fontSize:12,lineHeight:1.6}}>
                ⚠️ {error}
                <button onClick={reset} style={{display:"block",marginTop:7,background:"rgba(255,77,77,0.1)",border:"1px solid rgba(255,77,77,0.22)",color:"#ff7070",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>🔄 অন্য Provider দিন</button>
              </div>
            )}

            {results.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 4px"}}>
                  <p style={{color:"#00ff9d",fontSize:12,fontWeight:700}}>✅ {results.length}টি ম্যাচ পাওয়া গেছে</p>
                  <button onClick={()=>results.forEach(r=>addToAccum(r))} style={{background:"rgba(0,255,157,0.08)",border:"1px solid rgba(0,255,157,0.2)",borderRadius:8,padding:"5px 12px",cursor:"pointer",color:"#00ff9d",fontWeight:700,fontSize:11}}>
                    সব → Accumulator
                  </button>
                </div>
                {results.map((r,i)=>(
                  <MatchResultCard key={i} r={r} idx={i} onAdd={addToAccum} pcolor={prov.color} onSelect={toggleSelect} selected={isSelected(r)}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── MANUAL TAB ── */}
        {tab==="manual"&&(
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {SPORTS.map(s=>(
                <button key={s.id} onClick={()=>{setSport(s.id);setSm([]);}} style={{padding:"7px 12px",borderRadius:30,border:`1px solid ${sport===s.id?prov.color:"rgba(255,255,255,0.08)"}`,background:sport===s.id?`${prov.color}15`:"rgba(255,255,255,0.02)",color:sport===s.id?prov.color:"#667788",cursor:"pointer",fontSize:12,fontWeight:600}}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <input placeholder="Team A" value={teamA} onChange={e=>setTeamA(e.target.value)} style={INP}/>
              <input placeholder="Team B" value={teamB} onChange={e=>setTeamB(e.target.value)} style={INP}/>
            </div>
            <input placeholder="League / Tournament (optional)" value={league} onChange={e=>setLeague(e.target.value)} style={INP}/>
            <div>
              <p style={{color:"#2a3a44",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>MARKETS সিলেক্ট করুন</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {MARKETS[sport].map(m=>(
                  <button key={m} onClick={()=>toggleM(m)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${sm.includes(m)?prov.color:"rgba(255,255,255,0.07)"}`,background:sm.includes(m)?`${prov.color}12`:"rgba(255,255,255,0.015)",color:sm.includes(m)?prov.color:"#445566",cursor:"pointer",fontSize:11,fontWeight:600}}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={analyzeManual} disabled={loading} style={BP(loading)}>
              {loading?"⏳ Prediction তৈরি করছি...":"🎯 AI Prediction নিন"}
            </button>
            {error&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:9,padding:"11px 13px",color:"#ff7070",fontSize:12}}>⚠️ {error}</div>}
            {manualResult&&<MatchResultCard r={manualResult} idx={0} onAdd={addToAccum} pcolor={prov.color} onSelect={()=>{}} selected={false}/>}
          </div>
        )}

        {/* ── ACCUMULATOR TAB ── */}
        {tab==="accumulator"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontWeight:800,fontSize:14,color:"#c8d8e8"}}>🔗 Multi-Bet Accumulator</h3>
                {accum.length>0&&<button onClick={()=>setAccum([])} style={{background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.18)",color:"#ff6060",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11}}>সব মুছুন</button>}
              </div>
              {accum.length===0
                ?<p style={{color:"#2a3a44",textAlign:"center",padding:"24px 0",fontSize:12}}>কোনো bet নেই। ম্যাচ বিশ্লেষণ করে যোগ করুন।</p>
                :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {accum.map(a=>(
                    <div key={a.id} style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 11px",border:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{flex:1,minWidth:0,marginRight:9}}>
                        <div style={{color:"#c8d8e8",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.match}</div>
                        <div style={{color:"#334455",fontSize:10,marginTop:1}}>{a.market}</div>
                      </div>
                      <span style={{color:"#00ff9d",fontWeight:900,fontSize:14,fontFamily:"monospace",marginRight:7}}>{a.prob}%</span>
                      <button onClick={()=>setAccum(s=>s.filter(x=>x.id!==a.id))} style={{background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.18)",color:"#ff6060",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:10}}>✕</button>
                    </div>
                  ))}
                </div>
              }
            </div>
            {accum.length>0&&(
              <div style={{background:ap<30?"rgba(255,77,77,0.04)":"rgba(0,255,157,0.03)",border:`1px solid ${ap<30?"rgba(255,77,77,0.15)":"rgba(0,255,157,0.12)"}`,borderRadius:14,padding:16}}>
                <p style={{color:"#334455",fontSize:10,fontWeight:700,margin:"0 0 4px",letterSpacing:1}}>COMBINED PROBABILITY</p>
                <div style={{fontSize:38,fontWeight:900,color:ap<30?"#ff5555":"#00ff9d",fontFamily:"monospace",marginBottom:4}}>{ap}%</div>
                <p style={{color:"#334455",fontSize:11,marginBottom:10}}>{accum.length} selections · Risk: <b style={{color:ap<25?"#ff5555":ap<50?"#ffc107":"#00ff9d"}}>{ap<25?"Very High":ap<50?"High":"Medium"}</b></p>
                <ProbBar v={ap} c={ap<30?"#ff4d4d":"#00ff9d"}/>
                {ap<30&&<div style={{background:"rgba(255,77,77,0.06)",border:"1px solid rgba(255,77,77,0.15)",borderRadius:8,padding:"9px 12px",marginTop:10}}>
                  <p style={{color:"#ff5555",fontSize:11,fontWeight:700}}>⚠️ Multi-bet এ risk অনেক বেড়ে যায়। সাবধানে সিদ্ধান্ত নিন।</p>
                </div>}
              </div>
            )}
          </div>
        )}

        {/* ── ADMIN TAB ── */}
        {tab==="admin"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[
              {l:"AI Provider",v:prov.name,i:prov.icon},
              {l:"Status",v:prov.badge,i:"✅"},
              {l:"Vision",v:cfg.pid==="groq"?(cfg.visionKey?"Gemini+Groq":"Text Only"):cfg.pid==="gemini"?"Gemini":"Vision AI",i:"📸"},
              {l:"Markets",v:"30+",i:"📊"},
              {l:"Sports",v:"5 Types",i:"🏆"},
              {l:"Multi-Match",v:"Active",i:"🎯"},
            ].map(c=>(
              <div key={c.l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:12,padding:13}}>
                <div style={{fontSize:19,marginBottom:5}}>{c.i}</div>
                <p style={{color:"#2a3a44",fontSize:9,fontWeight:700,margin:"0 0 2px",letterSpacing:0.7}}>{c.l.toUpperCase()}</p>
                <p style={{color:prov.color,fontSize:14,fontWeight:900,fontFamily:"monospace"}}>{c.v}</p>
              </div>
            ))}
            <div style={{gridColumn:"1/-1",background:`${prov.color}08`,border:`1px solid ${prov.color}18`,borderRadius:12,padding:14}}>
              <p style={{color:prov.color,fontWeight:700,fontSize:12,marginBottom:9}}>🔄 Provider পরিবর্তন করুন</p>
              <button onClick={reset} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"8px 14px",cursor:"pointer",color:"#c8d8e8",fontWeight:700,fontSize:11}}>
                🔄 অন্য Provider / Key দিন
              </button>
            </div>
            <div style={{gridColumn:"1/-1",background:"rgba(255,193,7,0.03)",border:"1px solid rgba(255,193,7,0.13)",borderRadius:12,padding:13}}>
              <p style={{color:"#ffc107",fontWeight:700,marginBottom:3,fontSize:12}}>⚠️ Responsible Gambling</p>
