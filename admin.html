<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictIQ Admin</title>
    <style>
        :root {
            --bg: #0f0c29;
            --card: rgba(20, 16, 50, 0.9);
            --accent: #6c5ce7;
            --accent2: #a78bfa;
            --green: #4ade80;
            --red: #f87171;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0c29;
            color: #fff;
            min-height: 100vh;
        }

        .a-header {
            background: rgba(15, 12, 41, 0.95);
            border-bottom: 2px solid var(--gold);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .a-logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        .login-box {
            max-width: 350px;
            margin: 60px auto;
            background: var(--card);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 14px;
            padding: 25px;
        }

        .login-box h2 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #c4b5fd;
            margin-bottom: 3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px;
            border-radius: 6px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(15, 12, 41, 0.8);
            color: #fff;
            font-size: 12px;
        }

        .dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent2);
        }

        .stat-label {
            font-size: 9px;
            color: #7c6fb0;
            margin-top: 2px;
        }

        .tab-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 7px 14px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.1);
            color: #c4b5fd;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .panel {
            background: var(--card);
            border-radius: 10px;
            padding: 15px;
        }

        .provider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 6px 0;
            background: rgba(15, 12, 41, 0.6);
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .provider-row.active-provider {
            border: 2px solid var(--green);
        }

        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 10px;
        }

        .btn-block {
            width: 100%;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .toggle input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 22px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle input:checked+.toggle-slider {
            background: var(--green);
        }

        .toggle input:checked+.toggle-slider:before {
            transform: translateX(18px);
        }

        .alert {
            padding: 8px;
            border-radius: 6px;
            font-size: 10px;
            margin: 8px 0;
        }

        .alert-success {
            background: rgba(74, 222, 128, 0.15);
            color: var(--green);
        }

        .toast {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--green);
            color: #000;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="a-header">
        <span class="a-logo">⚙️ PredictIQ Admin</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <!-- LOGIN -->
        <div class="login-box" id="loginBox">
            <h2>🔐 Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
            </div>
            <button class="btn btn-primary btn-block" onclick="login()">Login</button>
        </div>

        <!-- DASHBOARD -->
        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="totalPreds">0</div>
                    <div class="stat-label">Predictions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#fbbf24;" id="activeAI">-</div>
                    <div class="stat-label">Active AI</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#f87171;" id="maintStatus">OFF</div>
                    <div class="stat-label">Maintenance</div>
                </div>
            </div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="showTab('providers')">🤖 Providers</button>
                <button class="tab-btn" onclick="showTab('apikeys')">🔑 API Keys</button>
                <button class="tab-btn" onclick="showTab('settings')">⚙️ Settings</button>
            </div>

            <div id="tabContent" class="panel"></div>
        </div>

    </div>

    <script>
        // ============ SETTINGS ============
        const DEFAULT = {
            activeProvider: 'gemini',
            providers: {
                gemini: { enabled: true, apiKey: '', model: 'gemini-1.5-flash' },
                openai: { enabled: false, apiKey: '', model: 'gpt-4o' },
                grok: { enabled: false, apiKey: '', model: 'grok-4-vision-preview' }
            },
            siteName: 'PredictIQ',
            minConfidence: 60,
            maintenanceMode: false,
            adminPassword: 'admin123',
            totalPredictions: 0
        };

        function getSettings() {
            try {
                const s = localStorage.getItem('pq_admin_settings');
                return s ? { ...DEFAULT, ...JSON.parse(s) } : DEFAULT;
            } catch { return DEFAULT; }
        }

        function saveAdminSettings(data) {
            localStorage.setItem('pq_admin_settings', JSON.stringify(data));
        }

        function toast(m) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        let loggedIn = sessionStorage.getItem('pq_admin_logged') === 'true';
        if (loggedIn) showDashboard();

        function login() {
            const pass = document.getElementById('adminPass').value;
            const settings = getSettings();
            if (pass === settings.adminPassword) {
                sessionStorage.setItem('pq_admin_logged', 'true');
                loggedIn = true;
                showDashboard();
            } else {
                alert('❌ Wrong password!');
            }
        }

        function logout() {
            sessionStorage.removeItem('pq_admin_logged');
            loggedIn = false;
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            updateStats();
            showTab('providers');
        }

        function updateStats() {
            const s = getSettings();
            document.getElementById('totalPreds').textContent = s.totalPredictions || 0;
            document.getElementById('activeAI').textContent = s.activeProvider.toUpperCase();
            document.getElementById('maintStatus').textContent = s.maintenanceMode ? 'ON' : 'OFF';
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const c = document.getElementById('tabContent');
            const s = getSettings();

            if (tab === 'providers') {
                c.innerHTML = `
                <h4 style="color:#a78bfa;margin-bottom:10px;">AI Providers</h4>
                ${Object.keys(s.providers).map(k => `
                  <div class="provider-row ${s.activeProvider===k?'active-provider':''}">
                    <span style="text-transform:capitalize;font-weight:600;">${k}</span>
                    <label class="toggle"><input type="checkbox" ${s.providers[k].enabled?'checked':''} onchange="toggleProvider('${k}',this.checked)"><span class="toggle-slider"></span></label>
                    ${s.activeProvider!==k?`<button class="btn btn-primary btn-sm" onclick="activateProvider('${k}')">Activate</button>`:'<span style="color:#4ade80;font-size:10px;">ACTIVE</span>'}
                  </div>`).join('')}`;
            } else if (tab === 'apikeys') {
                c.innerHTML = `
                <h4 style="color:#a78bfa;margin-bottom:10px;">API Keys</h4>
                ${Object.keys(s.providers).map(k => `
                  <div class="provider-row">
                    <span style="text-transform:capitalize;">${k}</span>
                    <input type="password" id="key_${k}" placeholder="${s.providers[k].apiKey?'••••••••':'Enter key'}" style="flex:1;min-width:150px;padding:7px;border-radius:4px;border:1px solid rgba(108,92,231,0.3);background:rgba(15,12,41,0.8);color:#fff;font-size:11px;">
                    <button class="btn btn-primary btn-sm" onclick="saveKey('${k}')">Save</button>
                  </div>`).join('')}`;
            } else if (tab === 'settings') {
                c.innerHTML = `
                <h4 style="color:#a78bfa;margin-bottom:10px;">Settings</h4>
                <div class="form-group"><label>Site Name</label><input id="siteName" value="${s.siteName}"></div>
                <div class="form-group"><label>Admin Password</label><input type="password" id="newPass" placeholder="New password (optional)"></div>
                <div class="form-group"><label>Min Confidence (%)</label><input type="number" id="minConf" value="${s.minConfidence}" min="30" max="95"></div>
                <div class="provider-row"><span>Maintenance Mode</span><label class="toggle"><input type="checkbox" id="maintToggle" ${s.maintenanceMode?'checked':''} onchange="toggleMaintenance(this.checked)"><span class="toggle-slider"></span></label></div>
                <button class="btn btn-primary btn-block" onclick="saveAll()">💾 Save</button>`;
            }
        }

        function toggleProvider(provider, enabled) {
            const s = getSettings();
            s.providers[provider].enabled = enabled;
            saveAdminSettings(s);
            toast(`${provider} ${enabled?'✅':'❌'}`);
        }

        function activateProvider(provider) {
            const s = getSettings();
            s.activeProvider = provider;
            saveAdminSettings(s);
            updateStats();
            showTab('providers');
            toast(`🚀 ${provider} activated!`);
        }

        function saveKey(provider) {
            const val = document.getElementById('key_' + provider).value.trim();
            if (!val) return alert('Enter key');
            const s = getSettings();
            s.providers[provider].apiKey = val;
            saveAdminSettings(s);
            toast(`✅ Key saved for ${provider}`);
            document.getElementById('key_' + provider).value = '';
            document.getElementById('key_' + provider).placeholder = '••••••••';
        }

        function toggleMaintenance(v) {
            const s = getSettings();
            s.maintenanceMode = v;
            saveAdminSettings(s);
            updateStats();
            toast(v ? '🛑 Maintenance ON' : '✅ OFF');
        }

        function saveAll() {
            const s = getSettings();
            const sn = document.getElementById('siteName')?.value;
            const np = document.getElementById('newPass')?.value;
            const mc = document.getElementById('minConf')?.value;
            if (sn) s.siteName = sn;
            if (np) s.adminPassword = np;
            if (mc) s.minConfidence = parseInt(mc);
            saveAdminSettings(s);
            updateStats();
            toast('✅ Saved!');
        }
    </script>
</body>
</html>
