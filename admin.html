<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PredictIQ — Admin Panel</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a10;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e6f0;min-height:100vh;-webkit-text-size-adjust:100%}
input,button,select,textarea{font-family:inherit;font-size:inherit}
input::placeholder,textarea::placeholder{color:#334455}
select{-webkit-appearance:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0f1a}
::-webkit-scrollbar-thumb{background:#1a3a2a;border-radius:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const ADMIN_KEY="piq_admin_v1";
const USAGE_KEY="piq_usage_v1";
const KEYS_KEY ="piq_license_keys_v1";
const PLAN_KEY ="piq_plan_cfg_v1";

const encode=(s)=>btoa(unescape(encodeURIComponent(s)));
const decode=(s)=>{try{return decodeURIComponent(escape(atob(s)));}catch{return "";}};
const getAdminCfg =()=>{try{const s=localStorage.getItem(ADMIN_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const saveAdminCfg=(c)=>{try{localStorage.setItem(ADMIN_KEY,JSON.stringify(c));}catch{}};
const getUsage    =()=>{try{const s=localStorage.getItem(USAGE_KEY);return s?JSON.parse(s):{};}catch{return{};}};
const getLicKeys  =()=>{try{const s=localStorage.getItem(KEYS_KEY);return s?JSON.parse(s):[];}catch{return[];}};
const saveLicKeys =(k)=>{try{localStorage.setItem(KEYS_KEY,JSON.stringify(k));}catch{}};
const getPlanCfg  =()=>{try{const s=localStorage.getItem(PLAN_KEY);return s?JSON.parse(s):null;}catch{return null;}};
const savePlanCfg =(c)=>{try{localStorage.setItem(PLAN_KEY,JSON.stringify(c));}catch{}};

const PROVIDERS_META=[
  {id:"groq",    name:"Groq",    icon:"⚡",color:"#f55036",badge:"FREE",ph:"gsk_..."},
  {id:"gemini",  name:"Gemini",  icon:"🔷",color:"#4285f4",badge:"FREE",ph:"AIzaSy..."},
  {id:"deepseek",name:"DeepSeek",icon:"🔵",color:"#4d6ef5",badge:"FREE",ph:"sk-..."},
  {id:"kimi",    name:"Kimi",    icon:"🌙",color:"#a855f7",badge:"FREE",ph:"sk-..."},
  {id:"openai",  name:"ChatGPT", icon:"🟩",color:"#10a37f",badge:"PAID",ph:"sk-proj-..."},
  {id:"anthropic",name:"Claude", icon:"🟧",color:"#ff6b35",badge:"PAID",ph:"sk-ant-..."},
];

function defaultAdminCfg(){
  return{password:encode("admin123"),providers:PROVIDERS_META.map((p,i)=>({id:p.id,key:"",active:false,priority:i===0?"primary":i===1?"secondary":"inactive"}))};
}
function defaultPlanCfg(){
  return{
    free:{dailyLimit:3,screenshotEnabled:true,adsEnabled:false,aiLevel:"basic",arbitrage:false,oddsComparison:false},
    premium:{dailyLimit:999,unlimited:true,screenshotEnabled:true,adsEnabled:false,aiLevel:"advanced",arbitrage:true,oddsComparison:true,priorityProcessing:true},
    pricing:{currency:"BDT",weekly:99,monthly:299,lifetime:999,weeklyUSD:1,monthlyUSD:3,lifetimeUSD:10},
    payment:{bkash:"",nagad:"",rocket:"",stripeLink:"",paypalLink:"",instructions:""},
  };
}
function genKey(type){
  const pfx={weekly:"PIQ-W",monthly:"PIQ-M",lifetime:"PIQ-L"}[type]||"PIQ-X";
  const r=()=>Math.random().toString(36).slice(2,6).toUpperCase();
  return`${pfx}-${r()}-${r()}-${r()}`;
}

// ── UI ──
function Toggle({on,onChange,color="#00ff9d"}){
  return(
    <div onClick={()=>onChange(!on)} style={{cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7,userSelect:"none"}}>
      <div style={{width:44,height:24,borderRadius:24,background:on?`${color}28`:"rgba(255,255,255,0.05)",border:`1.5px solid ${on?color+"55":"rgba(255,255,255,0.1)"}`,position:"relative",transition:"all .2s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:on?20:3,width:16,height:16,borderRadius:"50%",background:on?color:"#334455",transition:"all .2s",boxShadow:on?`0 0 8px ${color}88`:""}}/>
      </div>
      <span style={{color:on?color:"#334455",fontSize:11,fontWeight:800}}>{on?"ON":"OFF"}</span>
    </div>
  );
}
function Card({children,color="#00ff9d",style:{}}){
  return <div style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${color}18`,borderRadius:14,padding:16,...arguments[0].style||{}}}>{children}</div>;
}
function Row({label,note,children}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
      <div style={{flex:1,paddingRight:10}}><p style={{color:"#c8d8e8",fontSize:12,fontWeight:600,margin:0}}>{label}</p>{note&&<p style={{color:"#334455",fontSize:10,margin:0}}>{note}</p>}</div>
      <div style={{flexShrink:0}}>{children}</div>
    </div>
  );
}
function NumIn({value,onChange,min=0,max=9999,color="#00ff9d"}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <button onClick={()=>onChange(Math.max(min,value-1))} style={{width:26,height:26,borderRadius:7,background:`${color}10`,border:`1px solid ${color}22`,color,cursor:"pointer",fontSize:15,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
      <input type="number" value={value} onChange={e=>onChange(Math.max(min,Math.min(max,parseInt(e.target.value)||0)))} style={{width:55,background:"rgba(255,255,255,0.04)",border:`1px solid ${color}22`,borderRadius:7,padding:"5px 6px",color,fontWeight:800,fontSize:12,textAlign:"center",outline:"none"}}/>
      <button onClick={()=>onChange(Math.min(max,value+1))} style={{width:26,height:26,borderRadius:7,background:`${color}10`,border:`1px solid ${color}22`,color,cursor:"pointer",fontSize:15,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
    </div>
  );
}
function Inp({label,value,onChange,ph,type="text",color="#00ff9d",note}){
  const [sh,setSh]=useState(false);const isP=type==="password";
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {label&&<label style={{color:"#8899aa",fontSize:11,fontWeight:700}}>{label}</label>}
      <div style={{position:"relative"}}>
        <input type={isP&&!sh?"password":"text"} placeholder={ph} value={value} onChange={e=>onChange(e.target.value)}
          style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${color}22`,borderRadius:9,padding:`10px ${isP?"38px":"12px"} 10px 12px`,color:"#e0e6f0",fontSize:12,outline:"none"}}/>
        {isP&&<button onClick={()=>setSh(s=>!s)} style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#334455"}}>{sh?"🙈":"👁️"}</button>}
      </div>
      {note&&<p style={{color:"#334455",fontSize:10}}>{note}</p>}
    </div>
  );
}
function Badge({t,c}){return <span style={{background:`${c}15`,color:c,fontSize:9,fontWeight:900,padding:"2px 8px",borderRadius:20,border:`1px solid ${c}25`}}>{t}</span>;}
function SecTitle({icon,title,sub,color="#00ff9d"}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <div style={{width:36,height:36,borderRadius:10,background:`${color}15`,border:`1px solid ${color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{icon}</div>
      <div><p style={{color:"#c8d8e8",fontWeight:800,fontSize:13,margin:0}}>{title}</p>{sub&&<p style={{color:"#334455",fontSize:10,margin:0}}>{sub}</p>}</div>
    </div>
  );
}
function SaveBtn({onClick,saved,color="#ff4d4d"}){
  return <button onClick={onClick} style={{width:"100%",background:saved?"linear-gradient(135deg,#00ff9d,#00cc7a)":`linear-gradient(135deg,${color},${color}bb)`,border:"none",borderRadius:11,padding:"13px",cursor:"pointer",color:"#fff",fontWeight:900,fontSize:14,transition:"all .3s"}}>{saved?"✅ Saved!":"💾 Save করুন"}</button>;
}

// ── LOGIN ──
function Login({onLogin,hash}){
  const [pw,setPw]=useState(""),[err,setErr]=useState("");
  const go=()=>{if(!pw){setErr("Password দিন।");return;}if(encode(pw)===hash){onLogin();}else{setErr("ভুল password।");setPw("");}};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"#060a10"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(255,77,77,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,77,77,0.012) 1px,transparent 1px)",backgroundSize:"44px 44px",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:360,zIndex:1,animation:"fadeUp .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:64,height:64,borderRadius:18,background:"rgba(255,77,77,0.1)",border:"1.5px solid rgba(255,77,77,0.22)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>🔐</div>
          <h1 style={{fontSize:22,fontWeight:900,color:"#fff",margin:"0 0 4px"}}>PredictIQ <span style={{color:"#ff4d4d"}}>Admin</span></h1>
          <p style={{color:"#334455",fontSize:12}}>Secure Control Panel</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,77,77,0.18)",borderRadius:14,padding:20}}>
          <Inp label="Admin Password" value={pw} onChange={setPw} type="password" ph="Password..." color="#ff4d4d"/>
          {err&&<p style={{color:"#ff6b6b",fontSize:11,marginTop:6}}>⚠️ {err}</p>}
          <button onClick={go} style={{width:"100%",marginTop:12,background:"linear-gradient(135deg,#ff4d4d,#cc2222)",border:"none",borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontWeight:900,fontSize:14}}>🔐 Login</button>
          <p style={{color:"#1a2030",fontSize:9,textAlign:"center",marginTop:8}}>Default password: admin123</p>
        </div>
      </div>
    </div>
  );
}

// ── PROVIDERS TAB ──
function ProvidersTab({adminCfg,setAdminCfg}){
  const [saved,setSaved]=useState(false);
  const [testId,setTestId]=useState(null);
  const [testMsg,setTestMsg]=useState("");
  const updP=(id,u)=>setAdminCfg(c=>({...c,providers:c.providers.map(p=>p.id===id?u:p)}));
  const save=()=>{saveAdminCfg(adminCfg);setSaved(true);setTimeout(()=>setSaved(false),2500);};
  const testP=async(p)=>{
    if(!p.key.trim()){setTestMsg("Key নেই।");setTestId(p.id);setTimeout(()=>setTestId(null),2000);return;}
    setTestId(p.id);setTestMsg("⏳...");
    try{
      const h={"Content-Type":"application/json","Authorization":"Bearer "+p.key};const pr='Say "OK".';let res="";
      if(p.id==="groq"){const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:5,messages:[{role:"user",content:pr}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.choices[0].message.content;}
      else if(p.id==="deepseek"){const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"deepseek-chat",max_tokens:5,messages:[{role:"user",content:pr}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.choices[0].message.content;}
      else if(p.id==="kimi"){const r=await fetch("https://api.moonshot.cn/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"moonshot-v1-8k",max_tokens:5,messages:[{role:"user",content:pr}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.choices[0].message.content;}
      else if(p.id==="openai"){const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:h,body:JSON.stringify({model:"gpt-4o-mini",max_tokens:5,messages:[{role:"user",content:pr}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.choices[0].message.content;}
      else if(p.id==="gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${p.key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:pr}]}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.candidates[0].content.parts[0].text;}
      else if(p.id==="anthropic"){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":p.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:pr}]})});const d=await r.json();if(d.error)throw new Error(d.error.message);res=d.content[0].text;}
      setTestMsg(`✅ "${res.trim().slice(0,12)}"`);
    }catch(e){setTestMsg(`❌ ${e.message.slice(0,35)}`);}
    setTimeout(()=>{setTestId(null);setTestMsg("");},4000);
  };
  const pCol={primary:"#00ff9d",secondary:"#ffc107",inactive:"#445566"};
  const pri=adminCfg.providers.find(p=>p.active&&p.priority==="primary");
  const sec=adminCfg.providers.find(p=>p.active&&p.priority==="secondary");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,77,77,0.15)",borderRadius:14,padding:14}}>
        <SecTitle icon="🤖" title="AI Provider Keys" sub="Primary = main AI · Secondary = auto-fallback" color="#ff4d4d"/>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          <div style={{background:"rgba(0,255,157,0.05)",border:"1px solid rgba(0,255,157,0.12)",borderRadius:9,padding:"7px 12px"}}><p style={{color:"#1a3a28",fontSize:9,fontWeight:700,margin:"0 0 2px"}}>PRIMARY</p><p style={{color:"#00ff9d",fontSize:11,fontWeight:800}}>{pri?PROVIDERS_META.find(m=>m.id===pri.id)?.name:"❌ নেই"}</p></div>
          <div style={{background:"rgba(255,193,7,0.05)",border:"1px solid rgba(255,193,7,0.12)",borderRadius:9,padding:"7px 12px"}}><p style={{color:"#664400",fontSize:9,fontWeight:700,margin:"0 0 2px"}}>BACKUP</p><p style={{color:"#ffc107",fontSize:11,fontWeight:800}}>{sec?PROVIDERS_META.find(m=>m.id===sec.id)?.name:"নেই"}</p></div>
        </div>
      </div>
      {adminCfg.providers.map(p=>{
        const meta=PROVIDERS_META.find(m=>m.id===p.id);
        const pc=pCol[p.priority]||"#445566";const hk=p.key.trim().length>0;
        return(
          <div key={p.id} style={{background:hk?"rgba(0,255,157,0.015)":"rgba(255,255,255,0.015)",border:`1.5px solid ${hk?pc+"30":"rgba(255,255,255,0.04)"}`,borderRadius:12,padding:"12px 13px"}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
              <div style={{width:34,height:34,borderRadius:9,background:`${meta.color}15`,border:`1px solid ${meta.color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{meta.icon}</div>
              <div style={{flex:1}}><div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}><span style={{color:"#c8d8e8",fontWeight:700,fontSize:13}}>{meta.name}</span><Badge t={meta.badge} c={meta.badge==="FREE"?"#00ff9d":"#ffc107"}/>{hk&&<Badge t="✓ Key" c="#00ff9d"/>}</div></div>
              <Toggle on={p.active} onChange={v=>updP(p.id,{...p,active:v})} color={meta.color}/>
            </div>
            <Inp value={p.key} onChange={v=>updP(p.id,{...p,key:v})} ph={meta.ph} type="password" color={meta.color}/>
            {hk&&(
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginTop:8}}>
                {["primary","secondary","inactive"].map(pr=>(
                  <button key={pr} onClick={()=>updP(p.id,{...p,priority:pr})} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${p.priority===pr?pCol[pr]+"44":"rgba(255,255,255,0.06)"}`,background:p.priority===pr?`${pCol[pr]}12`:"rgba(255,255,255,0.02)",color:p.priority===pr?pCol[pr]:"#334455",cursor:"pointer",fontSize:10,fontWeight:700}}>
                    {pr==="primary"?"🥇 Primary":pr==="secondary"?"🥈 Secondary":"⏸ Inactive"}
                  </button>
                ))}
                <button onClick={()=>testP(p)} style={{marginLeft:"auto",background:"rgba(59,158,255,0.08)",border:"1px solid rgba(59,158,255,0.2)",color:"#3b9eff",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:10,fontWeight:700}}>{testId===p.id?"⏳":"🧪 Test"}</button>
                {testId===p.id&&<span style={{color:testMsg.startsWith("✅")?"#00ff9d":"#ff6b6b",fontSize:10}}>{testMsg}</span>}
              </div>
            )}
          </div>
        );
      })}
      <div style={{position:"sticky",bottom:10,zIndex:10}}><SaveBtn onClick={save} saved={saved} color="#ff4d4d"/></div>
    </div>
  );
}

// ── PLAN TAB ──
function PlanTab(){
  const [cfg,setCfg]=useState(()=>getPlanCfg()||defaultPlanCfg());
  const [saved,setSaved]=useState(false);
  const [sec,setSec]=useState("free");
  const save=()=>{savePlanCfg(cfg);setSaved(true);setTimeout(()=>setSaved(false),2500);};
  const uF=(k,v)=>setCfg(c=>({...c,free:{...c.free,[k]:v}}));
  const uP=(k,v)=>setCfg(c=>({...c,premium:{...c.premium,[k]:v}}));
  const uPr=(k,v)=>setCfg(c=>({...c,pricing:{...c.pricing,[k]:v}}));
  const uPy=(k,v)=>setCfg(c=>({...c,payment:{...c.payment,[k]:v}}));
  const secs=[{id:"free",l:"🆓 Free",c:"#3b9eff"},{id:"premium",l:"⭐ Premium",c:"#ffc107"},{id:"pricing",l:"💰 Pricing",c:"#00ff9d"},{id:"payment",l:"💳 Payment",c:"#a78bfa"}];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",gap:4}}>
        {secs.map(s=><button key={s.id} onClick={()=>setSec(s.id)} style={{flex:1,padding:"8px 2px",borderRadius:10,border:`1px solid ${sec===s.id?s.c+"44":"rgba(255,255,255,0.05)"}`,background:sec===s.id?`${s.c}12`:"rgba(255,255,255,0.02)",color:sec===s.id?s.c:"#334455",cursor:"pointer",fontSize:10,fontWeight:sec===s.id?800:500}}>{s.l}</button>)}
      </div>

      {sec==="free"&&(
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(59,158,255,0.15)",borderRadius:14,padding:14}}>
          <SecTitle icon="🆓" title="Free Plan" sub="নতুন user এই plan এ থাকবে" color="#3b9eff"/>
          <Row label="Daily Prediction Limit" note="প্রতিদিন কতটা prediction"><NumIn value={cfg.free.dailyLimit} onChange={v=>uF("dailyLimit",v)} min={1} max={100} color="#3b9eff"/></Row>
          <Row label="Screenshot Upload"><Toggle on={cfg.free.screenshotEnabled} onChange={v=>uF("screenshotEnabled",v)} color="#3b9eff"/></Row>
          <Row label="Ads দেখাবে" note="Free user দের ads"><Toggle on={cfg.free.adsEnabled} onChange={v=>uF("adsEnabled",v)} color="#ffc107"/></Row>
          <Row label="AI Response Level">
            <div style={{position:"relative"}}><select value={cfg.free.aiLevel} onChange={e=>uF("aiLevel",e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(59,158,255,0.2)",borderRadius:8,padding:"7px 26px 7px 10px",color:"#3b9eff",fontSize:11,fontWeight:700,outline:"none",cursor:"pointer"}}><option value="basic" style={{background:"#0a0f1a"}}>Basic</option><option value="advanced" style={{background:"#0a0f1a"}}>Advanced</option></select><span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",color:"#334455",pointerEvents:"none",fontSize:9}}>▼</span></div>
          </Row>
          <Row label="Arbitrage Detection"><Toggle on={cfg.free.arbitrage} onChange={v=>uF("arbitrage",v)} color="#3b9eff"/></Row>
          <Row label="Odds Comparison"><Toggle on={cfg.free.oddsComparison} onChange={v=>uF("oddsComparison",v)} color="#3b9eff"/></Row>
          <div style={{marginTop:8,background:"rgba(59,158,255,0.04)",border:"1px solid rgba(59,158,255,0.1)",borderRadius:9,padding:"8px 11px"}}><p style={{color:"#2a5a8a",fontSize:10}}>📌 Free limit শেষে user কে upgrade prompt দেখাবে</p></div>
        </div>
      )}

      {sec==="premium"&&(
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,193,7,0.15)",borderRadius:14,padding:14}}>
          <SecTitle icon="⭐" title="Premium Plan" sub="License key activate করা user পাবে" color="#ffc107"/>
          <Row label="Unlimited Predictions"><Toggle on={cfg.premium.unlimited} onChange={v=>uP("unlimited",v)} color="#ffc107"/></Row>
          {!cfg.premium.unlimited&&<Row label="Daily Limit"><NumIn value={cfg.premium.dailyLimit} onChange={v=>uP("dailyLimit",v)} min={1} max={9999} color="#ffc107"/></Row>}
          <Row label="Screenshot Upload"><Toggle on={cfg.premium.screenshotEnabled} onChange={v=>uP("screenshotEnabled",v)} color="#ffc107"/></Row>

// ── LICENSE TAB ──
function LicenseTab(){
  const [keys,setKeys]=useState(()=>getLicKeys());
  const [type,setType]=useState("monthly");
  const [note,setNote]=useState("");
  const [copied,setCopied]=useState(null);
  const generate=()=>{
    const k={key:genKey(type),type,note:note.trim(),createdAt:new Date().toISOString().slice(0,10),usedBy:null,usedAt:null,active:true};
    const u=[k,...keys];setKeys(u);saveLicKeys(u);setNote("");
  };
  const revoke=(key)=>{const u=keys.map(k=>k.key===key?{...k,active:false}:k);setKeys(u);saveLicKeys(u);};
  const remove=(key)=>{const u=keys.filter(k=>k.key!==key);setKeys(u);saveLicKeys(u);};
  const copy=(key)=>{navigator.clipboard?.writeText(key).then(()=>{setCopied(key);setTimeout(()=>setCopied(null),2000);});};
  const tc={weekly:"#3b9eff",monthly:"#00ff9d",lifetime:"#ffc107"};
  const stats={total:keys.length,avail:keys.filter(k=>k.active&&!k.usedBy).length,used:keys.filter(k=>k.usedBy).length};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
        {[{l:"Total",v:stats.total,c:"#a78bfa"},{l:"Available",v:stats.avail,c:"#00ff9d"},{l:"Used",v:stats.used,c:"#ffc107"}].map(s=>(
          <div key={s.l} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${s.c}18`,borderRadius:10,padding:"10px",textAlign:"center"}}>
            <div style={{color:s.c,fontSize:20,fontWeight:900,fontFamily:"monospace"}}>{s.v}</div>
            <div style={{color:"#1a2a34",fontSize:9,fontWeight:700,marginTop:2}}>{s.l.toUpperCase()}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(0,255,157,0.15)",borderRadius:14,padding:14}}>
        <SecTitle icon="🔑" title="New Key Generate করুন" color="#00ff9d"/>
        <div style={{display:"flex",gap:5,marginBottom:10}}>
          {["weekly","monthly","lifetime"].map(t=>(
            <button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"9px 2px",borderRadius:10,border:`1px solid ${type===t?tc[t]+"44":"rgba(255,255,255,0.06)"}`,background:type===t?`${tc[t]}12`:"rgba(255,255,255,0.02)",color:type===t?tc[t]:"#334455",cursor:"pointer",fontSize:10,fontWeight:type===t?800:500}}>
              {t==="weekly"?"📅 Weekly":t==="monthly"?"📆 Monthly":"♾️ Lifetime"}
            </button>
          ))}
        </div>
        <Inp value={note} onChange={setNote} ph="Note (optional) — যেমন: John এর জন্য" color="#00ff9d"/>
        <button onClick={generate} style={{width:"100%",marginTop:10,background:"linear-gradient(135deg,#00ff9d,#00cc7a)",border:"none",borderRadius:10,padding:"12px",cursor:"pointer",color:"#040e08",fontWeight:900,fontSize:13}}>✨ Generate Key</button>
      </div>
      {keys.length>0?(
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          <p style={{color:"#8899aa",fontSize:11,fontWeight:700}}>📋 All Keys ({keys.length})</p>
          {keys.map(k=>{
            const kc=tc[k.type]||"#667788";const isU=!!k.usedBy;const isR=!k.active;
            return(
              <div key={k.key} style={{background:isU?"rgba(255,193,7,0.025)":isR?"rgba(255,77,77,0.025)":"rgba(0,255,157,0.015)",border:`1px solid ${isU?"rgba(255,193,7,0.12)":isR?"rgba(255,77,77,0.1)":"rgba(0,255,157,0.08)"}`,borderRadius:11,padding:"11px 12px"}}>
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                      <Badge t={k.type.toUpperCase()} c={kc}/>
                      {isU&&<Badge t="✓ USED" c="#ffc107"/>}
                      {isR&&!isU&&<Badge t="✗ REVOKED" c="#ff4d4d"/>}
                      {!isU&&!isR&&<Badge t="✓ ACTIVE" c="#00ff9d"/>}
                    </div>
                    <p style={{color:"#00ff9d",fontSize:12,fontWeight:900,fontFamily:"monospace",letterSpacing:0.5,margin:"0 0 2px"}}>{k.key}</p>
                    {k.note&&<p style={{color:"#445566",fontSize:10,margin:"0 0 2px"}}>📝 {k.note}</p>}
                    <p style={{color:"#1a2a34",fontSize:9}}>Created: {k.createdAt}{isU?` · Used: ${k.usedAt?.slice(0,10)}`:""}</p>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    {!isU&&!isR&&<button onClick={()=>copy(k.key)} style={{background:copied===k.key?"rgba(0,255,157,0.12)":"rgba(0,255,157,0.05)",border:"1px solid rgba(0,255,157,0.18)",color:"#00ff9d",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:700}}>{copied===k.key?"✅":"📋 Copy"}</button>}
                    {!isR&&!isU&&<button onClick={()=>revoke(k.key)} style={{background:"rgba(255,193,7,0.05)",border:"1px solid rgba(255,193,7,0.14)",color:"#ffc107",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:700}}>⏸ Revoke</button>}
                    <button onClick={()=>remove(k.key)} style={{background:"rgba(255,77,77,0.05)",border:"1px solid rgba(255,77,77,0.14)",color:"#ff6060",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:10,fontWeight:700}}>🗑️</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      ):(
        <div style={{textAlign:"center",padding:"28px",background:"rgba(255,255,255,0.015)",borderRadius:14,border:"1px solid rgba(255,255,255,0.04)"}}><div style={{fontSize:32,marginBottom:8}}>🔑</div><p style={{color:"#334455",fontSize:12}}>এখনো কোনো key নেই।</p></div>
      )}
    </div>
  );
}

                      <div style={{color:s.c,fontSize:12,fontWeight:900,fontFamily:"monospace"}}>{s.v}</div>
                      <div style={{color:"#1a2a34",fontSize:8,fontWeight:700}}>{s.l}</div>

      <div style={{position:"relative",zIndex:1,maxWidth:600,margin:"0 auto",padding:"16px 14px 80px"}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,77,77,0.12)",border:"1.5px solid rgba(255,77,77,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔐</div>
            <span style={{fontSize:22,fontWeight:900,color:"#fff"}}>PredictIQ <span style={{color:"#ff4d4d"}}>Admin</span></span>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:5,flexWrap:"wrap"}}>
            {[
              {l:pri?`✅ ${PROVIDERS_META.find(p=>p.id===pri.id)?.name}`:"❌ No Primary",c:pri?"#00ff9d":"#ff4d4d"},
              {l:sec?`🔄 Backup: ${PROVIDERS_META.find(p=>p.id===sec.id)?.name}`:"No Backup",c:sec?"#ffc107":"#334455"},
              {l:`🔑 ${keysAvail} Keys`,c:"#a78bfa"},
              {l:`🆓 ${planCfg.free.dailyLimit}/day Free`,c:"#3b9eff"},
            ].map(s=><span key={s.l} style={{background:`${s.c}0a`,border:`1px solid ${s.c}16`,borderRadius:20,padding:"3px 9px",color:s.c,fontSize:10,fontWeight:700}}>{s.l}</span>)}
          </div>
        </div>
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:4,marginBottom:14}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 3px",borderRadius:9,border:"none",cursor:"pointer",background:tab===t.id?"rgba(255,77,77,0.12)":"transparent",color:tab===t.id?"#ff6b6b":"#2a3a44",fontWeight:tab===t.id?800:500,fontSize:10,borderBottom:tab===t.id?"2px solid #ff4d4d":"2px solid transparent",transition:"all .15s"}}>
              <span style={{display:"block",fontSize:15,marginBottom:2}}>{t.icon}</span>{t.l}
            </button>
          ))}
        </div>
        <div style={{animation:"fadeUp .3s ease"}}>
          {tab==="providers"&&<ProvidersTab adminCfg={adminCfg} setAdminCfg={setAdminCfg}/>}
          {tab==="plan"&&<PlanTab/>}
          {tab==="license"&&<LicenseTab/>}
          {tab==="usage"&&<UsageTab/>}
          {tab==="settings"&&<SettingsTab adminCfg={adminCfg} setAdminCfg={setAdminCfg}/>}
        </div>
        <p style={{textAlign:"center",marginTop:22,color:"#0e1518",fontSize:9}}>PredictIQ Admin · এই URL শুধু admin জানবে</p>
      </div>
    </div>
  );
}

function Root(){
  const [logged,setLogged]=useState(false);
  const cfg=getAdminCfg()||defaultAdminCfg();
  if(!logged)return <Login onLogin={()=>setLogged(true)} hash={cfg.password}/>;
  return <AdminPanel/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
